<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#011D2E">
<title>Polaris Obras — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* =================================================================
CONFIG VISUAL — paleta Polaris
================================================================= */
:root{
--navy:#011D2E; --navy2:#06314a; --green:#3B8B3B; --gold:#F5A623;
--bg:#0a1622; --card:#0f2233; --card2:#13293c;
--border:#1d3850; --txt:#eaf2f8; --muted:#8fa6b8; --radius:14px;
}
html[data-theme="light"]{
--navy:#011D2E; --navy2:#eef3f7; --green:#3B8B3B; --gold:#B8790A;
--bg:#F0F2ED; --card:#FFFFFF; --card2:#F4F6F3;
--border:#DCE4EA; --txt:#022C44; --muted:#5F7787;
}
html[data-theme="light"] body{background:radial-gradient(1200px 600px at 80% -10%, #dfe9e2 0%, transparent 60%),var(--bg)}
html[data-theme="light"] .topbar{background:rgba(255,255,255,.9)}
html[data-theme="light"] .toast{background:#fff}
html[data-theme="light"] .act-adv{color:#fff;background:#B8790A}
html,body{transition:background .3s,color .3s}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Manrope',system-ui,sans-serif;background:
radial-gradient(1200px 600px at 80% -10%, #0c2740 0%, transparent 60%),
var(--bg); color:var(--txt); min-height:100vh; padding-bottom:90px}
a{color:inherit}
.wrap{max-width:980px;margin:0 auto;padding:16px}

/* ---- Topbar ---- */
.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;
background:rgba(1,29,46,.85);backdrop-filter:blur(10px);
position:sticky;top:0;z-index:30;border-bottom:1px solid var(--border)}
.topbar img{height:30px}
.topbar .ttl{font-weight:800;font-size:16px;letter-spacing:.3px}
.topbar .ttl span{color:var(--gold)}
.topbar .who{margin-left:auto;font-size:12px;color:var(--muted);text-align:right;line-height:1.3}
.btn-out{background:none;border:1px solid var(--border);color:var(--muted);
border-radius:9px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-out:hover{color:var(--txt);border-color:var(--gold)}

/* ---- Stats chips ---- */
.stats{display:flex;gap:8px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--card);border:1px solid var(--border);
border-radius:12px;padding:9px 13px;cursor:pointer;transition:.15s;min-width:74px;text-align:center}
.chip:hover{border-color:var(--gold)}
.chip.on{border-color:var(--gold);background:var(--card2)}
.chip .n{font-size:19px;font-weight:800}
.chip .l{font-size:10.5px;color:var(--muted);margin-top:1px;white-space:nowrap}
.chip.total .n{color:var(--gold)}

/* ---- Toolbar ---- */
.toolbar{display:flex;gap:8px;margin:12px 0}
.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);
border:1px solid var(--border);border-radius:11px;padding:0 12px}
.search input{flex:1;background:none;border:none;outline:none;color:var(--txt);
font-family:inherit;font-size:14px;padding:11px 0}
.search input::placeholder{color:var(--muted)}
.btn-new{background:linear-gradient(135deg,var(--green),#2f7030);border:none;color:#fff;
font-weight:700;border-radius:11px;padding:0 16px;font-family:inherit;font-size:14px;cursor:pointer;white-space:nowrap}
.btn-new:hover{filter:brightness(1.08)}

/* ---- Cards ---- */
.list{display:flex;flex-direction:column;gap:11px}
.obra{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
padding:14px;transition:.15s}
.obra:hover{border-color:#2a4d6e}
.obra .top{display:flex;align-items:flex-start;gap:10px}
.obra .nm{font-weight:700;font-size:15.5px;line-height:1.25}
.obra .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px 10px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
padding:4px 9px;border-radius:20px;white-space:nowrap}
.b-stage{background:rgba(245,166,35,.13);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.b-st{margin-left:auto}
.b-fim{background:rgba(59,139,59,.16);color:#7ed07e;border:1px solid rgba(59,139,59,.35)}
.b-and{background:rgba(120,170,210,.13);color:#9cc4e4;border:1px solid rgba(120,170,210,.3)}
.b-out{background:rgba(143,166,184,.12);color:var(--muted);border:1px solid var(--border)}

.ctrls{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px;align-items:center}
.ctrls select{background:var(--card2);border:1px solid var(--border);color:var(--txt);
border-radius:9px;padding:8px 9px;font-family:inherit;font-size:12.5px;cursor:pointer;outline:none}
.act{border:none;border-radius:9px;padding:8px 11px;font-family:inherit;font-size:12.5px;
font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.act-adv{background:var(--gold);color:#3a2a00}
.act-adv:disabled{opacity:.4;cursor:default}
.act-wa{background:#1f8a4c;color:#fff}
.act-gh{background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.act-gh:hover{color:var(--txt);border-color:var(--gold)}
.act-grp{background:#3B8B3B;color:#fff}
.btn-equipe{background:var(--card2);border:1px solid var(--border);color:var(--txt);border-radius:11px;padding:0 14px;font-family:inherit;font-size:16px;cursor:pointer}
.btn-equipe:hover{border-color:var(--gold)}
.eqlist{display:flex;flex-direction:column;gap:8px;max-height:48vh;overflow-y:auto}
.eqrow{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.eqrow.off{opacity:.5}
.eqrow b{display:block;font-size:14px}
.eqrow span{font-size:12px;color:var(--muted)}
.eqact button{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}
.eqempty{color:var(--muted);text-align:center;padding:20px}

/* ---- Kanban ---- */
.viewtabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:3px}
.viewtabs button{background:none;border:none;color:var(--muted);border-radius:8px;padding:8px 13px;
font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.viewtabs button.on{background:var(--card2);color:var(--gold)}
.kb{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 20px;scroll-snap-type:x proximity}
.kb::-webkit-scrollbar{height:8px}
.kb::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
.kcol{flex:0 0 268px;scroll-snap-align:start;background:var(--card2);border:1px solid var(--border);
border-radius:14px;padding:10px;min-height:150px;transition:.2s}
.kcol.over{border-color:var(--gold);background:var(--card);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.kcol .kh{display:flex;align-items:center;gap:7px;padding:4px 4px 10px;position:sticky;top:0}
.kcol .kh .nm{font-size:12px;font-weight:800;letter-spacing:.2px;flex:1;line-height:1.25}
.kcol .kh .ct{font-size:11px;font-weight:800;color:var(--muted);background:var(--card);
border:1px solid var(--border);border-radius:20px;padding:2px 8px}
.kcol.fim .kh .nm{color:#7ed07e}
.kcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;
margin-bottom:8px;cursor:grab;transition:.18s;border-left:3px solid var(--gold)}
.kcard:active{cursor:grabbing}
.kcard.drag{opacity:.4;transform:scale(.97)}
.kcard:hover{border-color:#2a4d6e;transform:translateY(-1px)}
.kcard.late{border-left-color:#e07070}
.kcard.fim{border-left-color:#58B868}
.kcard .kn{font-weight:800;font-size:13.5px;line-height:1.3}
.kcard .km{font-size:11px;color:var(--muted);margin-top:4px;display:flex;flex-wrap:wrap;gap:3px 8px}
.kcard .kdias{font-weight:800}
.kcard .kdias.warn{color:var(--gold)}
.kcard .kdias.late{color:#e07070}
.kacts{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.kacts button{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:7px;
padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.kacts button:hover{color:var(--txt);border-color:var(--gold)}
.kempty{text-align:center;color:var(--muted);font-size:11.5px;padding:16px 6px;opacity:.5}
@media(max-width:600px){.kcol{flex:0 0 84vw}}

/* ---- Empty / loading ---- */
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.empty .i{font-size:40px;display:block;margin-bottom:12px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);
border-radius:50%;animation:spin .7s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---- Banner config ---- */
.cfg{background:rgba(245,166,35,.12);border:1px solid var(--gold);color:#ffe;
border-radius:12px;padding:14px 16px;margin:14px 0;font-size:13.5px;line-height:1.5}
.cfg code{background:rgba(0,0,0,.35);padding:1px 6px;border-radius:5px;color:var(--gold)}

/* ---- Login ---- */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login .box{background:var(--card);border:1px solid var(--border);border-radius:18px;
padding:30px 26px;width:100%;max-width:360px;text-align:center}
.login img{height:42px;margin-bottom:6px}
.login h1{font-size:18px;font-weight:800;margin-bottom:4px}
.login h1 span{color:var(--gold)}
.login p{color:var(--muted);font-size:13px;margin-bottom:20px}
.login input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--txt);
border-radius:11px;padding:13px 14px;font-family:inherit;font-size:14px;margin-bottom:11px;outline:none}
.login input:focus{border-color:var(--gold)}
.login button{width:100%;background:linear-gradient(135deg,var(--green),#2f7030);border:none;color:#fff;
font-weight:700;border-radius:11px;padding:13px;font-family:inherit;font-size:15px;cursor:pointer;margin-top:4px}
.login .err{color:#ff9a9a;font-size:12.5px;min-height:18px;margin-top:8px}

/* ---- Modal ---- */
.ov{position:fixed;inset:0;background:rgba(0,5,12,.7);backdrop-filter:blur(4px);
display:none;align-items:flex-end;justify-content:center;z-index:50}
.ov.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;
width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:22px 20px 30px}
@media(min-width:600px){.ov{align-items:center}.modal{border-radius:18px}}
.modal h2{font-size:17px;font-weight:800;margin-bottom:16px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;background:var(--card2);border:1px solid var(--border);
color:var(--txt);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:14px;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .row{display:flex;gap:10px;margin-top:8px}
.modal .save{flex:1;background:linear-gradient(135deg,var(--green),#2f7030);border:none;color:#fff;
font-weight:700;border-radius:11px;padding:13px;font-family:inherit;font-size:15px;cursor:pointer}
.modal .cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:11px;
padding:13px 18px;font-family:inherit;font-size:14px;cursor:pointer}

/* ---- Toast ---- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
background:var(--navy2);border:1px solid var(--gold);color:var(--txt);padding:12px 20px;
border-radius:12px;font-size:13.5px;font-weight:600;z-index:99;transition:.3s;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ===================================================================

Pegue em: Supabase > Project Settings > API
• Project URL -> SUPABASE_URL
• Project API keys (anon public) -> SUPABASE_ANON_KEY
==================================================================== -->
<script>
const SUPABASE_URL = "https://dakubhcgohiwzyqiegqf.supabase.co"; // ✅ já preenchido
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRha3ViaGNnb2hpd3p5cWllZ3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjExMTIsImV4cCI6MjA5Nzc5NzExMn0.Vdgp6B0TBVOSz-NT5vka9jXCdIT0iNhu1dbmvhLbWQ0"; // ✅ já preenchido
const CLIENT_BASE_URL = "https://obras.polarisenergiasolar.com/cliente.html"; // link do cliente
const PRAZO_CONTRATUAL = 60; // dias — usado na mensagem de "Sistema Ativo"
</script>

<div id="root"></div>

<script>
/* ================================================================
INICIALIZAÇÃO
================================================================ */
const NEEDS_CFG = SUPABASE_URL.startsWith("COLE_AQUI") || SUPABASE_ANON_KEY.startsWith("COLE_AQUI");
let sb = null;
if(!NEEDS_CFG){ sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }

let ET = {}; // catálogo de etapas {numero: {...}}
let OBRAS = []; // obras carregadas
let EQUIPE = []; // equipe (para vendedor e grupos)
let filtroEtapa = null, busca = "";
let rtChannel = null;

const root = document.getElementById('root');
const LOGO = "https://obras.polarisenergiasolar.com/logo.png";
const LOGO_CLARO = "https://obras.polarisenergiasolar.com/logo-claro.png";

/* ---------- util ---------- */
function slugify(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function diffDays(a,b){return Math.round((b-a)/86400000);}
function parseDate(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d;}
function diasAtras(iso){const d=parseDate(iso);if(!d)return '';const n=diffDays(d,new Date());return n<=0?'hoje':(n===1?'ontem':'há '+n+'d');}
function toast(m){let t=document.getElementById('tst');if(!t){t=document.createElement('div');t.id='tst';t.className='toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2600);}
function temaAtual(){try{return localStorage.getItem('polaris-tema')||'dark'}catch(_){return 'dark'}}
function aplicarTema(t){document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('bTema');if(b)b.textContent=t==='dark'?'🌙':'☀️';document.querySelectorAll('.topbar img, .login img').forEach(function(i){i.src=(t==='light'?LOGO_CLARO:LOGO);});try{localStorage.setItem('polaris-tema',t)}catch(_){}}
function toggleTema(){aplicarTema(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}
aplicarTema(temaAtual());
function waPhone(tel){let d=(tel||'').replace(/\D/g,'');if(!d)return '';if(d.length<=11&&!d.startsWith('55'))d='55'+d;return d;}

/* ================================================================
FLUXO PRINCIPAL
================================================================ */
async function boot(){
if(NEEDS_CFG){ renderConfigNeeded(); return; }
const { data:{ session } } = await sb.auth.getSession();
if(!session){ renderLogin(); return; }
await renderApp(session);
sb.auth.onAuthStateChange((_e, s)=>{ if(!s) renderLogin(); });
}

/* ---------- tela: falta config ---------- */
function renderConfigNeeded(){
root.innerHTML = `<div class="wrap"><div class="cfg" style="margin-top:40px">
<b>⚙️ Falta configurar o painel.</b><br><br>
Abra este arquivo e preencha, lá no topo do &lt;script&gt;:
<br>• <code>SUPABASE_URL</code><br>• <code>SUPABASE_ANON_KEY</code><br><br>
Você pega os dois em <b>Supabase → Project Settings → API</b>.
</div></div>`;
}

/* ---------- tela: login ---------- */
function renderLogin(){
if(rtChannel){ sb.removeChannel(rtChannel); rtChannel=null; }
root.innerHTML = `<div class="login"><div class="box">
<img src="${LOGO}" onerror="this.style.display='none'">
<h1>Polaris <span>Obras</span></h1>
<p>Painel da equipe — acesso restrito</p>
<input id="email" type="email" placeholder="seu e-mail" autocomplete="username">
<input id="senha" type="password" placeholder="senha" autocomplete="current-password">
<button id="bLogin">Entrar</button>
<div class="err" id="loginErr"></div>
<div style="margin-top:12px;display:flex;justify-content:space-between">
<a href="login.html" style="font-size:12px;color:var(--muted);font-weight:700;text-decoration:none">Primeiro acesso</a>
<a href="login.html" style="font-size:12px;color:var(--muted);font-weight:700;text-decoration:none">Esqueci a senha</a>
</div>
</div></div>`;
const doLogin = async ()=>{
const email=document.getElementById('email').value.trim();
const password=document.getElementById('senha').value;
const errEl=document.getElementById('loginErr');
if(!email||!password){errEl.textContent='Preencha e-mail e senha.';return;}
document.getElementById('bLogin').textContent='Entrando...';
const { data, error } = await sb.auth.signInWithPassword({ email, password });
if(error){ errEl.textContent='E-mail ou senha incorretos.'; document.getElementById('bLogin').textContent='Entrar'; return; }
renderApp(data.session);
};
document.getElementById('bLogin').onclick = doLogin;
document.getElementById('senha').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

/* ---------- app ---------- */
async function renderApp(session){
root.innerHTML = `
<div class="topbar">
<img src="${LOGO}" onerror="this.style.display='none'">
<div class="ttl">Polaris <span>Obras</span></div>
<div class="who">${esc(session.user.email)}<br><button class="btn-out" id="bTema" title="Alternar tema">🌙</button> <button class="btn-out" id="bMet" style="display:none" title="Métricas">📊</button> <button class="btn-out" id="bUsers" style="display:none">👥</button> <button class="btn-out" id="bOut">sair</button></div>
</div>
<div class="wrap">
<div class="stats" id="stats"></div>
<div class="toolbar">
<div class="search">🔍 <input id="busca" placeholder="Buscar cliente ou contrato..."></div>
<div class="viewtabs"><button id="vCards" class="on" onclick="setView('cards')">▦ Cards</button><button id="vKanban" onclick="setView('kanban')">▤ Kanban</button></div>
<button class="btn-equipe" id="bAgenda" title="Copiar link da agenda do instalador">📅</button>
<button class="btn-equipe" id="bEquipe" title="Gerenciar equipe">👥</button>
<button class="btn-new" id="bNew">+ Nova obra</button>
</div>
<div class="list" id="list"><div class="spinner"></div></div>
</div>`;
document.getElementById('bOut').onclick = async ()=>{ await sb.auth.signOut(); };
document.getElementById('bTema').onclick = toggleTema;
aplicarTema(temaAtual());
document.getElementById('bUsers').onclick = ()=> location.href='usuarios.html';
sb.rpc('is_admin').then(r=>{ if(r.data){ document.getElementById('bUsers').style.display=''; const bm=document.getElementById('bMet'); bm.style.display=''; bm.onclick=()=>location.href='metricas.html'; } });
document.getElementById('bNew').onclick = ()=> openForm(null);
document.getElementById('bEquipe').onclick = ()=> openEquipe();
document.getElementById('bAgenda').onclick = ()=> copiarLinkAgenda();
document.getElementById('busca').addEventListener('input', e=>{ busca=e.target.value.toLowerCase(); renderList(); });

setView(VIEW);
await loadEtapas();
await loadEquipe();
await loadObras();
subscribeRealtime();
}

async function loadEtapas(){
const { data, error } = await sb.from('etapas').select('*').order('numero');
if(error){ toast('Erro ao carregar etapas'); return; }
ET = {}; (data||[]).forEach(e=> ET[e.numero]=e);
}

async function loadObras(){
const { data, error } = await sb.from('obras').select('*');
if(error){ document.getElementById('list').innerHTML=`<div class="empty"><span class="i">⚠️</span>Erro ao carregar: ${esc(error.message)}</div>`; return; }
OBRAS = data||[];
renderStats(); renderList();
}

/* ---------- stats ---------- */
function renderStats(){
const cont={}; OBRAS.forEach(o=> cont[o.etapa_numero]=(cont[o.etapa_numero]||0)+1);
let h=`<div class="chip total ${filtroEtapa===null?'on':''}" onclick="setFiltro(null)"><div class="n">${OBRAS.length}</div><div class="l">Total</div></div>`;
for(let n=8;n>=0;n--){ if(!cont[n]) continue; const e=ET[n]||{nome:'?',icone:''};
h+=`<div class="chip ${filtroEtapa===n?'on':''}" onclick="setFiltro(${n})"><div class="n">${cont[n]}</div><div class="l">${e.icone||''} ${esc((e.nome||'').replace('!',''))}</div></div>`; }
document.getElementById('stats').innerHTML=h;
}
function setFiltro(n){ filtroEtapa=(filtroEtapa===n?null:n); renderStats(); renderList(); }

/* ---------- lista ---------- */
function statusBadge(s){
const cls = s==='Finalizado'?'b-fim': s==='Em andamento'?'b-and':'b-out';
return `<span class="badge b-st ${cls}">${esc(s)}</span>`;
}
let VIEW='cards';
try{VIEW=localStorage.getItem('polaris-view')||'cards'}catch(_){}
function setView(v){
VIEW=v; try{localStorage.setItem('polaris-view',v)}catch(_){}
const a=document.getElementById('vCards'),b=document.getElementById('vKanban');
if(a&&b){a.classList.toggle('on',v==='cards');b.classList.toggle('on',v==='kanban');}
renderList();
}
function diasObra(o){ if(!o.data_fechamento) return null; const d=parseDate(o.data_fechamento); if(!d) return null; return diffDays(d,new Date()); }
function renderList(){
if(VIEW==='kanban') return renderKanban();
let arr=OBRAS.slice();
if(filtroEtapa!==null) arr=arr.filter(o=>o.etapa_numero===filtroEtapa);
if(busca) arr=arr.filter(o=> (o.cliente||'').toLowerCase().includes(busca) || (o.contrato||'').includes(busca));
// ordena: não finalizadas primeiro, depois por etapa desc, depois nome
arr.sort((a,b)=>{
const fa=a.status==='Finalizado'?1:0, fb=b.status==='Finalizado'?1:0;
if(fa!==fb) return fa-fb;
if(b.etapa_numero!==a.etapa_numero) return b.etapa_numero-a.etapa_numero;
return (a.cliente||'').localeCompare(b.cliente||'');
});
const el=document.getElementById('list');
el.className='list'; el.style.display='';
if(!arr.length){ el.innerHTML=`<div class="empty"><span class="i">📋</span>Nenhuma obra encontrada.</div>`; return; }
el.innerHTML = arr.map(cardHtml).join('');
}
function renderKanban(){
let arr=OBRAS.slice();
if(busca) arr=arr.filter(o=> (o.cliente||'').toLowerCase().includes(busca) || (o.contrato||'').includes(busca));
const el=document.getElementById('list');
el.className='kb'; el.style.display='flex';
let h='';
for(let n=0;n<=8;n++){
if(filtroEtapa!==null && filtroEtapa!==n) continue;
const e=ET[n]||{nome:'Etapa '+n,icone:''};
const obs=arr.filter(o=>o.etapa_numero===n).sort((a,b)=>{const da=diasObra(a),db=diasObra(b);return (db==null?-1:db)-(da==null?-1:da);});
h+='<div class="kcol '+(n===8?'fim':'')+'" data-etapa="'+n+'" ondragover="kOver(event,this)" ondragleave="kLeave(this)" ondrop="kDrop(event,this)">'
 +'<div class="kh"><span>'+(e.icone||'')+'</span><span class="nm">'+esc((e.nome||'').replace('!',''))+'</span><span class="ct">'+obs.length+'</span></div>';
if(!obs.length) h+='<div class="kempty">—</div>';
obs.forEach(function(o){
const d=diasObra(o);
const late=(d!=null&&d>60&&n<8), warn=(d!=null&&d>30&&d<=60&&n<8);
h+='<div class="kcard '+(n===8?'fim':(late?'late':''))+'" draggable="true" data-id="'+o.id+'" ondragstart="kStart(event,this)" ondragend="kEnd(this)">'
 +'<div class="kn">'+esc(o.cliente)+'</div>'
 +'<div class="km">'+(o.contrato?'<span>#'+esc(o.contrato)+'</span>':'')
 +(o.potencia_kwp?'<span>'+esc(String(o.potencia_kwp).replace('.',','))+' kWp</span>':'')
 +(d!=null&&n<8?'<span class="kdias '+(late?'late':(warn?'warn':''))+'">'+d+'d</span>':'')
 +(o.data_instalacao?'<span>📅 '+o.data_instalacao.split('-').reverse().slice(0,2).join('/')+'</span>':'')
 +(o.aceite_em?'<span>✍️</span>':'')+'</div>'
 +'<div class="kacts">'
 +'<button onclick="event.stopPropagation();enviarWA(\''+o.id+'\')" title="Mensagem ao cliente">💬</button>'
 +(o.whatsapp_grupo_id?'<button onclick="event.stopPropagation();notificarGrupo(\''+o.id+'\')" title="Avisar no grupo">📣</button>':'<button onclick="event.stopPropagation();criarGrupo(\''+o.id+'\')" title="Criar grupo">➕</button>')
 +'<button onclick="event.stopPropagation();abrirRelatorio(\''+o.id+'\')" title="Relatório">📄</button>'
 +'<button onclick="event.stopPropagation();copiarLinkInst(\''+o.id+'\')" title="Link do instalador">🔧</button>'
 +'<button onclick="event.stopPropagation();openForm(\''+o.id+'\')" title="Editar">✏️</button>'
 +'</div></div>';
});

}
el.innerHTML=h;
}
let kDragId=null;
function kStart(ev,el){kDragId=el.dataset.id;el.classList.add('drag');ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain',kDragId)}catch(_){}}
function kEnd(el){el.classList.remove('drag');document.querySelectorAll('.kcol.over').forEach(c=>c.classList.remove('over'));}
function kOver(ev,col){ev.preventDefault();col.classList.add('over');}
function kLeave(col){col.classList.remove('over');}
async function kDrop(ev,col){
ev.preventDefault(); col.classList.remove('over');
const id=kDragId||ev.dataTransfer.getData('text/plain'); kDragId=null;
if(!id) return;
const n=parseInt(col.dataset.etapa,10);
const o=getObra(id);
if(!o||o.etapa_numero===n) return;
await mudarEtapa(id,n);
}
function cardHtml(o){
const e=ET[o.etapa_numero]||{nome:'?',icone:''};
const metaBits=[];
if(o.contrato) metaBits.push('#'+esc(o.contrato));
if(o.potencia_kwp) metaBits.push(esc(String(o.potencia_kwp).replace('.',','))+' kWp');
if(o.data_instalacao){const di=o.data_instalacao.split('-');metaBits.push('📅 instalação '+di[2]+'/'+di[1]);}
if(o.aceite_em){metaBits.push('✍️ termo assinado');}
metaBits.push('atualizado '+diasAtras(o.atualizado_em));
if(o.observacoes) metaBits.push('📝 '+esc(o.observacoes));
const opts=[0,1,2,3,4,5,6,7,8].map(n=>`<option value="${n}" ${n===o.etapa_numero?'selected':''}>${(ET[n]?.icone||'')} ${n} - ${esc((ET[n]?.nome||'').replace('!',''))}</option>`).join('');
return `<div class="obra" data-id="${o.id}">
<div class="top">
<div>
<div class="nm">${esc(o.cliente)}</div>
<div class="meta">${metaBits.join('<span>•</span>')}</div>
</div>
<span class="badge b-stage">${e.icone||''} ${esc((e.nome||'').replace('!',''))}</span>${o.status==='Finalizado'?statusBadge(o.status):''}
</div>
<div class="ctrls">
<select onchange="mudarEtapa('${o.id}',this.value)" title="Etapa">${opts}</select>
<button class="act act-adv" ${o.etapa_numero>=8?'disabled':''} onclick="avancar('${o.id}')">Avançar ▶</button>
<button class="act act-wa" onclick="enviarWA('${o.id}')">💬 Cliente</button>
${o.whatsapp_grupo_id
? `<button class="act act-grp" onclick="notificarGrupo('${o.id}')" title="Avisar no grupo do cliente">📣 Grupo</button>`
: `<button class="act act-gh" onclick="criarGrupo('${o.id}')" title="Criar grupo do cliente">➕ Grupo</button>`}
<button class="act act-gh" onclick="copiarLink('${o.id}')">🔗 Link</button>
<button class="act act-gh" onclick="copiarLinkInst('${o.id}')" title="Link do checklist do instalador">🔧</button>
<button class="act act-gh" onclick="abrirRelatorio('${o.id}')" title="Relatório de instalação">📄</button>
<button class="act act-gh" onclick="openForm('${o.id}')">✏️</button>
</div>
</div>`;
}

/* ---------- ações ---------- */
function getObra(id){ return OBRAS.find(o=>o.id===id); }

async function mudarEtapa(id,n){
n=parseInt(n,10);
const o=getObra(id);
const mudou = n!==o.etapa_numero;
const patch={etapa_numero:n};
if(n===8){ if(!o.data_conclusao) patch.data_conclusao=new Date().toISOString().slice(0,10); }
const { error } = await sb.from('obras').update(patch).eq('id',id);
if(error){ toast('Erro ao salvar'); return; }
// 📣 Notificação automática no grupo do cliente
if(mudou && o.whatsapp_grupo_id){
toast('Etapa atualizada ✓ Avisando o grupo... 📣');
const oNovo=Object.assign({},o,patch);
sb.functions.invoke('notificar-grupo',{body:{grupo_id:o.whatsapp_grupo_id,message:buildWA(oNovo)}})
.then(r=>{
if(r.error||(r.data&&r.data.error)) toast('⚠️ Etapa salva, mas o aviso no grupo falhou — use o 📣 pra reenviar');
else toast('✓ Cliente avisado no grupo automaticamente 📣');
});
} else {
toast('Etapa atualizada ✓');
}
await loadObras();
}
async function avancar(id){
const o=getObra(id); if(o.etapa_numero>=8) return;
await mudarEtapa(id, o.etapa_numero+1);
}
function abrirRelatorio(id){const o=getObra(id);window.open('relatorio.html?id='+encodeURIComponent(o.slug),'_blank');}
function importarProposta(){document.getElementById('f_pdf').click();}
async function lerProposta(inp){
const file=inp.files[0]; inp.value=''; if(!file)return;
toast('📎 Lendo proposta...');
try{
if(!window.pdfjsLib){
await new Promise((ok,err)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=ok;s.onerror=err;document.head.appendChild(s);});
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
const buf=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data:buf}).promise;
// --- monta linhas visuais (agrupa por Y, ordena por X, remove textos duplicados) ---
const L=[];
for(let p=1;p<=Math.min(pdf.numPages,6);p++){
const pg=await pdf.getPage(p); const tc=await pg.getTextContent();
const g={};
tc.items.forEach(function(it){ if(!it.str||!it.str.trim())return;
const y=Math.round(it.transform[5]); (g[y]=g[y]||[]).push({x:it.transform[4],s:it.str.trim()}); });
Object.keys(g).map(Number).sort((a,b)=>b-a).forEach(function(y){
const arr=g[y].sort((a,b)=>a.x-b.x); const out=[];
arr.forEach(function(o){ if(out.length&&out[out.length-1]===o.s)return; out.push(o.s); });
let ln=out.join(' ').replace(/\s+/g,' ').trim();
const dup=ln.match(/^(.+?)\s+\1$/); if(dup) ln=dup[1];
if(ln) L.push(ln);
});
}
if(!L.length){ toast('Este PDF não tem texto (parece digitalizado). Use a proposta comercial em PDF.'); return; }
const flat=L.join(' ');
let n=0, m;
// Cliente = primeira linha da capa
if(!/^[\d.,]+$/.test(L[0]) && L[0].length<60){ document.getElementById('f_cli').value=L[0]; n++; }
// Potência
m=flat.match(/(\d{1,4}(?:[.,]\d{1,2})?)\s*kWp/i);
if(m){ document.getElementById('f_pot').value=m[1].replace('.',','); n++; }
// Nº da proposta (número antes da data de validade)
m=flat.match(/(\d{1,2}\.\d{3}|\d{4,6})\s+\d{2}\/\d{2}\/\d{4}/);
if(m){ document.getElementById('f_con').value=m[1].replace(/\D/g,''); n++; }
// Módulos: quantidade + modelo
m=flat.match(/(\d{1,4})\s*M[ÓO]DULOS?\s*[-–]?\s*MARCA:?\s*([\s\S]{2,45}?\d{2,4}\s*W)\b/i);
if(m){ document.getElementById('f_qtm').value=m[1]; document.getElementById('f_mdm').value=m[2].replace(/\s+/g,' ').trim(); n++; }
else { m=flat.match(/(\d{1,4})\s*M[ÓO]DULOS?/i); if(m){ document.getElementById('f_qtm').value=m[1]; n++; } }
// Inversor
m=flat.match(/(\d{1,2})\s*x\s*INVERSOR(?:ES)?\s*(?:DE)?\s*([\d.,]+)\s*KW\s*([A-Za-zÀ-ÿ]{3,15})?/i);
if(m){ document.getElementById('f_inv').value=m[1]+'x '+(m[3]?m[3].toUpperCase()+' ':'')+m[2].replace(',','.')+'kW'; n++; }
// Estrutura de fixação -> tipo de telhado
m=flat.match(/([A-Za-zÀ-ÿ]{4,15})\s+\d{1,5}\s*m²/);
if(m){
const raw=m[1].toLowerCase();
let tel='';
if(/colonial|cer[âa]mic/.test(raw)) tel='Cerâmico';
else if(/met[áa]lic/.test(raw)) tel='Metálico';
else if(/fibro/.test(raw)) tel='Fibrocimento';
else if(/laje/.test(raw)) tel='Laje';
else if(/solo/.test(raw)) tel='Solo';
if(tel){ document.getElementById('f_tel2').value=tel; n++; }
}
toast(n?('📎 '+n+' campo(s) importados — confira antes de salvar!'):'Não achei os dados no PDF — preencha manualmente');
}catch(e){toast('Erro ao ler PDF: '+e.message);}
}

/* ---------- mensagem de WhatsApp ---------- */
function buildWA(o){
const e=ET[o.etapa_numero]||{};
if(o.etapa_numero===8){
const dF=parseDate(o.data_fechamento), dC=parseDate(o.data_conclusao);
let dias=null, antes=null;
if(dF&&dC){ dias=diffDays(dF,dC); antes=PRAZO_CONTRATUAL-dias; }
if(dias!==null && antes>0)
return `☀️ *${o.cliente}*, temos uma ótima notícia!\n\nSeu sistema solar foi *ativado* — e com muito orgulho: entregamos sua obra *${antes} dias antes* do prazo contratual! 🚀\n\n📊 Prazo contratual: ${PRAZO_CONTRATUAL} dias\n✅ Entregamos em: *${dias} dias*\n\nSeu sistema já está gerando energia limpa e reduzindo sua conta. 🌱\n\n*Equipe Polaris Energia Solar* ☀️`;
if(dias!==null && antes===0)
return `☀️ *${o.cliente}*, seu sistema foi *ativado* no prazo! ✅\n\nEntregamos em exatamente *${dias} dias*, dentro do prazo contratual.\n\nSeu sistema já está gerando energia limpa. 🌱\n\n*Equipe Polaris Energia Solar* ☀️`;
return `☀️ *${o.cliente}*, seu sistema solar foi *ativado*! Parabéns! 🚀\n\nSeu sistema já está gerando energia limpa e reduzindo sua conta. 🌱\n\n*Equipe Polaris Energia Solar* ☀️`;
}
let msg=`Olá *${o.cliente}*! 👋\n\n`;
if(e.mensagem_wa) msg+=e.mensagem_wa+'\n\n';
msg+=`📍 Etapa atual: *${(e.nome||'').replace('!','')}*`;
if(e.prazo_texto) msg+=`\n⏱️ ${e.prazo_texto}`;
msg+=`\n\nVocê pode acompanhar sua obra em tempo real neste link:\n${CLIENT_BASE_URL}?id=${o.slug}\n\n*Equipe Polaris Energia Solar* ☀️`;
return msg;
}
function enviarWA(id){
const o=getObra(id); const fone=waPhone(o.telefone);
const msg=buildWA(o);
if(!fone){
toast('Cadastre o WhatsApp do cliente primeiro');
openForm(id, true); return;
}
const mobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
if(mobile){
window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`,'_blank');
}else{
// WhatsApp Desktop corrompe emojis via link — copiamos a mensagem para colar
navigator.clipboard.writeText(msg).then(()=>toast('📋 Mensagem copiada! Cole no chat com Ctrl+V')).catch(()=>{});
window.open(`https://wa.me/${fone}`,'_blank');
}
}

cliente:cli,
telefone:document.getElementById('f_tel').value.replace(/\D/g,'')||null,
contrato:document.getElementById('f_con').value.replace(/\D/g,'')||null,
potencia_kwp: potRaw?parseFloat(potRaw):null,
etapa_numero:parseInt(document.getElementById('f_et').value,10),
data_fechamento:document.getElementById('f_dtf').value||null,
data_conclusao:document.getElementById('f_dtc').value||null,
observacoes:document.getElementById('f_obs').value.trim()||null,
vendedor_id:document.getElementById('f_vend').value||null,
data_instalacao:document.getElementById('f_dti').value||null,
instalador_id:document.getElementById('f_inst').value||null,
qtd_modulos:parseInt(document.getElementById('f_qtm').value,10)||null,
modelo_modulo:document.getElementById('f_mdm').value.trim()||null,
inversor_descricao:document.getElementById('f_inv').value.trim()||null,
tipo_telhado:document.getElementById('f_tel2').value||null,
endereco:document.getElementById('f_end').value.trim()||null,
tem_estrutura:document.getElementById('f_est').checked,
tem_cabo:document.getElementById('f_cab').checked,
whatsapp_grupo_id:document.getElementById('f_grp').value.trim()||null
};
document.getElementById('f_save').textContent='Salvando...';
let error;
if(id){ ({ error } = await sb.from('obras').update(rec).eq('id',id)); }
else {
rec.slug = await slugUnico(slugify(cli));
({ error } = await sb.from('obras').insert(rec));
}
if(error){ toast('Erro: '+error.message); document.getElementById('f_save').textContent='Salvar'; return; }
document.getElementById('ovForm').remove();
toast(id?'Obra salva ✓':'Obra criada ✓');
await loadObras();
}
async function slugUnico(base){
if(!base) base='cliente';
let slug=base, i=1;
while(OBRAS.some(o=>o.slug===slug)){ i++; slug=base+'-'+i; }
return slug;
}

/* ---------- equipe ---------- */
async function loadEquipe(){
const { data } = await sb.from('equipe').select('*').order('papel').order('nome');
EQUIPE = data||[];
}
function reabrirEquipe(){ const o=document.getElementById('ovEquipe'); if(o){ o.remove(); openEquipe(); } }
function openEquipe(){
const linhas = EQUIPE.map(p=>`<div class="eqrow ${p.ativo?'':'off'}">
<div><b>${esc(p.nome)}</b><span>${esc(p.papel)} • ${esc(p.telefone)}</span></div>
<div class="eqact">
<button onclick="toggleAtivo('${p.id}',${!p.ativo})" title="${p.ativo?'Ativo (clique p/ desativar)':'Inativo (clique p/ ativar)'}">${p.ativo?'🟢':'⚪'}</button>
<button onclick="editEquipe('${p.id}')">✏️</button>
</div></div>`).join('') || '<div class="eqempty">Nenhum membro cadastrado.</div>';
const ov=document.createElement('div'); ov.className='ov on'; ov.id='ovEquipe';
ov.innerHTML=`<div class="modal">
<h2>👥 Equipe</h2>
<p style="color:var(--muted);font-size:12.5px;margin:-8px 0 14px">Quem entra nos grupos dos clientes. Desative quem sair da empresa.</p>
<div class="eqlist">${linhas}</div>
<button class="save" style="margin-top:14px" onclick="editEquipe(null)">+ Adicionar pessoa</button>
<button class="cancel" style="width:100%;margin-top:8px" onclick="document.getElementById('ovEquipe').remove()">Fechar</button>
</div>`;
document.body.appendChild(ov);
ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}
function editEquipe(id){
const p = id ? EQUIPE.find(x=>x.id===id) : {};
const novo=!id;
const pOpts=['Vendedor','Instalador','Diretor','Pós-venda','Engenharia','Outro'].map(x=>`<option ${x===(p.papel||'Vendedor')?'selected':''}>${x}</option>`).join('');
const ov=document.createElement('div'); ov.className='ov on'; ov.id='ovEqForm';
ov.innerHTML=`<div class="modal">
<h2>${novo?'Nova pessoa':'Editar pessoa'}</h2>
<div class="fld"><label>Nome *</label><input id="e_nome" value="${esc(p.nome||'')}"></div>
<div class="grid2">
<div class="fld"><label>Papel</label><select id="e_papel">${pOpts}</select></div>
<div class="fld"><label>WhatsApp (DDD+nº) *</label><input id="e_tel" value="${esc(p.telefone||'')}" placeholder="18999999999"></div>
</div>
<div class="row">
${novo?'':`<button class="cancel" onclick="delEquipe('${id}')" style="color:#ff9a9a">Excluir</button>`}
<button class="save" id="e_save">${novo?'Adicionar':'Salvar'}</button>
</div>
</div>`;
document.body.appendChild(ov);
ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
document.getElementById('e_save').onclick = async ()=>{
const nome=document.getElementById('e_nome').value.trim();
let tel=document.getElementById('e_tel').value.replace(/\D/g,'');
if(!nome||!tel){ toast('Preencha nome e telefone'); return; }
if(tel.length<=11 && !tel.startsWith('55')) tel='55'+tel;
const rec={ nome, papel:document.getElementById('e_papel').value, telefone:tel };
let error;
if(id){ ({error}=await sb.from('equipe').update(rec).eq('id',id)); }
else { ({error}=await sb.from('equipe').insert(rec)); }
if(error){ toast('Erro: '+error.message); return; }
document.getElementById('ovEqForm').remove();
await loadEquipe(); reabrirEquipe(); toast('Equipe atualizada ✓');
};
}
async function toggleAtivo(id,val){
const { error } = await sb.from('equipe').update({ativo:val}).eq('id',id);
if(error){ toast('Erro: '+error.message); return; }
await loadEquipe(); reabrirEquipe();
}
async function delEquipe(id){
if(!confirm('Excluir esta pessoa da equipe?')) return;
const { error } = await sb.from('equipe').delete().eq('id',id);
if(error){ toast('Erro: '+error.message); return; }
const f=document.getElementById('ovEqForm'); if(f) f.remove();
await loadEquipe(); reabrirEquipe(); toast('Removido ✓');
}

/* ---------- grupos de WhatsApp (Z-API) ---------- */
async function invokeFn(name, body){
const { data, error } = await sb.functions.invoke(name, { body });
if(error){ let m=error.message; try{ const j=await error.context.json(); if(j&&j.error) m=j.error; }catch(_){} return { error:m }; }
if(data&&data.error) return { error:data.error };
return { data };
}
async function criarGrupo(id){
const o=getObra(id);
if(!o.telefone){ toast('Cadastre o telefone do cliente primeiro'); openForm(id,true); return; }
if(!confirm(`Criar o grupo "Polaris ☀️ ${o.cliente}${o.contrato?' #'+o.contrato:''}" e enviar as boas-vindas?\n\nVai adicionar: cliente${o.vendedor_id?' + vendedor':''} + engenharia + pós-venda.`)) return;
toast('Criando grupo...');
const r = await invokeFn('criar-grupo', { obra_id:id });
if(r.error){ toast('Erro: '+r.error); return; }
toast('Grupo criado e boas-vindas enviadas ✓');
await loadObras();
}
async function notificarGrupo(id){
const o=getObra(id);
if(!o.whatsapp_grupo_id){ toast('Esta obra ainda não tem grupo'); return; }
if(!confirm('Enviar a mensagem da etapa atual no grupo do cliente?')) return;
toast('Enviando...');
const r = await invokeFn('notificar-grupo', { grupo_id:o.whatsapp_grupo_id, message:buildWA(o) });
if(r.error){ toast('Erro: '+r.error); return; }
toast('Mensagem enviada no grupo ✓');
}

/* ---------- realtime ---------- */
function subscribeRealtime(){
if(rtChannel) return;
rtChannel = sb.channel('obras-rt')
.on('postgres_changes',{event:'*',schema:'public',table:'obras'},()=>{ loadObras(); })
.subscribe();
}

boot();
</script>
