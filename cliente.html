<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#011D2E">
<title>Polaris Solar – Acompanhe sua Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#011D2E;--navy-mid:#022C44;--navy-light:#0A3D5C;
  --green:#3B8B3B;--green-light:#58B868;--green-glow:rgba(59,139,59,0.25);
  --gold:#F5A623;--gold-light:#FFD580;--gold-glow:rgba(245,166,35,0.3);
  --bg:#F7F8F6;--surface:#FFFFFF;--surface-alt:#F0F2ED;
  --text:#022C44;--text-secondary:#6B7D8A;--text-muted:#9EABB5;
  --border:#E2E8EC;--border-light:#EEF1F4;
  --shadow-sm:0 1px 3px rgba(1,29,46,0.06);
  --shadow-md:0 4px 16px rgba(1,29,46,0.08);
  --shadow-lg:0 8px 32px rgba(1,29,46,0.12);
  --shadow-glow:0 4px 24px rgba(245,166,35,0.15);
  --radius:16px;--radius-sm:10px;--radius-lg:24px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth}
html,body{min-height:100%;background:var(--bg);font-family:'Manrope',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{padding-bottom:calc(40px + var(--safe-b))}

/* ── HERO ── */
.hero{
  background:var(--navy);
  padding:calc(var(--safe-t)+48px) 24px 40px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background: radial-gradient(ellipse at 30% -20%,rgba(59,139,59,0.12) 0%,transparent 50%),
              radial-gradient(ellipse at 70% -10%,rgba(245,166,35,0.10) 0%,transparent 50%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent);
}
.hero-logo{height:40px;margin:0 auto 28px;display:block;opacity:0;animation:fadeDown .6s ease .1s forwards}
.hero-tag{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;opacity:0;animation:fadeDown .6s ease .2s forwards;
}
.hero-name{
  font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px;
  line-height:1.15;margin-bottom:6px;opacity:0;animation:fadeDown .6s ease .3s forwards;
}
.hero-sub{
  font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:24px;
  font-weight:500;opacity:0;animation:fadeDown .6s ease .35s forwards;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);border-radius:50px;
  padding:10px 20px;font-size:13px;font-weight:700;color:#fff;
  opacity:0;animation:fadeUp .6s ease .45s forwards;
}
.hero-badge-dot{
  width:8px;height:8px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 12px var(--gold-glow);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD CELEBRAÇÃO (entrega antecipada) ── */
.celebrate-wrap{padding:20px 20px 0}
.celebrate-card{
  background:linear-gradient(135deg,#012E1A 0%,#014d29 50%,#022C44 100%);
  border-radius:var(--radius-lg);
  border:1px solid rgba(59,139,59,0.35);
  box-shadow:0 8px 32px rgba(59,139,59,0.2),0 2px 8px rgba(0,0,0,0.3);
  overflow:hidden;
  position:relative;
}
.celebrate-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% -10%,rgba(245,166,35,0.12) 0%,transparent 60%),
             radial-gradient(ellipse at 10% 110%,rgba(59,139,59,0.15) 0%,transparent 50%);
  pointer-events:none;
}
.celebrate-inner{position:relative;z-index:1;padding:24px 20px 20px}
.celebrate-trophy{
  font-size:40px;display:block;text-align:center;margin-bottom:16px;
  animation:bounceIn .8s cubic-bezier(.34,1.56,.64,1) .2s both;
}
@keyframes bounceIn{
  0%{opacity:0;transform:scale(0.3)}
  50%{transform:scale(1.1)}
  100%{opacity:1;transform:scale(1)}
}
.celebrate-title{
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);text-align:center;margin-bottom:8px;
}
.celebrate-headline{
  font-size:20px;font-weight:800;color:#fff;text-align:center;
  line-height:1.25;margin-bottom:20px;
}
.celebrate-metrics{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;
}
.celebrate-metric{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--radius-sm);padding:14px 12px;text-align:center;
}
.celebrate-metric-val{
  font-size:28px;font-weight:800;color:#fff;line-height:1;margin-bottom:4px;
}
.celebrate-metric-val.highlight{color:var(--gold)}
.celebrate-metric-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.6px}
.celebrate-bar{background:rgba(255,255,255,0.08);border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px}
.celebrate-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--green-light));transition:width 1.5s cubic-bezier(.22,1,.36,1)}
.celebrate-bar-labels{display:flex;justify-content:space-between;font-size:9px;font-weight:600;color:rgba(255,255,255,0.3)}
.celebrate-bar-labels span{color:var(--gold)}
.celebrate-msg{
  background:rgba(59,139,59,0.15);border:1px solid rgba(59,139,59,0.3);
  border-radius:var(--radius-sm);padding:12px 14px;
  font-size:12px;color:rgba(255,255,255,0.75);line-height:1.55;text-align:center;
}

/* ── PROGRESS ── */
.prog-wrap{padding:24px 20px 0}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.prog-label{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px}
.prog-pct{font-size:20px;font-weight:800;color:var(--navy)}
.prog-pct span{font-size:12px;color:var(--text-secondary);font-weight:600}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green-light));transition:width 1.2s cubic-bezier(.22,1,.36,1);position:relative}
.prog-fill::after{
  content:'';position:absolute;right:0;top:-1px;bottom:-1px;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));
  border-radius:0 3px 3px 0;
}
.prog-steps{display:flex;justify-content:space-between;margin-top:16px;gap:2px}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.prog-dot{
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;z-index:1;position:relative;transition:all .4s;
  background:var(--border-light);color:var(--text-muted);border:2px solid var(--border);
}
.prog-step.done .prog-dot{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px var(--green-glow)}
.prog-step.now .prog-dot{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-glow)}
.prog-step-label{font-size:7.5px;font-weight:700;color:var(--text-muted);text-align:center;line-height:1.15;max-width:48px;text-transform:uppercase;letter-spacing:.3px}
.prog-step.done .prog-step-label{color:var(--green)}
.prog-step.now .prog-step-label{color:var(--navy);font-weight:800}

/* ── STAGE CARD ── */
.sec{padding:20px 20px 0}
.sec-title{
  font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:12px;
}
.stage-card{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);overflow:hidden;
  border:1px solid var(--border-light);
}
.stage-top{padding:24px 20px 18px;display:flex;align-items:flex-start;gap:16px}
.stage-ico{
  width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;position:relative;
}
.stage-ico::after{
  content:'';position:absolute;inset:-2px;border-radius:18px;
  background:inherit;opacity:.15;z-index:-1;filter:blur(8px);
}
.stage-num{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stage-title{font-size:18px;font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:6px}
.stage-desc{font-size:13px;color:var(--text-secondary);line-height:1.6}
.stage-eta{
  background:var(--surface-alt);margin:0 16px 16px;border-radius:var(--radius-sm);
  padding:14px 16px;display:flex;align-items:center;gap:10px;
  border:1px solid var(--border-light);
}
.stage-eta-ico{font-size:16px}
.stage-eta-txt{font-size:13px;color:var(--navy);font-weight:600}

/* ── TIMELINE ── */
.timeline{padding:0 8px}
.tl-item{display:flex;gap:14px;padding:0 8px 0 4px;margin-bottom:2px}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.tl-dot{
  width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:all .3s;
}
.tl-dot.done{background:rgba(59,139,59,0.1);color:var(--green)}
.tl-dot.now{background:var(--gold);color:#fff;box-shadow:0 3px 12px var(--gold-glow)}
.tl-dot.wait{background:var(--border-light);color:var(--text-muted)}
.tl-line{width:2px;flex:1;margin:3px 0;border-radius:1px;transition:background .3s}
.tl-item.done .tl-line{background:linear-gradient(180deg,var(--green),var(--green))}
.tl-item.now .tl-line{background:linear-gradient(180deg,var(--gold),var(--border))}
.tl-item.wait .tl-line{background:var(--border-light)}
.tl-item:last-child .tl-line{display:none}
.tl-body{padding:4px 0 18px;flex:1}
.tl-row{display:flex;align-items:center;justify-content:space-between}
.tl-title{font-size:13px;font-weight:700;color:var(--navy)}
.tl-title.wait{color:var(--text-muted)}
.tl-badge{font-size:8px;font-weight:800;padding:3px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.tl-badge.done{background:rgba(59,139,59,0.1);color:#2E7D32}
.tl-badge.now{background:rgba(245,166,35,0.12);color:#B8860B}
.tl-badge.wait{background:var(--border-light);color:var(--text-muted)}
.tl-sub{font-size:11px;color:var(--text-secondary);line-height:1.5;margin-top:2px}

/* ── INFO CARDS ── */
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px 20px 0}
.info-card{
  background:var(--surface);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow-sm);border:1px solid var(--border-light);
}
.info-card-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.info-card-val{font-size:16px;font-weight:800;color:var(--navy)}
.info-card-val.small{font-size:12px;font-weight:700}

/* ── WA BUTTON ── */
.wa-wrap{padding:24px 20px 0}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;
  border:none;border-radius:var(--radius);padding:18px;width:100%;
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .25s;
  box-shadow:0 4px 20px rgba(37,211,102,0.25);
}
.wa-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(37,211,102,0.3)}
.wa-ico{font-size:22px}

/* ── FOOTER ── */
.footer{padding:32px 20px 0;text-align:center}
.footer-divider{width:40px;height:2px;background:var(--border);border-radius:1px;margin:0 auto 16px}
.footer-logo{height:18px;opacity:.25;margin-bottom:8px}
.footer-txt{font-size:10px;color:var(--text-muted);letter-spacing:.3px}

/* ── STATES ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.loading-spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--text-secondary);font-weight:600}
.error-wrap{padding:60px 24px;text-align:center}
.error-ico{font-size:48px;margin-bottom:16px;display:block}
.error-txt{font-size:14px;color:var(--text-secondary);font-weight:600;line-height:1.6}

/* ── ANIMATIONS ── */
.animate-in{opacity:0;transform:translateY(16px);animation:slideIn .5s ease forwards}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}}

/* ── CONFETTI (etapa 8) ── */
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(80px) rotate(360deg);opacity:0}
}
.confetti-piece{
  position:absolute;width:6px;height:6px;border-radius:1px;
  animation:confettiFall 1.8s ease-in forwards;
  pointer-events:none;
}
</style>
</head>

// ── Utilidades de data ──
function parseDateBR(str) {
  if (!str) return null;
  str = str.trim();
  // Aceita dd/mm/yyyy ou dd/mm/yy
  var parts = str.split('/');
  if (parts.length === 3) {
    var d = parseInt(parts[0],10);
    var m = parseInt(parts[1],10) - 1;
    var y = parseInt(parts[2],10);
    if (y < 100) y += 2000;
    var dt = new Date(y, m, d);
    return isNaN(dt.getTime()) ? null : dt;
  }
  // Tenta ISO yyyy-mm-dd
  var iso = new Date(str);
  return isNaN(iso.getTime()) ? null : iso;
}

function diffDays(d1, d2) {
  // d2 - d1 em dias inteiros
  var ms = d2.getTime() - d1.getTime();
  return Math.round(ms / (1000 * 60 * 60 * 24));
}

      + '<div class="celebrate-card"><div class="celebrate-inner">'
      + '<span class="celebrate-trophy">🏆</span>'

      + '</div></div></div>';

  var diasCorridos = diffDays(dtFecha, dtConclui);
  var diasAntesContrato = prazoContratual - diasCorridos;
  var diasAntesMeta = prazoMeta - diasCorridos;

  var html = '<div class="celebrate-wrap animate-in" style="animation-delay:.1s">'

    + '<div class="celebrate-bar-labels"><span>' + diasCorridos + 'd</span><span>' + prazoMeta + 'd meta</span><span style="color:var(--text-muted)">' + prazoContratual + 'd contrato</span></div>'
    + '<br>'

    + '</div></div></div>';

  return html;
}

// ── Confetti ──
function launchConfetti(container) {
  var colors = ['#F5A623','#3B8B3B','#58B868','#FFD580','#fff','#f5f5f5'];
  for (var i = 0; i < 28; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '0';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * 0.6) + 's';
        el.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
        el.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
        container.appendChild(el);
        setTimeout(function(){el.remove();}, 3000);
      }, i * 60);
    })(i);
  }
}

      +(k<si?'✓':ST[k].ico)+'</div><div class="tl-line"></div></div>'
      +'<div class="tl-body"><div class="tl-row"><div class="tl-title'+(tcls==='wait'?' wait':'')+'">'+ST[k].t+'</div>'
      +'<div class="tl-badge '+tcls+'">'+badgeText+'</div></div>'
      +'<div class="tl-sub">'+ST[k].d+(k===si?' · '+ST[k].eta:'')+'</div></div></div>';
  }
  tlHtml+='</div></div>';

  var infoHtml='<div class="info-row animate-in" style="animation-delay:.5s">';
  if(c.power) infoHtml+='<div class="info-card"><div class="info-card-label">Potência</div><div class="info-card-val">'+c.power+' kWp</div></div>';
  if(c.contract) infoHtml+='<div class="info-card"><div class="info-card-label">Contrato</div><div class="info-card-val small">'+c.contract+'</div></div>';
  if(c.dateStart) infoHtml+='<div class="info-card"><div class="info-card-label">Fechamento</div><div class="info-card-val small">'+c.dateStart+'</div></div>';
  if(c.dateEnd) infoHtml+='<div class="info-card"><div class="info-card-label">Ativação</div><div class="info-card-val small">'+c.dateEnd+'</div></div>';
  infoHtml+='</div>';

  var waMsg=encodeURIComponent('Olá! Sou '+c.name+' e gostaria de falar com a Polaris Solar sobre minha obra.');
  var waHtml='<div class="wa-wrap animate-in" style="animation-delay:.6s">'
    +'<a class="wa-btn" href="https://wa.me/5518996906474?text='+waMsg+'" target="_blank"><span class="wa-ico">💬</span> Falar com a Polaris</a></div>';

  var footerHtml='<div class="footer animate-in" style="animation-delay:.65s">'
    +'<div class="footer-divider"></div>'
    +'<div class="footer-txt">© 2026 Polaris Energia Solar | Pós-venda</div></div>';

  document.getElementById('app').innerHTML=heroHtml+celebrateHtml+progHtml+stageHtml+tlHtml+infoHtml+waHtml+footerHtml;

  // Animar barras
  setTimeout(function(){
    var pf=document.getElementById('progFill');
    if(pf) pf.style.width=pct+'%';
    var cb=document.getElementById('celebBar');
    if(cb){
      var dtFecha = parseDateBR(c.dateStart);
      var dtConclui = parseDateBR(c.dateEnd);
      if(dtFecha && dtConclui){
        var diasCorridos = diffDays(dtFecha, dtConclui);
        var pctBar = Math.min(100, Math.round((diasCorridos / 60) * 100));
        cb.style.width = pctBar + '%';
      }
    }
  }, 200);

  // Confetti se ativo
  if(isAtivo){
    var card = document.getElementById('celebrateCard');
    if(card) setTimeout(function(){ launchConfetti(card); }, 600);
  }
}

function fetchAndFind(url,pi,clientSlug){
  var fu=CORS_PROXIES[pi](url);
  fetch(fu,{redirect:'follow'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(csv){
    if(csv.indexOf('<!DOCTYPE')>-1||csv.indexOf('<html')>-1) throw new Error('HTML');
    var parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    if(!parsed.data||!parsed.data.length){renderError('Planilha vazia ou sem dados.');return;}
    var found=null;
    parsed.data.forEach(function(row){
      var name=row['Cliente']||row['cliente']||row['Nome']||row['nome']||'';
      if(slugify(name)===clientSlug){
        var si=0,ss=(row['Etapa Atual']||row['Etapa']||'').toString();
        if(ss.indexOf('8')>-1||ss.toLowerCase().indexOf('ativo')>-1) si=7;
        else if(ss.indexOf('7')>-1||ss.toLowerCase().indexOf('vistor')>-1) si=6;
        else if(ss.indexOf('6')>-1||ss.toLowerCase().indexOf('obra')>-1||ss.toLowerCase().indexOf('execu')>-1) si=5;
        else if(ss.indexOf('5')>-1||ss.toLowerCase().indexOf('entrega')>-1) si=4;
        else if(ss.indexOf('4')>-1||ss.toLowerCase().indexOf('compra')>-1) si=3;
        else if(ss.indexOf('3')>-1||ss.toLowerCase().indexOf('aprov')>-1) si=2;
        else if(ss.indexOf('2')>-1||ss.toLowerCase().indexOf('doc')>-1) si=1;
        found={
          name:name.trim(),
          power:row['Potência (kWp)']||row['Potencia']||row['kWp']||'',
          contract:row['Contrato']||row['contrato']||'',
          dateStart:row['Data Fechamento']||row['Data Inicio']||row['Data']||'',
          dateEnd:row['Data Conclusão']||row['Data Conclusao']||row['Data de conclusão']||row['Data de Conclusão']||row['Data de conclusao']||row['Data Ativacao']||row['Data Ativação']||'',
          stageIdx:si
        };
      }
    });
    if(found) renderClient(found);
    else renderError('Não encontramos uma obra com esse identificador.<br><br>Verifique o link ou entre em contato com a Polaris.');
  }).catch(function(e){
    if(pi<CORS_PROXIES.length-1) fetchAndFind(url,pi+1,clientSlug);
    else renderError('Não foi possível carregar os dados no momento.<br>Tente novamente em alguns instantes.');
  });
}

var clientId=getParam('id');
if(!clientId){
  renderError('Link inválido. Solicite seu link de acompanhamento à equipe Polaris.');
} else {
  fetchAndFind(SHEET_URL,0,clientId);
}
</script>
