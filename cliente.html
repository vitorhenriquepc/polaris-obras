<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#011D2E">
<title>Polaris Solar — Acompanhe sua Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#011D2E; --navy2:#06314a; --green:#3B8B3B; --gold:#F5A623;
  --bg:#081522; --card:rgba(255,255,255,.04); --line:rgba(255,255,255,.09);
  --txt:#eef4f9; --muted:#93a8ba;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--txt);min-height:100vh;
  background:radial-gradient(900px 500px at 50% -10%,#0d2c47 0%,transparent 60%),var(--bg);
  padding:0 16px 50px}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:60}
.wrap{max-width:560px;margin:0 auto}

/* header */
.head{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 0 8px}
.head img{height:34px;margin-bottom:18px}
.hi{font-size:24px;font-weight:800;letter-spacing:-.3px}
.hi span{color:var(--gold)}
.sub{color:var(--muted);font-size:13.5px;margin-top:3px}

/* status hero */
.hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px;margin:18px 0;
  text-align:center;backdrop-filter:blur(8px);position:relative;overflow:hidden}
.hero .ico{font-size:46px;line-height:1}
.hero .stg{font-size:21px;font-weight:800;margin-top:10px}
.hero .stgd{color:var(--muted);font-size:13.5px;margin-top:6px;line-height:1.5}
.prog{margin-top:18px}
.prog .bar{height:9px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden}
.prog .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:20px;
  transition:width 1s cubic-bezier(.2,.8,.2,1)}
.prog .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:8px;font-weight:600}

/* forecast */
.fc{display:flex;gap:12px;align-items:center;background:rgba(245,166,35,.09);border:1px solid rgba(245,166,35,.28);
  border-radius:14px;padding:14px 16px;margin-bottom:18px}
.fc .e{font-size:22px}
.fc .t{font-size:12px;color:var(--muted)}
.fc .d{font-size:16px;font-weight:800;color:var(--gold)}
.fc small{display:block;color:var(--muted);font-size:11px;margin-top:2px;font-weight:500}

/* action hint */
.hint{background:rgba(120,170,210,.08);border:1px solid rgba(120,170,210,.25);border-radius:14px;
  padding:13px 16px;margin-bottom:18px;font-size:13px;line-height:1.55}
.hint b{color:#9cc4e4}

/* timeline */
.tl{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:8px 18px;margin-bottom:18px}
.step{display:flex;gap:14px;padding:13px 0;position:relative}
.step:not(:last-child)::before{content:'';position:absolute;left:15px;top:34px;bottom:-4px;width:2px;background:var(--line)}
.step.done:not(:last-child)::before{background:var(--green)}
.dot{flex:0 0 32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;background:rgba(255,255,255,.06);border:2px solid var(--line);z-index:1}
.step.done .dot{background:var(--green);border-color:var(--green)}
.step.curr .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 5px rgba(245,166,35,.15);
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(245,166,35,.15)}50%{box-shadow:0 0 0 9px rgba(245,166,35,.05)}}
.step .info{padding-top:5px}
.step .nm{font-size:14px;font-weight:700}
.step.future .nm{color:var(--muted);font-weight:600}
.step .dt{font-size:11.5px;color:var(--muted);margin-top:2px}
.step.curr .nm{color:var(--gold)}

/* fotos */
.fotos{margin-bottom:18px}
.fotos h3{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.fotos .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;border:1px solid var(--line)}

/* celebration */
.celeb{background:linear-gradient(150deg,rgba(59,139,59,.18),rgba(245,166,35,.12));
  border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:26px 22px;text-align:center;margin-bottom:18px}
.celeb .big{font-size:40px}
.celeb .ttl{font-size:22px;font-weight:800;margin-top:8px}
.celeb .msg{font-size:14px;color:var(--txt);margin-top:10px;line-height:1.55}
.celeb .badge{display:inline-block;background:rgba(245,166,35,.18);border:1px solid var(--gold);color:var(--gold);
  font-weight:800;font-size:13px;padding:6px 14px;border-radius:20px;margin-top:14px}

/* CTA funnel */
.cta{display:flex;align-items:center;gap:13px;width:100%;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:15px 16px;margin-bottom:10px;text-decoration:none;color:var(--txt);transition:.15s;cursor:pointer}
.cta:hover{border-color:var(--gold);transform:translateY(-1px)}
.cta .e{font-size:24px}
.cta .tx b{display:block;font-size:14.5px;font-weight:700}
.cta .tx span{font-size:12px;color:var(--muted)}
.cta .arr{margin-left:auto;color:var(--muted);font-size:18px}
.sec-ttl{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:22px 4px 12px}

/* footer */
.foot{text-align:center;margin-top:26px}
.foot .wa{display:inline-flex;align-items:center;gap:8px;background:#1f8a4c;color:#fff;text-decoration:none;
  font-weight:700;font-size:14px;padding:13px 22px;border-radius:30px}
.foot p{color:var(--muted);font-size:11.5px;margin-top:16px}

/* states */
.center{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
.spin{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center .e{font-size:46px}
.center .m{color:var(--muted);font-size:14px;max-width:300px;line-height:1.5}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap" id="app">
  <div class="center"><div class="spin"></div><div class="m">Carregando sua obra...</div></div>
</div>

<script>
/* ===== CONFIG ===== */
const SUPABASE_URL = "https://dakubhcgohiwzyqiegqf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRha3ViaGNnb2hpd3p5cWllZ3FmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjExMTIsImV4cCI6MjA5Nzc5NzExMn0.Vdgp6B0TBVOSz-NT5vka9jXCdIT0iNhu1dbmvhLbWQ0";
const PRAZO_CONTRATUAL = 60;
const WHATSAPP_POSVENDA = "5518996906474";
const INDICA_URL  = "https://indica.polarisenergiasolar.com";
const MONITOR_URL = ""; // ⬅️ cole o link do app de monitoramento (deixe vazio p/ ocultar)
const REVIEW_URL  = ""; // ⬅️ cole o link de avaliação no Google (deixe vazio p/ ocultar)

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');
const LOGO = "https://obras.polarisenergiasolar.com/logo.png";

/* dica do que o cliente precisa fazer em cada etapa (opcional) */
const ACOES = {
  3:'Esta fase corre na <b>concessionária</b> — o prazo é dela. Estamos acompanhando de perto.',
  5:'Garanta um local para receber os equipamentos quando chegarem.',
  6:'Nossa equipe vai combinar com você o <b>acesso ao local</b> da instalação.',
  7:'A concessionária fará a <b>troca do medidor</b> — pode ser necessário acesso ao seu padrão.'
};

/* util */
const ET = {};
function getParam(n){return new URLSearchParams(location.search).get(n)||'';}
function parseDate(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d;}
function fmt(d){return d?String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear():'';}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function diffDays(a,b){return Math.round((b-a)/86400000);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function carregar(){
  const id = getParam('id');
  if(!id){ return erro('🔗','Link incompleto','Use o link completo que a Polaris te enviou, com o seu identificador.'); }
  try{
    const [etRes, obRes] = await Promise.all([
      sb.from('etapas').select('*').order('numero'),
      sb.rpc('get_obra_publica',{ p_slug:id })
    ]);
    if(etRes.error) throw etRes.error;
    if(obRes.error) throw obRes.error;
    (etRes.data||[]).forEach(e=>ET[e.numero]=e);
    if(!obRes.data){ return erro('😕','Obra não encontrada','Confira o link com a nossa equipe — pode ter havido um erro de digitação.'); }
    render(obRes.data);
  }catch(e){
    erro('⚠️','Não foi possível carregar','Tente novamente em instantes. Se continuar, fale com a gente no WhatsApp.');
  }
}

function erro(e,t,m){
  app.innerHTML=`<div class="center"><div class="e">${e}</div><div style="font-size:18px;font-weight:800">${t}</div>
    <div class="m">${m}</div>
    <a class="wa" style="margin-top:8px" href="https://wa.me/${WHATSAPP_POSVENDA}">💬 Falar com a Polaris</a></div>`;
}

function render(o){
  const et = o.etapa || ET[o.etapa_numero] || {};
  const n = o.etapa_numero;
  const pct = Math.round((Math.max(n,0)/8)*100);
  const dF = parseDate(o.data_fechamento);
  const dC = parseDate(o.data_conclusao);
  const primeiroNome = (o.cliente||'').split(' ')[0];

  let html = `<div class="head"><img src="${LOGO}" onerror="this.style.display='none'">
    <div class="hi">Olá, <span>${esc(primeiroNome)}</span>!</div>
    <div class="sub">Acompanhe a sua obra Polaris em tempo real</div></div>`;

  // hero
  html += `<div class="hero">
      <div class="ico">${et.icone||'☀️'}</div>
      <div class="stg">${esc((et.nome||'').replace('!',''))}</div>
      <div class="stgd">${esc(et.descricao||'')}</div>
      <div class="prog">
        <div class="bar"><div class="fill" style="width:0%" id="fill"></div></div>
        <div class="lbl"><span>Etapa ${n} de 8</span><span>${pct}%</span></div>
      </div>
    </div>`;

  // forecast (só antes de ativar)
  if(n>=1 && n<8 && dF){
    const prev = addDays(dF, PRAZO_CONTRATUAL);
    html += `<div class="fc"><div class="e">📅</div><div>
        <div class="t">Previsão de ativação</div>
        <div class="d">até ${fmt(prev)}</div>
        <small>dentro do prazo contratual de ${PRAZO_CONTRATUAL} dias</small>
      </div></div>`;
  }

  // celebration (ativo)
  if(n===8){
    let badge='', msg='Seu sistema já está gerando energia limpa e reduzindo sua conta. 🌱';
    if(dF&&dC){
      const dias=diffDays(dF,dC), antes=PRAZO_CONTRATUAL-dias;
      if(antes>0){ badge=`🚀 Entregue ${antes} dias antes do prazo`; msg=`Concluímos em <b>${dias} dias</b> — bem antes dos ${PRAZO_CONTRATUAL} dias do contrato!`; }
      else if(antes===0){ badge=`✅ Entregue no prazo`; msg=`Concluímos em exatamente <b>${dias} dias</b>.`; }
    }
    html += `<div class="celeb"><div class="big">🎉</div>
        <div class="ttl">Sistema Ativo!</div>
        <div class="msg">${msg}</div>
        ${badge?`<div class="badge">${badge}</div>`:''}
      </div>`;
  } else {
    // dica da etapa atual
    if(ACOES[n]) html += `<div class="hint"><b>👉 O que esperar agora:</b> ${ACOES[n]}</div>`;
  }

  // timeline
  html += `<div class="tl">`;
  const hist = {}; (o.historico||[]).forEach(h=>{ hist[h.etapa_numero]=h.entrou_em; });
  for(let i=1;i<=8;i++){
    const e=ET[i]||{}; const cls = i<n?'done': i===n?'curr':'future';
    const dot = i<n?'✓':(e.icone||'');
    const dt = hist[i]?('em '+fmt(parseDate(hist[i]))):'';
    html += `<div class="step ${cls}"><div class="dot">${dot}</div>
        <div class="info"><div class="nm">${esc((e.nome||'').replace('!',''))}</div>
        ${dt?`<div class="dt">${dt}</div>`:''}</div></div>`;
  }
  html += `</div>`;

  // fotos
  if(o.fotos && o.fotos.length){
    html += `<div class="fotos"><h3>📸 Fotos da sua instalação</h3><div class="grid">`;
    o.fotos.forEach(f=>{ html += `<img src="${esc(f.url)}" alt="${esc(f.legenda||'')}" loading="lazy">`; });
    html += `</div></div>`;
  }

  // funil pós-ativação
  if(n===8){
    html += `<div class="sec-ttl">Aproveite ao máximo sua energia solar</div>`;
    if(MONITOR_URL) html += cta('📲','Monitore sua geração','Veja quanto sua usina produz',MONITOR_URL);
    html += cta('🎁','Indique e Ganhe R$200','Indique amigos e receba por cada instalação',INDICA_URL);
    html += cta('🛠️','Plano de manutenção','Mantenha sua usina sempre no máximo',`https://wa.me/${WHATSAPP_POSVENDA}?text=${encodeURIComponent('Olá! Quero saber mais sobre os planos de manutenção (O&M) da Polaris.')}`);
    if(REVIEW_URL) html += cta('⭐','Avalie a Polaris','Conte como foi sua experiência',REVIEW_URL);
  }

  // footer
  html += `<div class="foot"><a class="wa" href="https://wa.me/${WHATSAPP_POSVENDA}?text=${encodeURIComponent('Olá! Tenho uma dúvida sobre a minha obra.')}">💬 Falar com a Polaris</a>
      <p>Polaris Energia Solar • Atualizado em tempo real</p></div>`;

  app.innerHTML = `<div class="wrap">${html}</div>`;
  setTimeout(()=>{ const f=document.getElementById('fill'); if(f) f.style.width=pct+'%'; }, 100);
  if(n===8) lancarConfete();
}

function cta(e,t,s,href){
  return `<a class="cta" href="${href}" target="_blank" rel="noopener"><div class="e">${e}</div>
    <div class="tx"><b>${t}</b><span>${s}</span></div><div class="arr">›</div></a>`;
}

/* confete simples */
function lancarConfete(){
  const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
  cv.width=innerWidth; cv.height=innerHeight;
  const cols=['#F5A623','#3B8B3B','#fff','#9cc4e4'];
  let parts=Array.from({length:120},()=>({x:Math.random()*cv.width,y:Math.random()*-cv.height,
    r:4+Math.random()*5,c:cols[Math.floor(Math.random()*cols.length)],
    vy:2+Math.random()*3,vx:-1+Math.random()*2,a:Math.random()*Math.PI}));
  let t=0;
  (function anim(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.a+=.1;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();});
    t++; if(t<260) requestAnimationFrame(anim); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* atualiza ao voltar pra aba e a cada 60s (sem precisar recarregar) */
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) carregar(); });
setInterval(()=>{ if(!document.hidden) carregar(); }, 60000);

carregar();
</script>
</body>
</html>
