<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#011D2E">
<title>Polaris Solar – Acompanhe sua Obra</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:raiz{
  --marinha:#011D2E;--marinha-média:#022C44;--marinha-leve:#0A3D5C;
  --verde:#3B8B3B;--luz-verde:#58B868;--brilho-verde:rgba(59,139,59,0.25);
  --gold:#F5A623;--gold-light:#FFD580;--gold-glow:rgba(245,166,35,0.3);
  --bg:#F7F8F6;--surface:#FFFFFF;--surface-alt:#F0F2ED;
  --texto:#022C44;--texto-secundário:#6B7D8A;--texto-silenciado:#9EABB5;
  --border:#E2E8EC;--border-light:#EEF1F4;
  --shadow-sm:0 1px 3px rgba(1,29,46,0.06);
  --shadow-md:0 4px 16px rgba(1,29,46,0.08);
  --shadow-lg:0 8px 32px rgba(1,29,46,0.12);
  --shadow-glow:0 4px 24px rgba(245,166,35,0.15);
  --raio:16px;--raio-pequeno:10px;--raio-grande:24px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html{scroll-behavior:smooth}
html,body{min-height:100%;background:var(--bg);font-family:'Manrope',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{padding-bottom:calc(40px + var(--safe-b))}

/* ── HERÓI ── */
.herói{
  fundo:var(--navy);
  padding:calc(var(--safe-t)+48px) 24px 40px;
  alinhamento-texto:centrado;
  posição:relativa;
  overflow:oculto;
}
.hero::before{
  conteúdo:'';posição:absoluta;inserção:0;
  fundo: gradiente radial (elipse em 30% -20%, rgba(59,139,59,0.12) 0%, transparente 50%),
              gradiente-radial(elipse em 70% -10%,rgba(245,166,35,0.10) 0%,transparente 50%);
  eventos-ponteiro:nenhum;
}
.herói::depois{
  conteúdo:'';posição:absoluta;inferior:0;esquerda:0;direita:0;altura:1px;
  fundo:linear-gradient(90deg,transparente,rgba(245,166,35,0.3),transparente);
}
.hero-logo{height:40px;margin:0 auto 28px;display:block;opacity:0;animation:fadeDown .6s ease .1s forwards}
.hero-tag{
  tamanho da fonte: 10px; peso da fonte: 700; espaçamento entre letras: 2px; transformação do texto: maiúsculas;
  cor:var(--gold);margem-inferior:12px;opacidade:0;animação:fadeDown .6s ease .2s forwards;
}
.nome-do-herói{
  tamanho da fonte: 26px; peso da fonte: 800; cor: #fff; espaçamento entre letras: -0,5px;
  altura da linha: 1,15; margem inferior: 6px; opacidade: 0; animação: fadeDown 0,6s ease 0,3s forwards;
}
.hero-sub{
  tamanho da fonte: 13px; cor: rgba(255,255,255,0.45); margem inferior: 24px;
  peso da fonte: 500; opacidade: 0; animação: fadeDown .6s ease .35s forwards;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  borda:1px sólida rgba(255,255,255,0.08);raio-da-borda:50px;
  preenchimento:10px 20px;tamanho da fonte:13px;peso da fonte:700;cor:#fff;
  opacidade:0;animação:fadeUp .6s ease .45s para a frente;
}
.hero-badge-dot{
  largura:8px;altura:8px;raio da borda:50%;fundo:var(--gold);
  box-shadow:0 0 12px var(--gold-glow);animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD CELEBRAÇÃO (entrega antecipada) ── */
.celebrate-wrap{padding:20px 20px 0}
.celebrate-card{
  fundo:gradiente-linear(135deg,#012E1A 0%,#014d29 50%,#022C44 100%);
  raio da fronteira:var(--radius-lg);
  borda:1px sólida rgba(59,139,59,0.35);
  box-shadow:0 8px 32px rgba(59,139,59,0.2),0 2px 8px rgba(0,0,0,0.3);
  overflow:oculto;
  posição:relativa;
}
.celebrate-card::before{
  conteúdo:'';posição:absoluta;inserção:0;
  fundo:gradiente radial(elipse em 80% -10%,rgba(245,166,35,0.12) 0%,transparente 60%),
             gradiente-radial(elipse em 10% 110%,rgba(59,139,59,0.15) 0%,transparente 50%);
  eventos-ponteiro:nenhum;
}
.celebrate-inner{position:relative;z-index:1;padding:24px 20px 20px}
.celebrate-trophy{
  tamanho da fonte: 40px; exibição: bloco; alinhamento do texto: centro; margem inferior: 16px;
  animação:bounceEm .8s cubic-bezier(.34,1.56,.64,1) .2s ambos;
}
@keyframes bounceIn{
  0%{opacidade:0;transformação:escala(0.3)}
  50%{transform:scale(1.1)}
  100%{opacidade:1;transformação:escala(1)}
}
.celebrate-title{
  tamanho da fonte: 13px; peso da fonte: 700; espaçamento entre letras: 1,5px; transformação do texto: maiúsculas;
  cor:var(--dourado);alinhamento-texto:centro;margem-inferior:8px;
}
.celebrate-headline{
  tamanho da fonte: 20px; peso da fonte: 800; cor: #fff; alinhamento do texto: centralizado;
  altura-da-linha:1,25;margem-inferior:20px;
}
.celebrate-metrics{
  exibição:grade;colunas-template-grade:1fr 1fr;espaçamento:10px;margem-inferior:20px;
}
.celebrate-metric{
  fundo:rgba(255,255,255,0.06);borda:1px sólida rgba(255,255,255,0.08);
  border-radius:var(--radius-sm);padding:14px 12px;text-align:center;
}
.celebrate-metric-val{
  tamanho da fonte: 28px; peso da fonte: 800; cor: #fff; altura da linha: 1; margem inferior: 4px;
}
.celebrate-metric-val.highlight{color:var(--gold)}
.celebrate-metric-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.6px}
.celebrate-bar{background:rgba(255,255,255,0.08);border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px}
.celebrate-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--green-light));transition:width 1.5s cubic-bezier(.22,1,.36,1)}
.celebrate-bar-labels{display:flex;justify-content:space-between;font-size:9px;font-weight:600;color:rgba(255,255,255,0.3)}
.celebrate-bar-labels span{color:var(--gold)}
.celebrate-msg{
  fundo:rgba(59,139,59,0.15);borda:1px sólida rgba(59,139,59,0.3);
  border-radius:var(--radius-sm);padding:12px 14px;
  tamanho da fonte: 12px; cor: rgba(255,255,255,0.75); altura da linha: 1.55; alinhamento do texto: centro;
}

/* ── PROGRESSO ── */
.prog-wrap{padding:24px 20px 0}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.prog-label{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px}
.prog-pct{font-size:20px;font-weight:800;color:var(--navy)}
.prog-pct span{font-size:12px;color:var(--text-secondary);font-weight:600}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--green-light));transition:width 1.2s cubic-bezier(.22,1,.36,1);position:relative}
.prog-fill::after{
  conteúdo:'';posição:absoluta;direita:0;topo:-1px;inferior:-1px;largura:20px;
  fundo:linear-gradient(90deg,transparent,rgba(255,255,255,0.4));
  raio-da-borda:0 3px 3px 0;
}
.prog-steps{display:flex;justify-content:space-between;margin-top:16px;gap:2px}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.prog-dot{
  largura:24px;altura:24px;raio da borda:50%;exibição:flexível;alinhamento dos itens:centro;justificação do conteúdo:centro;
  tamanho da fonte: 9px; peso da fonte: 800; índice z: 1; posição: relativa; transição: todas .4s;
  fundo:var(--border-light);cor:var(--text-muted);borda:2px sólida var(--border);
}
.prog-step.done .prog-dot{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px var(--green-glow)}
.prog-step.now .prog-dot{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-glow)}
.prog-step-label{font-size:7.5px;font-weight:700;color:var(--text-muted);text-align:center;line-height:1.15;max-width:48px;text-transform:uppercase;letter-spacing:.3px}
.prog-step.done .prog-step-label{color:var(--green)}
.prog-step.now .prog-step-label{color:var(--navy);font-weight:800}

/* ── CARTÃO DE PALCO ── */
.sec{padding:20px 20px 0}
.sec-title{
  tamanho da fonte: 10px; peso da fonte: 700; cor: var(--texto mudo); transformação do texto: maiúsculas;
  espaçamento entre letras: 1,2px; margem inferior: 12px;
}
.stage-card{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);overflow:hidden;
  borda:1px sólida var(--border-light);
}
.stage-top{padding:24px 20px 18px;display:flex;align-items:flex-start;gap:16px}
.stage-ico{
  largura:52px;altura:52px;raio da borda:16px;exibição:flexível;alinhamento dos itens:centro;justificação do conteúdo:centro;
  tamanho da fonte: 24px; flex-shrink: 0; posição: relativa;
}
.stage-ico::after{
  conteúdo:'';posição:absoluta;inserção:-2px;raio-da-borda:18px;
  fundo:inherit;opacidade:.15;z-index:-1;filtro:blur(8px);
}
.stage-num{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stage-title{font-size:18px;font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:6px}
.stage-desc{font-size:13px;color:var(--text-secondary);line-height:1.6}
.stage-eta{
  fundo:var(--surface-alt);margem:0 16px 16px;borda-raio:var(--radius-sm);
  preenchimento:14px 16px;exibição:flex;alinhamento-itens:centro;espaçamento:10px;
  borda:1px sólida var(--border-light);
}
.stage-eta-ico{font-size:16px}
.stage-eta-txt{font-size:13px;color:var(--navy);font-weight:600}

/* ── LINHA DO TEMPO ── */
.timeline{padding:0 8px}
.tl-item{display:flex;gap:14px;padding:0 8px 0 4px;margin-bottom:2px}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:32px}
.tl-ponto{
  largura:32px;altura:32px;raio da borda:10px;exibição:flexível;alinhamento dos itens:centro;justificação do conteúdo:centro;
  tamanho da fonte: 14px; flex-shrink: 0; transição: todas .3s;
}
.tl-dot.done{background:rgba(59,139,59,0.1);color:var(--green)}
.tl-dot.now{background:var(--gold);color:#fff;box-shadow:0 3px 12px var(--gold-glow)}
.tl-dot.wait{background:var(--border-light);color:var(--text-muted)}
.tl-line{width:2px;flex:1;margin:3px 0;border-radius:1px;transition:background .3s}
.tl-item.done .tl-line{background:linear-gradient(180deg,var(--green),var(--green))}
.tl-item.now .tl-line{background:linear-gradient(180deg,var(--gold),var(--border))}
.tl-item.wait .tl-line{background:var(--border-light)}
.tl-item:last-child .tl-line{display:none}
.tl-body{padding:4px 0 18px;flex:1}
.tl-row{display:flex;align-items:center;justify-content:space-between}
.tl-title{font-size:13px;font-weight:700;color:var(--navy)}
.tl-title.wait{color:var(--text-muted)}
.tl-badge{font-size:8px;font-weight:800;padding:3px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.tl-badge.done{background:rgba(59,139,59,0.1);color:#2E7D32}
.tl-badge.now{background:rgba(245,166,35,0.12);color:#B8860B}
.tl-badge.wait{background:var(--border-light);color:var(--text-muted)}
.tl-sub{font-size:11px;color:var(--text-secondary);line-height:1.5;margin-top:2px}

/* ── CARTÕES DE INFORMAÇÃO ── */
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px 20px 0}
.info-card{
  fundo:var(--surface);borda-raio:var(--radius);preenchimento:16px;
  box-shadow:var(--shadow-sm);border:1px solid var(--border-light);
}
.info-card-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.info-card-val{font-size:16px;font-weight:800;color:var(--navy)}
.info-card-val.small{font-size:12px;font-weight:700}

/* ── BOTÃO WA ── */
.wa-wrap{padding:24px 20px 0}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  fundo:gradiente-linear(135deg,#25D366,#128C7E);cor:#fff;
  borda:nenhuma;raio-da-borda:var(--radius);preenchimento:18px;largura:100%;
  font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .25s;
  box-shadow:0 4px 20px rgba(37,211,102,0.25);
}
.wa-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(37,211,102,0.3)}
.wa-ico{font-size:22px}

/* ── RODAPÉ ── */
.footer{padding:32px 20px 0;text-align:center}
.footer-divider{width:40px;height:2px;background:var(--border);border-radius:1px;margin:0 auto 16px}
.footer-logo{height:18px;opacity:.25;margin-bottom:8px}
.footer-txt{font-size:10px;color:var(--text-muted);letter-spacing:.3px}

/* ── ESTADOS ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.loading-spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--text-secondary);font-weight:600}
.error-wrap{padding:60px 24px;text-align:center}
.error-ico{font-size:48px;margin-bottom:16px;display:block}
.error-txt{font-size:14px;color:var(--text-secondary);font-weight:600;line-height:1.6}

/* ── ANIMAÇÕES ── */
.animate-in{opacity:0;transform:translateY(16px);animation:slideIn .5s ease forwards}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}}

/* ── CONFETTI (etapa 8) ── */
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(80px) rotate(360deg);opacity:0}
}
.confetti-piece{
  posição:absoluta;largura:6px;altura:6px;raio da borda:1px;
  animação:confettiFall 1.8s de suavização para a frente;
  eventos-ponteiro:nenhum;
}
</style>
</head>

// ── Utilitários de dados ──
função parseDateBR(str) {
  se (!str) retornar nulo;
  str = str.trim();
  // Aceita dd/mm/aaaa ou dd/mm/aa
  var parts = str.split('/');
  se (partes.comprimento === 3) {
    var d = parseInt(partes[0],10);
    var m = parseInt(partes[1],10) - 1;
    var y = parseInt(partes[2],10);
    se (y < 100) y += 2000;
    var dt = new Date(y, m, d);
    retornar isNaN(dt.getTime()) ? null : dt;
  }
  // Tenta ISO aaaa-mm-dd
  var iso = new Date(str);
  retornar isNaN(iso.getTime()) ? nulo: iso;
}

função diffDays(d1, d2) {
  // d2 - d1 em dias inteiros
  var ms = d2.getTime() - d1.getTime();
  retorne Math.round(ms / (1000 * 60 * 60 * 24));
}

// ── Cartão de celebração ──
função construirCartãoCelebração(c) {
  var prazoContratual = 60;
  var prazoMeta = 30;
  var dtFecha = parseDateBR(c.dateStart);
  var dtConclui = parseDateBR(c.dateEnd);

  // Se não tiver dados, mostra cartão simples
  se (!dtFecha || !dtConclui) {
    retornar '<div class="celebrate-wrap animate-in" style="animation-delay:.1s">'
      + '<div class="celebrate-card"><div class="celebrate-inner">'
      + '<span class="celebrate-trophy">🏆</span>'
      + '<div class="celebrate-title">Obra Concluída</div>'
      + '<div class="celebrate-headline">Seu sistema está ativo e gerando energia! ☀️</div>'
      + '<div class="celebrate-msg">Parabéns pela escolha pela energia solar. A Polaris agradece a confiança e está sempre à disposição.</div>'
      + '</div></div></div>';
  }

  var diasCorridos = diffDays(dtFecha, dtConclui);
  var diasAntesContrato = prazoContratual - diasCorridos;
  var diasAntesMeta = prazoMeta - diasCorridos;

  var pct = Math.min(100, Math.round((diasCorridos / prazoContratual) * 100));

  var título = '';
  var msgTxt = '';

  se (diasAntesContrato > 0) {
    headline = 'Entregamos <strong>' + diasAntesContrato + ' dias antes</strong> do prazo! 🚀';
    msgTxt = 'Seu sistema foi ativado em <strong>' + diasCorridos + ' dias</strong> — ' + diasAntesContrato + ' dias antes do prazo contratual de 60 dias. Isso é a Polaris comprometida com você!';
  } else if (diasAntesContrato === 0) {
    headline = 'Entregamos <strong>no prazo exato</strong>! ✅';
    msgTxt = 'Seu sistema foi ativado em exatamente <strong>' + diasCorridos + ' dias</strong>, dentro do prazo contratual. Obrigado pela confiança!';
  } outro {
    headline = 'Obra concluída! ☀️';
    msgTxt = 'Seu sistema foi ativado e está gerando energia limpa. A equipe Polaris agradece a confiança!';
  }

  var html = '<div class="celebrate-wrap animate-in" style="animation-delay:.1s">'
    + '<div class="celebrate-card" id="celebrateCard"><div class="celebrate-inner">'
    + '<span class="celebrate-trophy">🏆</span>'
    + '<div class="celebrate-title">Obra Concluída com Sucesso</div>'
    + '<div class="celebrate-headline">' + título + '</div>'
    + '<div class="celebrate-metrics">'
    + '<div class="celebrate-metric"><div class="celebrate-metric-val highlight">' + diasCorridos + '<small style="font-size:14px;font-weight:700"> dias</small></div><div class="celebrate-metric-label">Tempo de obra</div></div>'
    + '<div class="celebrate-metric"><div class="celebrate-metric-val highlight">' + (diasAntesContrato > 0 ? diasAntesContrato : 0) + '<small style="font-size:14px;font-weight:700"> dias</small></div><div class="celebrate-metric-label">Antes do prazo</div></div>'
    + '</div>'
    + '<div class="celebrate-bar"><div class="celebrate-bar-fill" id="celebBar" style="width:0%"></div></div>'
    + '<div class="celebrate-bar-labels"><span>' + diasCorridos + 'd</span><span>' + prazoMeta + 'd meta</span><span style="color:var(--text-muted)">' + prazoContratual + 'd contrato</span></div>'
    + '<br>'
    + '<div class="celebrate-msg">' + msgTxt + '</div>'
    + '</div></div></div>';

  retornar html;
}

// ── Confete ──
função lançarConfetti(container) {
  var cores = ['#F5A623','#3B8B3B','#58B868','#FFD580','#fff','#f5f5f5'];
  for (var i = 0; i < 28; i++) {
    (função(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '0';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDelay = (Math.random() * 0.6) + 's';
        el.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
        el.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
        container.appendChild(el);
        setTimeout(function(){el.remove();}, 3000);
      }, i * 60);
    })(eu);
  }
}

função slugify(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

  if(c.dateStart) infoHtml+='<div class="info-card"><div class="info-card-label">Fechamento</div><div class="info-card-val small">'+c.dateStart+'</div></div>';
  if(c.dateEnd) infoHtml+='<div class="info-card"><div class="info-card-label">Ativação</div><div class="info-card-val small">'+c.dateEnd+'</div></div>';
  infoHtml+='</div>';

  var waMsg=encodeURIComponent('Olá! Sou '+c.name+' e gostaria de falar com a Polaris Solar sobre minha obra.');
  var waHtml='<div class="wa-wrap animate-in" style="animation-delay:.6s">'
    +'<a class="wa-btn" href="https://wa.me/5518996906474?text='+waMsg+'" target="_blank"><span class="wa-ico">💬</span> Falar com a Polaris</a></div>';

  var footerHtml='<div class="footer animate-in" style="animation-delay:.65s">'
    +'<div class="footer-divider"></div>'
    +'<div class="footer-txt">© 2026 Polaris Energia Solar | Pós-venda</div></div>';

  document.getElementById('app').innerHTML=heroHtml+celebrateHtml+progHtml+stageHtml+tlHtml+infoHtml+waHtml+footerHtml;

  // Animar participantes
  setTimeout(function(){
    var pf=document.getElementById('progFill');
    se(pf) pf.style.width=pct+'%';
    var cb=document.getElementById('celebBar');
    se(cb){
      var dtFecha = parseDateBR(c.dateStart);
      var dtConclui = parseDateBR(c.dateEnd);
      se(dtFecha && dtConclui){
        var diasCorridos = diffDays(dtFecha, dtConclui);
        var pctBar = Math.min(100, Math.round((diasCorridos / 60) * 100));
        cb.style.width = pctBar + '%';
      }
    }
  }, 200);

  // Confetti se ativo
  se(éAtivo){
    var card = document.getElementById('celebrateCard');
    if(card) setTimeout(function(){ launchConfetti(card); }, 600);
  }
}

função buscarEAencontrar(url,pi,clientSlug){
  var fu=CORS_PROXIES[pi](url);
  buscar(fu,{redirecionar:'seguir'}).então(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    retornar r.texto();
  }).then(function(csv){
    if(csv.indexOf('<!DOCTYPE')>-1||csv.indexOf('<html')>-1) throw new Error('HTML');
    var parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    if(!parsed.data||!parsed.data.length){renderError('Planilha vazia ou sem dados.');return;}
    var encontrado=nulo;
    analisado.dados.paraCada(função(linha){
      var nome=linha['Cliente']||linha['cliente']||linha['Nome']||linha['nome']||'';
      se(slugify(nome)===clientSlug){
        var si=0,ss=(row['Etapa Atual']||row['Etapa']||'').toString();
        if(ss.indexOf('8')>-1||ss.toLowerCase().indexOf('ativo')>-1) si=7;
        senão se(ss.indexOf('7')>-1||ss.toLowerCase().indexOf('vistor')>-1) si=6;
        senão se(ss.indexOf('6')>-1||ss.toLowerCase().indexOf('obra')>-1||ss.toLowerCase().indexOf('execu')>-1) si=5;
        senão se(ss.indexOf('5')>-1||ss.toLowerCase().indexOf('entrega')>-1) si=4;
        senão se(ss.indexOf('4')>-1||ss.toLowerCase().indexOf('compra')>-1) si=3;
        senão se(ss.indexOf('3')>-1||ss.toLowerCase().indexOf('aprov')>-1) si=2;
        senão se(ss.indexOf('2')>-1||ss.toLowerCase().indexOf('doc')>-1) si=1;
        encontrado={
          nome:nome.aparar(),
          potência:row['Potência (kWp)']||row['Potência']||row['kWp']||'',
          contrato:linha['Contrato']||linha['contrato']||'',
          dateStart:row['Data Fechamento']||row['Data Inicio']||row['Data']||'',
          dateEnd:row['Data de conclusão']||row['Data de conclusão']||row['Data de conclusão']||row['Data de conclusão']||row['Data de conclusão']||row['Data de conclusão']||row['Data de conclusão']||'',
          stageIdx:si
        };
      }
    });
    se(encontrado) renderizarCliente(encontrado);
    else renderError('Não encontrei uma obra com esse identificador.<br><br>Verifique o link ou entre em contato com o Polaris.');
  }).catch(function(e){
    if(pi<CORS_PROXIES.length-1) fetchAndFind(url,pi+1,clientSlug);
    else renderError('Não foi possível carregar os dados no momento.<br>Tente novamente em alguns instantes.');
  });
}

} outro {

}
