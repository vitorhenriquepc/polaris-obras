<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04141F">
<title>Acompanhamento de Obra — Polaris Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#04141F; --navy2:#0A2536; --ink:#0E2438;
  --gold:#D6A518; --green:#3B8B3B; --green-l:#58B868;
  --paper:#F4F4F1; --card:#FFFFFF; --line:#E4E4DE;
  --txt:#22323E; --mut:#7A8893;
}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--paper);color:var(--txt);-webkit-font-smoothing:antialiased}
img{display:block}

/* ===== HERO ===== */
.hero{background:
radial-gradient(900px 420px at 85% -10%, rgba(214,165,24,.15) 0%, transparent 55%),
radial-gradient(700px 500px at -10% 110%, rgba(59,139,59,.12) 0%, transparent 55%),
linear-gradient(165deg,var(--navy) 0%,#0B2C42 100%);
color:#fff;padding:40px 24px 92px;position:relative;overflow:hidden}
.hero .in{max-width:760px;margin:0 auto;text-align:center;position:relative}
.hero img.lg{height:40px;margin:0 auto 34px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.35))}
.hero .kicker{font-size:10.5px;font-weight:700;letter-spacing:4.5px;color:var(--gold);text-transform:uppercase}
.hero h1{font-size:clamp(28px,6.5vw,44px);font-weight:800;letter-spacing:-.5px;margin:12px 0 6px;line-height:1.1}
.hero .sub{font-size:13px;color:rgba(255,255,255,.6);font-weight:600}
/* anel de progresso */
.ringWrap{margin:34px auto 0;width:168px;height:168px;position:relative}
.ringWrap svg{transform:rotate(-90deg)}
.ringWrap .tk{stroke:rgba(255,255,255,.1)}
.ringWrap .pr{stroke:url(#gradRing);stroke-linecap:round;transition:stroke-dashoffset 1.4s cubic-bezier(.3,.8,.3,1)}
.ringTxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringTxt .p{font-size:36px;font-weight:800;letter-spacing:-1px}
.ringTxt .p small{font-size:16px;font-weight:700;color:var(--gold)}
.ringTxt .l{font-size:9.5px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-top:3px}
.heroTag{display:inline-flex;align-items:center;gap:8px;margin-top:24px;background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.15);border-radius:40px;padding:9px 18px;font-size:12.5px;font-weight:700}
.heroTag .d{color:var(--green-l)}
.heroTag.done{background:rgba(59,139,59,.2);border-color:rgba(88,184,104,.5)}

/* ===== CONTEÚDO ===== */
.wrap{max-width:760px;margin:0 auto;padding:0 20px 40px}
.pull{margin-top:-52px;position:relative;z-index:2}
.statCard{background:var(--card);border:1px solid var(--line);border-radius:20px;
display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));overflow:hidden;
box-shadow:0 22px 60px rgba(14,36,56,.12)}
.stat{padding:20px 18px;border-right:1px solid var(--line);text-align:center}
.stat:last-child{border-right:none}
.stat .k{font-size:9.5px;font-weight:800;letter-spacing:2px;color:var(--mut);text-transform:uppercase}
.stat .v{font-size:18px;font-weight:800;color:var(--ink);margin-top:7px}
.stat .v small{font-size:11.5px;color:var(--mut);font-weight:700}
@media(max-width:560px){.stat{border-right:none;border-bottom:1px solid var(--line)}.stat:last-child{border-bottom:none}}

section{padding:52px 0 0}
.shead{margin-bottom:26px}
.shead .n{font-size:11px;font-weight:800;letter-spacing:3.5px;color:var(--gold);text-transform:uppercase}
.shead h2{font-size:clamp(20px,4vw,26px);font-weight:800;color:var(--ink);margin-top:7px;letter-spacing:-.3px}

/* ===== TIMELINE ===== */
.tl{position:relative;padding-left:4px}
.step{display:flex;gap:18px;position:relative;padding-bottom:6px}
.step .col{display:flex;flex-direction:column;align-items:center}
.step .dot{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:17px;flex-shrink:0;border:2px solid var(--line);background:var(--card);z-index:1;transition:.3s}
.step .bar{width:2px;flex:1;background:var(--line);min-height:26px}
.step:last-child .bar{display:none}
.step .bx{flex:1;padding:6px 0 26px}
.step .tt{font-size:15px;font-weight:800;color:var(--mut);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.step .ds{font-size:12.5px;color:var(--mut);margin-top:5px;line-height:1.55;max-width:520px}
.step .dtx{font-size:11px;font-weight:700;color:var(--mut);margin-top:7px;letter-spacing:.3px}
.badgeNow{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
background:rgba(214,165,24,.14);color:#9a7a10;border:1px solid rgba(214,165,24,.4);border-radius:20px;padding:3px 9px}
/* concluída */
.step.done .dot{background:var(--green);border-color:var(--green);color:#fff;font-size:15px}
.step.done .bar{background:var(--green)}
.step.done .tt{color:var(--ink)}
/* atual */
.step.now .dot{background:#fff;border-color:var(--gold);box-shadow:0 0 0 6px rgba(214,165,24,.15);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(214,165,24,.15)}50%{box-shadow:0 0 0 10px rgba(214,165,24,.06)}}
.step.now .tt{color:var(--ink);font-size:16px}
.step.now .bx{background:linear-gradient(180deg,#fff, #FDFCF7);border:1px solid rgba(214,165,24,.35);
border-radius:16px;padding:16px 18px 18px;margin-bottom:22px;box-shadow:0 14px 40px rgba(214,165,24,.1)}

/* ===== FOTOS ===== */
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fgrid .ph{border-radius:14px;overflow:hidden;aspect-ratio:1/1;cursor:zoom-in;background:#e3e5e0;transition:.3s}
.fgrid .ph img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.fgrid .ph:hover img{transform:scale(1.05)}
@media(max-width:560px){.fgrid{gap:7px}.fgrid .ph{border-radius:11px}}
.btnRel{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;
background:var(--navy);color:#fff;border-radius:14px;padding:16px;font-size:14px;font-weight:800;
text-decoration:none;transition:.25s;box-shadow:0 14px 36px rgba(4,20,31,.25)}
.btnRel:hover{transform:translateY(-2px)}
.btnRel .a{color:var(--gold)}

/* ===== AJUDA ===== */
.help{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:26px;
display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:52px}
.help .ic{width:48px;height:48px;border-radius:14px;background:rgba(59,139,59,.12);
display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.help b{font-size:14.5px;color:var(--ink)}
.help p{font-size:12.5px;color:var(--mut);margin-top:3px;line-height:1.5}
.help a{margin-left:auto;background:var(--green);color:#fff;text-decoration:none;border-radius:12px;
padding:12px 20px;font-size:13px;font-weight:800;white-space:nowrap}
@media(max-width:560px){.help a{margin-left:0;width:100%;text-align:center}}

/* ===== FOOTER ===== */
footer{background:var(--navy);color:#fff;padding:52px 22px 36px;margin-top:64px;text-align:center}
footer img{height:36px;margin:0 auto 22px}
footer .c{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.85);margin:4px 0}
footer .c b{color:var(--gold)}
footer .site{margin-top:18px;font-size:12.5px;letter-spacing:1.5px;color:rgba(255,255,255,.55)}
footer .site b{color:#fff}

/* ===== LIGHTBOX ===== */
.lb{position:fixed;inset:0;background:rgba(3,13,21,.96);z-index:100;display:none;
align-items:center;justify-content:center;flex-direction:column}
.lb.on{display:flex}
.lb img{max-width:94vw;max-height:80vh;object-fit:contain;border-radius:8px;animation:zin .25s ease}
@keyframes zin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.lb .cnt{color:rgba(255,255,255,.45);font-size:11px;font-weight:700;letter-spacing:2px;margin-top:14px}
.lb button{position:fixed;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
color:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center}
.lb .x{top:16px;right:16px;width:42px;height:42px;border-radius:50%;font-size:16px}
.lb .nav{top:50%;transform:translateY(-50%);width:44px;height:60px;border-radius:13px;font-size:20px}
.lb .pv{left:10px}.lb .nx{right:10px}

.rv{opacity:0;transform:translateY(16px);transition:opacity .65s ease,transform .65s ease}
.rv.on{opacity:1;transform:none}
.center{max-width:760px;margin:0 auto;text-align:center;padding:110px 30px;color:var(--mut)}
</style>
</head>
<body>
<div id="root"><div class="center">⏳ Carregando sua obra...</div></div>

<script>
var sb=supabase.createClient('https://dakubhcgohiwzyqiegqf.supabase.co','sb_publishable_hue0wC6DINtAaxTPlSIOIg_X1Tr0vJx');
var SLUG=new URLSearchParams(location.search).get('id');
var LOGO='https://obras.polarisenergiasolar.com/logo.png';
var WHATS='5518930852573';
var D=null, GAL=[], gi=0;

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dataBR(s){if(!s)return null;var d=new Date(String(s).length<=10?s+'T12:00:00':s);return isNaN(d)?null:d.toLocaleDateString('pt-BR');}

async function boot(){
  if(!SLUG){document.getElementById('root').innerHTML='<div class="center">🔗 Link incompleto. Confira o endereço recebido.</div>';return;}
  var r=await sb.rpc('get_acompanhamento',{p_slug:SLUG});
  if(r.error||!r.data){document.getElementById('root').innerHTML='<div class="center">🔒 Obra não encontrada. Confira o link com nossa equipe.</div>';return;}
  D=r.data; render();
}

function render(){
  var o=D.obra, ET=D.etapas||[], HIST=D.historico||[], FD=D.fotos_destaque||[];
  var num=o.etapa_numero||0;
  var pct=Math.round(num/8*100);
  var fim=num>=8;
  // datas por etapa (primeira entrada de cada)
  var quando={};
  HIST.forEach(function(h){ if(!quando[h.etapa_numero]) quando[h.etapa_numero]=h.entrou_em; });

  var h='';
  /* HERO */
  h+='<div class="hero"><div class="in">'
    +'<img class="lg" src="'+LOGO+'" onerror="this.style.display=\'none\'">'
    +'<div class="kicker">Acompanhamento de obra</div>'
    +'<h1>'+esc(o.cliente)+'</h1>'
    +'<div class="sub">'+(o.contrato?'Contrato Nº '+esc(o.contrato)+' · ':'')+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' kWp':'')+'</div>'
    +'<div class="ringWrap">'
    +'<svg width="168" height="168" viewBox="0 0 168 168">'
    +'<defs><linearGradient id="gradRing" x1="0" y1="0" x2="1" y2="1">'
    +'<stop offset="0%" stop-color="#58B868"/><stop offset="100%" stop-color="#D6A518"/></linearGradient></defs>'
    +'<circle class="tk" cx="84" cy="84" r="74" fill="none" stroke-width="10"/>'
    +'<circle class="pr" id="ring" cx="84" cy="84" r="74" fill="none" stroke-width="10" stroke-dasharray="465" stroke-dashoffset="465"/>'
    +'</svg>'
    +'<div class="ringTxt"><div class="p">'+pct+'<small>%</small></div><div class="l">'+(fim?'Concluída':'Em progresso')+'</div></div>'
    +'</div>';
  var etAtual=ET.find(function(e){return e.numero===num})||{};
  h+='<div class="heroTag '+(fim?'done':'')+'"><span class="d">●</span> '
    +(fim?'Sistema ativo e gerando energia ☀️':(etAtual.icone||'')+' Etapa atual: '+esc((etAtual.nome||'').replace('!','')))
    +'</div>'
    +'</div></div>';

  /* STATS */
  h+='<div class="wrap"><div class="pull"><div class="statCard">'
    +'<div class="stat"><div class="k">Potência</div><div class="v">'+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' <small>kWp</small>':'—')+'</div></div>'
    +'<div class="stat"><div class="k">Módulos</div><div class="v">'+(o.qtd_modulos?o.qtd_modulos+' <small>unid.</small>':'—')+'</div></div>'
    +'<div class="stat"><div class="k">Início</div><div class="v">'+(dataBR(o.data_fechamento)||'—')+'</div></div>'
    +'<div class="stat"><div class="k">'+(fim?'Ativação':'Previsão')+'</div><div class="v">'+(fim?(dataBR(o.data_conclusao)||'—'):'até 60 dias')+'</div></div>'
    +'</div></div>';

  /* TIMELINE */
  h+='<section class="rv"><div class="shead"><div class="n">Linha do tempo</div><h2>A jornada da sua energia</h2></div><div class="tl">';
  ET.forEach(function(e){
    var st = e.numero<num?'done':(e.numero===num?(fim?'done':'now'):'');
    if(fim&&e.numero===8) st='done';
    var dt=quando[e.numero];
    h+='<div class="step '+st+'">'
      +'<div class="col"><div class="dot">'+(st==='done'?'✓':(e.icone||'○'))+'</div><div class="bar"></div></div>'
      +'<div class="bx">'
      +'<div class="tt">'+esc((e.nome||'').replace('!',''))+(st==='now'?' <span class="badgeNow">Etapa atual</span>':'')+'</div>'
      +(st==='now'&&e.descricao?'<div class="ds">'+esc(e.descricao)+'</div>':'')
      +(st==='now'&&e.prazo_texto?'<div class="dtx">⏱️ '+esc(e.prazo_texto)+'</div>':'')
      +(dt&&st!=='now'?'<div class="dtx">'+(st==='done'?'✓ ':'')+dataBR(dt)+'</div>':'')
      +'</div></div>';
  });
  h+='</div></section>';

  /* FOTOS */
  if(FD.length){
    GAL=FD.slice();
    h+='<section class="rv"><div class="shead"><div class="n">Registro</div><h2>Sua instalação em imagens</h2></div>'
      +'<div class="fgrid">'+FD.map(function(u,i){return '<div class="ph" onclick="abrirLb('+i+')"><img src="'+esc(u)+'" loading="lazy"></div>'}).join('')+'</div>'
      +(o.tem_fotos?'<a class="btnRel" href="relatorio.html?id='+encodeURIComponent(SLUG)+'"><span class="a">📄</span> Ver relatório completo da instalação <span class="a">→</span></a>':'')
      +'</section>';
  }

  /* AJUDA */
  h+='<div class="help rv"><div class="ic">💬</div><div style="flex:1;min-width:200px"><b>Alguma dúvida sobre sua obra?</b>'
    +'<p>Nossa equipe de pós-venda acompanha cada etapa e está à disposição.</p></div>'
    +'<a href="https://wa.me/'+WHATS+'" target="_blank">Falar no WhatsApp</a></div>';

  h+='</div>';

  /* FOOTER */
  h+='<footer><img src="'+LOGO+'" onerror="this.style.display=\'none\'">'
    +'<div class="c">📱 <b>(18) 93085-2573</b></div>'
    +'<div class="c">contato@polarisenergiasolar.com</div>'
    +'<div class="site">www.<b>polarisenergiasolar</b>.com</div></footer>';

  /* LIGHTBOX */
  h+='<div class="lb" id="lb" onclick="if(event.target===this)fecharLb()">'
    +'<button class="x" onclick="fecharLb()">✕</button>'
    +'<button class="nav pv" onclick="navLb(-1)">‹</button>'
    +'<img id="lbImg" src=""><div class="cnt" id="lbCnt"></div>'
    +'<button class="nav nx" onclick="navLb(1)">›</button></div>';

  document.getElementById('root').innerHTML=h;
  document.title='Sua obra — '+o.cliente+' — Polaris Energia Solar';

  // animações
  requestAnimationFrame(function(){setTimeout(function(){
    var ring=document.getElementById('ring');
    if(ring) ring.style.strokeDashoffset=String(465-465*pct/100);
  },150)});
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('on');io.unobserve(e.target);}})},{threshold:.08});
  document.querySelectorAll('.rv').forEach(function(el){io.observe(el)});
}

function abrirLb(i){gi=i;updLb();document.getElementById('lb').classList.add('on');document.body.style.overflow='hidden';}
function fecharLb(){document.getElementById('lb').classList.remove('on');document.body.style.overflow='';}
function navLb(d){gi=(gi+d+GAL.length)%GAL.length;updLb();}
function updLb(){document.getElementById('lbImg').src=GAL[gi];
document.getElementById('lbCnt').textContent=(gi+1)+' / '+GAL.length;}
document.addEventListener('keydown',function(e){var lb=document.getElementById('lb');
if(!lb||!lb.classList.contains('on'))return;
if(e.key==='Escape')fecharLb(); if(e.key==='ArrowLeft')navLb(-1); if(e.key==='ArrowRight')navLb(1);});
var tx=null;
document.addEventListener('touchstart',function(e){var lb=document.getElementById('lb');if(lb&&lb.classList.contains('on'))tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){if(tx===null)return;var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)navLb(dx>0?-1:1);tx=null;},{passive:true});

boot();
</script>
</body>
</html>
