<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#011D2E">
<title>Polaris — Instalador</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--navy:#011D2E; --green:#3B8B3B; --green-l:#58B868; --gold:#F5A623;
--bg:#0a1622; --card:#0f2233; --card2:#13293c;
--border:#1d3850; --txt:#eaf2f8; --muted:#8fa6b8;
}
body{font-family:'Manrope',system-ui,sans-serif;background:
radial-gradient(1000px 500px at 80% -10%, #0c2740 0%, transparent 60%),var(--bg);
color:var(--txt);min-height:100vh;padding-bottom:110px}
.top{position:sticky;top:0;z-index:20;background:rgba(1,29,46,.9);backdrop-filter:blur(8px);
border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;gap:10px}
.top img{height:26px}
.top .t{font-weight:800;font-size:15px}
.top .t span{color:var(--gold)}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.hero{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.hero h1{font-size:17px;font-weight:800}
.hero .m{font-size:12.5px;color:var(--muted);margin-top:4px}
.prog{margin-top:12px}
.prog .bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden}
.prog .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-l));width:0%;transition:.4s;border-radius:6px}
.prog .lbl{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:700}
.item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:11px}
.item.done{border-color:rgba(59,139,59,.5)}
.item .h{display:flex;align-items:flex-start;gap:10px}
.item .ic{width:34px;height:34px;border-radius:10px;background:var(--card2);display:flex;align-items:center;
justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border)}
.item.done .ic{background:rgba(59,139,59,.2);border-color:var(--green)}
.item .tt{font-weight:800;font-size:14px;line-height:1.3}
.item .dd{font-size:11.5px;color:var(--muted);margin-top:2px}
.tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;
border-radius:20px;margin-left:auto;flex-shrink:0}
.tag.ob{background:rgba(245,166,35,.14);color:var(--gold);border:1px solid rgba(245,166,35,.35)}
.tag.op{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.thumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#ff9a9a;border:none;
border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1}
.addbtn{width:72px;height:72px;border-radius:10px;border:1.5px dashed var(--border);background:none;
color:var(--muted);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.addbtn small{font-size:8.5px;font-weight:700}
.addbtn:active{border-color:var(--gold);color:var(--gold)}
.thumb.up{display:flex;align-items:center;justify-content:center;background:var(--card2)}
.spin{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(1,29,46,.95);backdrop-filter:blur(8px);
border-top:1px solid var(--border);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
.footer .inner{max-width:560px;margin:0 auto}
.btn-send{width:100%;background:linear-gradient(135deg,var(--green),#2f7030);border:none;color:#fff;
font-weight:800;border-radius:12px;padding:15px;font-family:inherit;font-size:15px;cursor:pointer}
.btn-send:disabled{opacity:.45}
.btn-send:active{transform:scale(.98)}
.center{text-align:center;padding:70px 24px;color:var(--muted)}
.center .i{font-size:44px;display:block;margin-bottom:14px}
.center b{color:var(--txt)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(120px);
background:#06314a;border:1px solid var(--gold);color:var(--txt);padding:12px 18px;border-radius:12px;
font-size:13px;font-weight:700;z-index:99;transition:.3s;max-width:88vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}
/* ---- Agenda ---- */
.agnav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.agnav button{background:var(--card);border:1px solid var(--border);color:var(--txt);border-radius:10px;
padding:9px 13px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.agnav button.on{border-color:var(--gold);color:var(--gold)}
.agnav .tit{flex:1;text-align:center;font-weight:800;font-size:14px;text-transform:capitalize}
.dia{margin-bottom:14px}
.dia .dh{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.dia .dh.hoje{color:var(--gold)}
.ob{display:block;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;
margin-bottom:8px;text-decoration:none;color:var(--txt)}
.ob:active{border-color:var(--gold)}
.ob b{font-size:14px}
.ob .om{font-size:11.5px;color:var(--muted);margin-top:2px}
.mes{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mes .wd{font-size:9.5px;font-weight:800;color:var(--muted);text-align:center;padding:4px 0;text-transform:uppercase}
.mes .cel{min-height:52px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:3px;font-size:10px}
.mes .cel.fora{opacity:.35}
.mes .cel.hoje{border-color:var(--gold)}
.mes .n{font-weight:800;color:var(--muted);font-size:9.5px}
.mes .ev{background:rgba(59,139,59,.25);border:1px solid rgba(59,139,59,.5);border-radius:5px;
padding:1px 3px;margin-top:2px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;color:var(--txt);text-decoration:none}
</style>
</head>
<body>
<div class="top">
<img src="https://obras.polarisenergiasolar.com/logo.png" onerror="this.style.display='none'">
<div class="t">Polaris <span id="topTit">Instalador</span></div>
</div>
<div class="wrap" id="app"><div class="center"><span class="i">⏳</span>Carregando...</div></div>
<div id="foot"></div>

<script>
var SUPABASE_URL='https://dakubhcgohiwzyqiegqf.supabase.co';
var SUPABASE_KEY='sb_publishable_hue0wC6DINtAaxTPlSIOIg_X1Tr0vJx';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var FN_URL=SUPABASE_URL+'/functions/v1/foto-obra';

var qs=new URLSearchParams(location.search);
var SLUG=qs.get('id'), TOKEN=qs.get('t'), AGENDA=qs.get('agenda');
var OBRA=null, ITENS=[], FOTOS=[];

function toast(m){var t=document.getElementById('tst');if(!t){t=document.createElement('div');t.id='tst';t.className='toast';document.body.appendChild(t);}t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on')},3000);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ================= CHECKLIST ================= */
async function bootObra(){
  var r=await sb.rpc('get_obra_instalador',{p_slug:SLUG,p_token:TOKEN});
  if(r.error||!r.data){document.getElementById('app').innerHTML='<div class="center"><span class="i">🔒</span><b>Link inválido.</b><br>Confirme com o escritório o link correto desta obra.</div>';return;}
  OBRA=r.data.obra; ITENS=r.data.itens; FOTOS=r.data.fotos;
  renderChecklist();
}
function fotosDoItem(id){return FOTOS.filter(function(f){return f.item_id===id});}
function renderChecklist(){
  var obrig=ITENS.filter(function(i){return i.obrigatorio});
  var feitos=obrig.filter(function(i){return fotosDoItem(i.id).length>0}).length;
  var pct=obrig.length?Math.round(feitos/obrig.length*100):0;
  var h='<div class="hero"><h1>'+esc(OBRA.cliente)+'</h1><div class="m">'
    +(OBRA.contrato?'#'+esc(OBRA.contrato)+' • ':'')
    +(OBRA.potencia_kwp?String(OBRA.potencia_kwp).replace('.',',')+' kWp • ':'')
    +'Checklist de instalação</div>'
    +'<div class="prog"><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div>'
    +'<div class="lbl">'+feitos+' de '+obrig.length+' itens obrigatórios com foto ('+pct+'%)</div></div></div>';
  ITENS.forEach(function(it){
    var fts=fotosDoItem(it.id);
    h+='<div class="item '+(fts.length?'done':'')+'" id="item'+it.id+'">'
      +'<div class="h"><div class="ic">'+(fts.length?'✅':'📷')+'</div>'
      +'<div><div class="tt">'+esc(it.titulo)+'</div><div class="dd">'+esc(it.descricao||'')+'</div></div>'
      +'<span class="tag '+(it.obrigatorio?'ob':'op')+'">'+(it.obrigatorio?'Obrigatória':'Opcional')+'</span></div>'
      +'<div class="thumbs" id="th'+it.id+'">';
    fts.forEach(function(f){h+='<div class="thumb"><img src="'+esc(f.url)+'" loading="lazy"><button class="x" onclick="delFoto('+f.id+','+it.id+')">✕</button></div>';});
    h+='<button class="addbtn" onclick="pick('+it.id+')">＋<small>foto</small></button>'
      +'<input type="file" accept="image/*" capture="environment" multiple id="inp'+it.id+'" style="display:none" onchange="upload('+it.id+',this)">'
      +'</div></div>';
  });
  document.getElementById('app').innerHTML=h;
  var pronto=feitos>=obrig.length && obrig.length>0;
  document.getElementById('foot').innerHTML='<div class="footer"><div class="inner">'
    +'<button class="btn-send" id="btnSend" '+(FOTOS.length?'':'disabled')+' onclick="enviar()">'
    +(OBRA.tem_grupo?'📤 Enviar relatório no grupo do cliente':'📤 Enviar relatório (grupo ainda não criado)')
    +(pronto?'':' • faltam itens')+'</button></div></div>';
}
function pick(id){document.getElementById('inp'+id).click();}

function comprimir(file){
  return new Promise(function(res,rej){
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=function(){
      var MAX=1600, w=img.width, h=img.height;
      if(w>MAX||h>MAX){var k=MAX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      var data=cv.toDataURL('image/jpeg',0.82);
      res(data.split(',')[1]);
    };
    img.onerror=rej; img.src=url;
  });
}
async function upload(itemId,inp){
  var files=Array.prototype.slice.call(inp.files); inp.value='';
  var th=document.getElementById('th'+itemId);
  for(var i=0;i<files.length;i++){
    var ph=document.createElement('div');ph.className='thumb up';ph.innerHTML='<div class="spin"></div>';
    th.insertBefore(ph,th.querySelector('.addbtn'));
    try{
      var b64=await comprimir(files[i]);
      var r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
        body:JSON.stringify({acao:'upload',slug:SLUG,token:TOKEN,item_id:itemId,foto_base64:b64,mime:'image/jpeg'})});
      var j=await r.json();
      if(!r.ok||j.error){toast('Erro: '+(j.error||r.status));ph.remove();continue;}
      FOTOS.push(j.foto);
      renderChecklist();
    }catch(e){toast('Falha na foto: '+e.message);ph.remove();}
  }
}
async function delFoto(fotoId,itemId){
  if(!confirm('Excluir esta foto?'))return;
  var r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    body:JSON.stringify({acao:'excluir',slug:SLUG,token:TOKEN,foto_id:fotoId})});
  var j=await r.json();
  if(j.error){toast('Erro: '+j.error);return;}
  FOTOS=FOTOS.filter(function(f){return f.id!==fotoId});
  renderChecklist();
}
async function enviar(){
  if(!OBRA.tem_grupo){toast('O grupo do cliente ainda não foi criado. Avise o escritório!');return;}
  var obrig=ITENS.filter(function(i){return i.obrigatorio});
  var faltam=obrig.filter(function(i){return !fotosDoItem(i.id).length});
  var msg='Enviar o relatório com '+FOTOS.length+' foto(s) no grupo do cliente?';
  if(faltam.length) msg+='\n\n⚠️ Itens obrigatórios sem foto:\n• '+faltam.map(function(i){return i.titulo}).join('\n• ');
  if(!confirm(msg))return;
  var btn=document.getElementById('btnSend');btn.disabled=true;btn.textContent='Enviando fotos no grupo...';
  var r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    body:JSON.stringify({acao:'enviar',slug:SLUG,token:TOKEN})});
  var j=await r.json();
  if(!r.ok||j.error){toast('Erro: '+(j.error||r.status));btn.disabled=false;btn.textContent='📤 Enviar relatório no grupo do cliente';return;}
  document.getElementById('app').innerHTML='<div class="center"><span class="i">🎉</span><b>Relatório enviado!</b><br><br>'
    +j.enviadas+' foto(s) enviadas no grupo do cliente.'+(j.falhas?'<br>⚠️ '+j.falhas+' falharam — tente reenviar.':'')+'</div>';
  document.getElementById('foot').innerHTML='';
}

/* ================= AGENDA ================= */
var AG=[], vMode='semana', vRef=new Date();
async function bootAgenda(){
  document.getElementById('topTit').textContent='Agenda';
  var r=await sb.rpc('get_agenda',{p_token:AGENDA});
  if(r.error||r.data===null){document.getElementById('app').innerHTML='<div class="center"><span class="i">🔒</span><b>Link de agenda inválido.</b></div>';return;}
  AG=r.data||[];
  renderAgenda();
}
function d0(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function iso(d){return d.toISOString().slice(0,10);}
function obrasDo(dia){return AG.filter(function(o){return o.data_instalacao===iso(dia)});}
function linkObra(o){return 'instalador.html?id='+encodeURIComponent(o.slug)+'&t='+encodeURIComponent(o.token);}
function renderAgenda(){
  var hoje=d0(new Date());
  var h='<div class="agnav">'
    +'<button onclick="nav(-1)">‹</button><div class="tit" id="agTit"></div><button onclick="nav(1)">›</button>'
    +'<button class="'+(vMode==='semana'?'on':'')+'" onclick="setMode(\'semana\')">Semana</button>'
    +'<button class="'+(vMode==='mes'?'on':'')+'" onclick="setMode(\'mes\')">Mês</button></div>';
  if(vMode==='semana'){
    var ini=d0(vRef); ini.setDate(ini.getDate()-((ini.getDay()+6)%7)); // segunda
    var tit=ini.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    var fim=new Date(ini); fim.setDate(fim.getDate()+6);
    tit+=' — '+fim.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    var corpo='';
    for(var i=0;i<7;i++){
      var d=new Date(ini); d.setDate(d.getDate()+i);
      var obs=obrasDo(d);
      corpo+='<div class="dia"><div class="dh '+(iso(d)===iso(hoje)?'hoje':'')+'">'
        +d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'})
        +(iso(d)===iso(hoje)?' • HOJE':'')+'</div>';
      if(!obs.length) corpo+='<div class="ob" style="opacity:.4;pointer-events:none">— sem obras —</div>';
      obs.forEach(function(o){
        corpo+='<a class="ob" href="'+linkObra(o)+'"><b>'+esc(o.cliente)+'</b>'
          +'<div class="om">'+(o.contrato?'#'+esc(o.contrato)+' • ':'')
          +(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' kWp • ':'')
          +(o.instalador?'👷 '+esc(o.instalador):'sem instalador definido')+'</div></a>';
      });
      corpo+='</div>';
    }
    document.getElementById('app').innerHTML=h+corpo;
    document.getElementById('agTit').textContent=tit;
  } else {
    var y=vRef.getFullYear(), m=vRef.getMonth();
    var prim=new Date(y,m,1), ult=new Date(y,m+1,0);
    var inicio=new Date(prim); inicio.setDate(inicio.getDate()-((prim.getDay()+6)%7));
    var corpo='<div class="mes">';
    ['seg','ter','qua','qui','sex','sáb','dom'].forEach(function(w){corpo+='<div class="wd">'+w+'</div>';});
    var d=new Date(inicio);
    for(var i=0;i<42;i++){
      var fora=d.getMonth()!==m;
      var obs=obrasDo(d);
      corpo+='<div class="cel '+(fora?'fora':'')+' '+(iso(d)===iso(hoje)?'hoje':'')+'"><div class="n">'+d.getDate()+'</div>';
      obs.forEach(function(o){corpo+='<a class="ev" href="'+linkObra(o)+'">'+esc(o.cliente.split(' ')[0])+'</a>';});
      corpo+='</div>';
      d.setDate(d.getDate()+1);
      if(i>=34 && d.getMonth()!==m) break;
    }
    corpo+='</div>';
    document.getElementById('app').innerHTML=h+corpo;
    document.getElementById('agTit').textContent=vRef.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  }
}
function nav(dir){
  if(vMode==='semana'){vRef.setDate(vRef.getDate()+7*dir);}
  else{vRef.setMonth(vRef.getMonth()+dir);}
  renderAgenda();
}
function setMode(m){vMode=m;renderAgenda();}

/* ================= BOOT ================= */
if(AGENDA) bootAgenda();
else if(SLUG&&TOKEN) bootObra();
else document.getElementById('app').innerHTML='<div class="center"><span class="i">🔗</span><b>Link incompleto.</b><br>Peça ao escritório o link da obra ou da agenda.</div>';
</script>
</body>
</html>
