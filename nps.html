<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04141F">
<title>Sua opinião — Polaris Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#04141F;--ink:#0E2438;--gold:#D6A518;--green:#3B8B3B;--green-l:#58B868;
--paper:#F4F4F1;--card:#fff;--line:#E4E4DE;--txt:#22323E;--mut:#7A8893;--red:#E36A6A}
body{font-family:'Manrope',sans-serif;background:
radial-gradient(800px 400px at 80% -10%, rgba(214,165,24,.13) 0%, transparent 55%),
linear-gradient(170deg,var(--navy) 0%,#0B2C42 46%,var(--paper) 46.1%,var(--paper) 100%);
min-height:100vh;color:var(--txt);padding:0 18px 40px}
.wrap{max-width:560px;margin:0 auto}
.hd{text-align:center;padding:34px 0 26px;color:#fff}
.hd img{height:34px;margin:0 auto 22px}
.hd .k{font-size:10px;font-weight:800;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.hd h1{font-size:clamp(22px,5.5vw,30px);font-weight:800;margin-top:10px;line-height:1.2}
.hd p{font-size:13px;color:rgba(255,255,255,.65);margin-top:8px;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:28px 22px;
box-shadow:0 24px 60px rgba(14,36,56,.14)}
.q{font-size:15.5px;font-weight:800;color:var(--ink);text-align:center;line-height:1.45}
.q small{display:block;font-size:12.5px;color:var(--mut);font-weight:600;margin-top:7px}
.faces{display:flex;justify-content:center;gap:10px;margin:20px 0 4px;font-size:30px}
.faces span{opacity:.25;transition:.3s;transform:scale(.9)}
.faces span.on{opacity:1;transform:scale(1.25)}
.notas{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;margin-top:16px}
.notas button{aspect-ratio:1/1;border:1.5px solid var(--line);background:#fbfbf9;border-radius:10px;
font-family:inherit;font-size:14px;font-weight:800;color:var(--mut);cursor:pointer;transition:.18s;padding:0}
.notas button:hover{border-color:var(--gold);color:var(--ink);transform:translateY(-2px)}
.notas button.sel{background:var(--ink);border-color:var(--ink);color:#fff;transform:scale(1.08)}
.notas button.sel.det{background:var(--red);border-color:var(--red)}
.notas button.sel.neu{background:var(--gold);border-color:var(--gold)}
.notas button.sel.pro{background:var(--green);border-color:var(--green)}
.esc{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut);font-weight:700;margin-top:9px}
.step2{max-height:0;overflow:hidden;transition:max-height .5s ease,opacity .4s;opacity:0}
.step2.on{max-height:420px;opacity:1;margin-top:22px}
.lbl{font-size:12px;font-weight:800;color:var(--ink);margin-bottom:8px;display:block}
textarea{width:100%;background:#fbfbf9;border:1.5px solid var(--line);border-radius:14px;padding:14px;
font-family:inherit;font-size:14px;color:var(--txt);resize:vertical;min-height:96px;outline:none}
textarea:focus{border-color:var(--gold)}
.send{width:100%;background:linear-gradient(135deg,var(--green),#2f7030);border:none;color:#fff;
border-radius:14px;padding:16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
margin-top:14px;box-shadow:0 10px 30px rgba(59,139,59,.3);transition:.2s}
.send:active{transform:scale(.98)} .send:disabled{opacity:.5}
/* obrigado */
.ok{text-align:center;animation:up .5s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.ok .em{font-size:52px}
.ok h2{font-size:21px;font-weight:800;color:var(--ink);margin-top:12px}
.ok p{font-size:14px;color:var(--mut);margin-top:10px;line-height:1.6}
.cta{display:block;margin-top:22px;background:var(--green);color:#fff;text-decoration:none;
border-radius:14px;padding:15px;font-size:14.5px;font-weight:800;box-shadow:0 10px 28px rgba(59,139,59,.28)}
.cta.alt{background:var(--ink);box-shadow:0 10px 28px rgba(14,36,56,.25)}
.gbox{background:linear-gradient(160deg,#FFFDF5,#FFF8E6);border:1.5px solid rgba(214,165,24,.45);
border-radius:18px;padding:20px 18px;margin-top:24px}
.gt{font-size:15px;font-weight:800;color:var(--ink)}
.gs{font-size:12.5px;color:var(--mut);margin-top:6px;line-height:1.55;font-weight:600}
.cta.gcta{background:linear-gradient(135deg,#E8B00A,#C99206);box-shadow:0 10px 28px rgba(214,165,24,.4);margin-top:14px}
.gift{margin-top:26px;text-align:center;position:relative}
.giftBox{width:150px;height:150px;margin:0 auto;cursor:pointer;position:relative;
animation:shake 2.6s ease-in-out infinite;transition:transform .3s}
.giftBox:active{transform:scale(.94)}
@keyframes shake{0%,86%,100%{transform:rotate(0)}88%{transform:rotate(-7deg)}91%{transform:rotate(6deg)}94%{transform:rotate(-4deg)}97%{transform:rotate(3deg)}}
.giftBox.open{animation:none}
.giftBox .lid{transition:transform .55s cubic-bezier(.3,-.4,.4,1.4);transform-origin:50% 100%}
.giftBox.open .lid{transform:translateY(-58px) rotate(-16deg)}
.giftGlow{position:absolute;left:50%;top:52%;width:150px;height:150px;transform:translate(-50%,-50%);
background:radial-gradient(circle,rgba(214,165,24,.5) 0%,transparent 68%);opacity:0;transition:opacity .5s;pointer-events:none}
.giftBox.open + .giftGlow{opacity:1;animation:pul 2s infinite}
@keyframes pul{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.18)}}
.giftTt{font-size:17px;font-weight:800;color:var(--ink);margin-top:14px}
.giftSub{font-size:13px;color:var(--mut);margin-top:7px;font-weight:600;line-height:1.55}
.giftTap{display:inline-block;margin-top:12px;font-size:11.5px;font-weight:800;letter-spacing:1.5px;
color:var(--gold);text-transform:uppercase;animation:blk 1.6s infinite}
@keyframes blk{0%,100%{opacity:1}50%{opacity:.4}}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.opt{background:#fbfbf9;border:2px solid var(--line);border-radius:18px;padding:16px 10px;cursor:pointer;
transition:.22s;animation:up .45s ease backwards}
.opt:nth-child(2){animation-delay:.12s}
.opt:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 30px rgba(214,165,24,.18)}
.opt.sel{border-color:var(--green);background:#F4FBF4}
.opt svg{margin:0 auto;display:block}
.opt .nm{font-size:13.5px;font-weight:800;color:var(--ink);margin-top:10px}
.opt .ds{font-size:11px;color:var(--mut);margin-top:3px;font-weight:600}
.vouch{background:linear-gradient(160deg,var(--ink),#123049);color:#fff;border-radius:18px;padding:22px;margin-top:20px;animation:up .5s ease}
.vouch .vl{font-size:10px;font-weight:800;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase}
.vouch .vc{font-size:27px;font-weight:800;letter-spacing:3px;margin:9px 0;font-family:monospace}
.vouch .vd{font-size:12px;color:rgba(255,255,255,.72);line-height:1.6;font-weight:600}
.conf{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.cf{position:absolute;width:9px;height:14px;opacity:.95;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0}}
.ft{text-align:center;color:var(--mut);font-size:11.5px;margin-top:26px;font-weight:600}
.ft b{color:var(--ink)}
.center{text-align:center;padding:90px 20px;color:#fff}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="center">⏳ Carregando...</div></div>

<script>
var sb=supabase.createClient('https://dakubhcgohiwzyqiegqf.supabase.co','sb_publishable_hue0wC6DINtAaxTPlSIOIg_X1Tr0vJx');
var qs=new URLSearchParams(location.search), SLUG=qs.get('id'), TOKEN=qs.get('t');
var LOGO='https://obras.polarisenergiasolar.com/logo.png', WHATS='5518930852573';
var GOOGLE_REVIEW='https://g.page/r/CUf-E27VPrELEBM/review';
var D=null, nota=null;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function boot(){
  if(!SLUG||!TOKEN){document.getElementById('root').innerHTML='<div class="center">🔗 Link incompleto.</div>';return;}
  var r=await sb.rpc('get_nps',{p_slug:SLUG,p_token:TOKEN});
  if(r.error||!r.data){document.getElementById('root').innerHTML='<div class="center">🔒 Pesquisa não encontrada.</div>';return;}
  D=r.data;
  if(D.ja_respondeu) return obrigado(D.nota_atual,true);
  render();
}

function render(){
  var primeiro=String(D.cliente||'').split(' ')[0];
  var h='<div class="hd"><img src="'+LOGO+'" onerror="this.style.display=\'none\'">'
    +'<div class="k">Pesquisa de satisfação</div>'
    +'<h1>'+esc(primeiro)+', como foi sua<br>experiência com a Polaris?</h1>'
    +'<p>Leva menos de 1 minuto 💚</p></div>'
    +'<div class="card">'
    +'<div class="q">De 0 a 10, o quanto você indicaria a Polaris a um amigo ou familiar?<small>Toque na nota que representa sua opinião</small></div>'
    +'<div class="faces" id="faces"><span data-f="0">😕</span><span data-f="1">😐</span><span data-f="2">🙂</span><span data-f="3">😄</span><span data-f="4">🤩</span></div>'
    +'<div class="notas" id="notas">';
  for(var i=0;i<=10;i++) h+='<button onclick="escolher('+i+')" id="n'+i+'">'+i+'</button>';
  h+='</div><div class="esc"><span>Não indicaria</span><span>Indicaria com certeza</span></div>'
    +'<div class="step2" id="s2">'
    +'<label class="lbl" id="lbl2">Quer contar um pouco mais? (opcional)</label>'
    +'<textarea id="com" placeholder="Escreva aqui..."></textarea>'
    +'<button class="send" id="btn" onclick="enviar()">Enviar minha avaliação</button>'
    +'</div></div>'
    +'<div class="ft">Sua opinião vai direto para a diretoria da <b>Polaris Energia Solar</b> ☀️</div>';
  document.getElementById('root').innerHTML=h;
}

function escolher(n){
  nota=n;
  for(var i=0;i<=10;i++){var b=document.getElementById('n'+i);b.className='';}
  var cls=n<=6?'det':(n<=8?'neu':'pro');
  document.getElementById('n'+n).className='sel '+cls;
  // carinhas
  var f=n<=3?0:(n<=5?1:(n<=7?2:(n<=8?3:4)));
  document.querySelectorAll('#faces span').forEach(function(s){s.classList.toggle('on',+s.dataset.f===f);});
  // pergunta contextual
  var l=document.getElementById('lbl2');
  if(n<=6) l.textContent='O que precisamos melhorar? Queremos resolver. 🙏';
  else if(n<=8) l.textContent='O que faltou para ser uma nota 10?';
  else l.textContent='Que bom! O que você mais gostou? 💚';
  document.getElementById('s2').classList.add('on');
  setTimeout(function(){document.getElementById('s2').scrollIntoView({behavior:'smooth',block:'center'})},260);
}

async function enviar(){
  if(nota===null) return;
  var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Enviando...';
  var r=await sb.rpc('salvar_nps',{p_slug:SLUG,p_token:TOKEN,p_nota:nota,p_comentario:document.getElementById('com').value});
  if(r.error||(r.data&&r.data.erro)){btn.disabled=false;btn.textContent='Enviar minha avaliação';alert('Erro ao enviar. Tente novamente.');return;}
  obrigado(nota,false);
}

function obrigado(n,jaEra){
  var promo=n>=9, det=n<=6;
  var txtInd=encodeURIComponent('Instalei energia solar com a Polaris Energia Solar e recomendo! ☀️ Contato: https://polarisenergiasolar.com');
  var h='<div class="hd"><img src="'+LOGO+'" onerror="this.style.display=\'none\'"></div><div class="card"><div class="ok">'
    +'<div class="em">'+(promo?'💚':(det?'🙏':'⭐'))+'</div>'
    +'<h2>'+(jaEra?'Você já avaliou. Obrigado!':'Obrigado pela sua avaliação!')+'</h2>'
    +'<p>'+(promo
        ? 'Ficamos muito felizes! Sua confiança é o que move nosso trabalho todos os dias. ☀️'
        : (det
          ? 'Sua opinião é muito importante. Nossa equipe vai entrar em contato para entender melhor e resolver o que for preciso.'
          : 'Obrigado! Vamos usar seu retorno para melhorar cada detalhe da nossa entrega.'))
    +'</p>';
  if(promo) h+='<div class="gift" id="gift">'+giftSvg()+'<div class="giftGlow"></div>'
              +'<div class="giftTt" id="gtt">Você desbloqueou um brinde! 🎁</div>'
              +'<div class="giftSub" id="gsub">Clientes que avaliam a Polaris com nota 9 ou 10 ganham um mimo nosso.</div>'
              +'<div class="giftTap" id="gtap">toque na caixa para abrir</div>'
              +'<div id="gopts"></div></div>'
              +'<div class="gbox"><div class="gt">Ajuda a gente com 30 segundos?</div>'
              +'<div class="gs">Sua avaliação no Google ajuda outras famílias a encontrarem energia solar de confiança — e é o que libera a retirada do seu brinde. ⭐</div>'
              +'<a class="cta gcta" target="_blank" href="'+GOOGLE_REVIEW+'">⭐ Avaliar a Polaris no Google</a></div>'
              +'<a class="cta" target="_blank" href="https://wa.me/?text='+txtInd+'">💬 Indicar a Polaris a um amigo</a>'
              +'<a class="cta alt" href="relatorio.html?id='+encodeURIComponent(SLUG)+'">📄 Ver o relatório da minha obra</a>';
  else h+='<a class="cta" target="_blank" href="https://wa.me/'+WHATS+'">💬 Falar com nossa equipe</a>';
  h+='</div></div><div class="ft">Nota registrada: <b>'+n+'/10</b></div>';
  document.getElementById('root').innerHTML=h;
}

/* ===== BRINDE ===== */
function giftSvg(){
return '<svg class="giftBox" id="gboxSvg" onclick="abrirGift()" viewBox="0 0 150 150" width="150" height="150">'
+'<defs><linearGradient id="gb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#123049"/><stop offset="100%" stop-color="#0A2436"/></linearGradient>'
+'<linearGradient id="gl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E8B00A"/><stop offset="100%" stop-color="#C99206"/></linearGradient></defs>'
+'<rect x="28" y="62" width="94" height="72" rx="8" fill="url(#gb)"/>'
+'<rect x="68" y="62" width="14" height="72" fill="url(#gl)"/>'
+'<g class="lid"><rect x="20" y="44" width="110" height="24" rx="7" fill="#1B4059"/>'
+'<rect x="68" y="44" width="14" height="24" fill="url(#gl)"/>'
+'<path d="M75 44c-10-6-22-14-16-22 5-7 14 2 16 12 2-10 11-19 16-12 6 8-6 16-16 22z" fill="url(#gl)"/></g></svg>';
}
function copoSvg(){
return '<svg viewBox="0 0 90 110" width="76" height="94"><defs><linearGradient id="cp" x1="0" y1="0" x2="1" y2="0">'
+'<stop offset="0%" stop-color="#0E2438"/><stop offset="55%" stop-color="#1D4560"/><stop offset="100%" stop-color="#0A1E2E"/></linearGradient></defs>'
+'<path d="M26 26h38l-5 74a6 6 0 0 1-6 5H37a6 6 0 0 1-6-5z" fill="url(#cp)"/>'
+'<rect x="24" y="14" width="42" height="13" rx="5" fill="#3B8B3B"/>'
+'<rect x="38" y="6" width="14" height="9" rx="4" fill="#2f7030"/>'
+'<path d="M64 40c12 2 14 24 2 28l-1-9c5-2 5-8 0-10z" fill="#1D4560"/>'
+'<rect x="33" y="52" width="24" height="4" rx="2" fill="#E8B00A" opacity=".9"/>'
+'<path d="M40 62l5 5 8-10" stroke="#E8B00A" stroke-width="3" fill="none" stroke-linecap="round"/></svg>';
}
function foneSvg(){
return '<svg viewBox="0 0 110 110" width="86" height="86"><defs><linearGradient id="fn" x1="0" y1="0" x2="1" y2="1">'
+'<stop offset="0%" stop-color="#173B54"/><stop offset="100%" stop-color="#0A1E2E"/></linearGradient></defs>'
+'<rect x="22" y="52" width="66" height="44" rx="13" fill="url(#fn)"/>'
+'<rect x="22" y="52" width="66" height="7" rx="3.5" fill="#1D4560"/>'
+'<circle cx="55" cy="88" r="3" fill="#3B8B3B"/>'
+'<ellipse cx="38" cy="30" rx="11" ry="13" fill="#E9EDF0"/><rect x="34" y="38" width="7" height="18" rx="3.5" fill="#E9EDF0"/>'
+'<circle cx="38" cy="28" r="4" fill="#0E2438" opacity=".35"/>'
+'<ellipse cx="72" cy="30" rx="11" ry="13" fill="#E9EDF0"/><rect x="68" y="38" width="7" height="18" rx="3.5" fill="#E9EDF0"/>'
+'<circle cx="72" cy="28" r="4" fill="#0E2438" opacity=".35"/>'
+'<path d="M92 26c5 5 5 15 0 20" stroke="#E8B00A" stroke-width="3" fill="none" stroke-linecap="round"/></svg>';
}
function confete(){
var box=document.createElement('div');box.className='conf';document.body.appendChild(box);
var cores=['#E8B00A','#3B8B3B','#58B868','#123049','#F5D061'];
for(var i=0;i<70;i++){var p=document.createElement('div');p.className='cf';
p.style.left=(Math.random()*100)+'vw';p.style.top='-20px';
p.style.background=cores[i%cores.length];
p.style.animationDuration=(2.2+Math.random()*1.8)+'s';
p.style.animationDelay=(Math.random()*0.5)+'s';
p.style.transform='rotate('+(Math.random()*360)+'deg)';
box.appendChild(p);}
setTimeout(function(){box.remove()},5200);
}
var gAberto=false;
function abrirGift(){
if(gAberto) return; gAberto=true;
document.getElementById('gboxSvg').classList.add('open');
confete();
document.getElementById('gtt').textContent='Escolha o seu brinde';
document.getElementById('gsub').textContent='Selecione abaixo — combinamos a entrega junto com a nossa equipe.';
document.getElementById('gtap').style.display='none';
document.getElementById('gopts').innerHTML='<div class="opts">'
+'<div class="opt" onclick="escolherBrinde(\'copo\',this)">'+copoSvg()+'<div class="nm">Copo térmico</div><div class="ds">Personalizado Polaris</div></div>'
+'<div class="opt" onclick="escolherBrinde(\'fone\',this)">'+foneSvg()+'<div class="nm">Fone Bluetooth</div><div class="ds">Sem fio, com estojo</div></div>'
+'</div>';
}
async function escolherBrinde(tipo,el){
document.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel')});
el.classList.add('sel');
var r=await sb.rpc('salvar_brinde',{p_slug:SLUG,p_token:TOKEN,p_brinde:tipo});
if(r.error||(r.data&&r.data.erro)){alert('Nao foi possivel registrar. Tente novamente.');return;}
var nome=(tipo==='copo')?'Copo termico personalizado':'Fone Bluetooth';
document.getElementById('gopts').innerHTML='<div class="vouch"><div class="vl">Seu codigo de retirada</div>'
+'<div class="vc">'+r.data.voucher+'</div>'
+'<div class="vd">Brinde escolhido: <b>'+nome+'</b><br>Apresente este codigo para a nossa equipe. Guarde a tela ou tire um print.</div></div>';
confete();
}
boot();
</script>
</body>
</html>
