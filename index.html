<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#011D2E">
<meta name="mobile-web-app-capable" content="yes">
<title>Polaris Solar – Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#011D2E;--navy-mid:#022C44;--navy-light:#0A3D5C;
  --green:#3B8B3B;--green-light:#58B868;--green-glow:rgba(59,139,59,0.25);
  --gold:#F5A623;--gold-light:#FFD580;--gold-glow:rgba(245,166,35,0.3);
  --bg:#F7F8F6;--surface:#FFFFFF;--surface-alt:#F0F2ED;
  --text:#022C44;--text-secondary:#6B7D8A;--text-muted:#9EABB5;
  --border:#E2E8EC;--border-light:#EEF1F4;
  --shadow-sm:0 1px 3px rgba(1,29,46,0.06);
  --shadow-md:0 4px 16px rgba(1,29,46,0.08);
  --shadow-lg:0 8px 32px rgba(1,29,46,0.12);
  --radius:16px;--radius-sm:10px;--radius-lg:24px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{
  background:var(--navy);
  padding:calc(var(--safe-t) + 10px) 16px 12px;
  display:flex;align-items:center;gap:12px;z-index:50;
  box-shadow:0 2px 20px rgba(0,0,0,0.3);flex-shrink:0;
  position:relative;
}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.25),transparent)}
.hdr img{height:28px}
.hdr-t h1{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hdr-t p{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
.hdr-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.sync-btn{
  background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);
  padding:7px 14px;color:#fff;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .3s;
}
.sync-btn:active{transform:scale(.95);background:rgba(255,255,255,0.12)}
.sync-btn.loading .sync-ico{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{
  background:linear-gradient(135deg,var(--gold),#E8920D);color:var(--navy);
  font-size:9px;font-weight:800;border-radius:50px;padding:3px 8px;min-width:22px;text-align:center;
}

/* ── STATS ── */
.stats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{
  flex-shrink:0;background:var(--surface);border-radius:14px;
  padding:10px 14px;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:10px;min-width:110px;
  border:1px solid var(--border-light);
}
.stat-ico{font-size:20px}
.stat-n{font-size:20px;font-weight:800;color:var(--navy)}
.stat-l{font-size:8px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}

/* ── SEARCH ── */
.srch{padding:0 16px 10px;flex-shrink:0}
.srch-inner{position:relative}
.srch-inner svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
.srch input{
  width:100%;padding:12px 14px 12px 40px;
  border:1.5px solid var(--border);border-radius:14px;
  font-size:13px;font-family:inherit;font-weight:500;
  background:var(--surface);color:var(--text);transition:all .25s;
}
.srch input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
.srch input::placeholder{color:var(--text-muted)}

/* ── CARD LIST ── */
.list{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;padding:48px 24px;color:var(--text-muted);font-size:13px;font-weight:500}
.empty-ico{font-size:48px;margin-bottom:14px;display:block}

/* ── CLIENT CARD ── */
.cc{
  background:var(--surface);border-radius:18px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);overflow:hidden;transition:all .25s;
  border:1.5px solid transparent;cursor:pointer;
  border:1px solid var(--border-light);
}
.cc:active{transform:scale(.985)}
.cc.open{border-color:var(--green);box-shadow:var(--shadow-md)}
.cc-top{display:flex;align-items:center;padding:14px 16px;gap:12px}
.cc-av{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;flex-shrink:0;
}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--navy)}
.cc-sub{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:500}
.cc-pill{
  font-size:8px;font-weight:800;padding:4px 10px;border-radius:50px;
  white-space:nowrap;flex-shrink:0;letter-spacing:.3px;text-transform:uppercase;
}
.p1{background:rgba(59,139,59,0.1);color:#2E7D32}
.p2{background:rgba(2,44,68,0.08);color:#1565C0}
.p3{background:rgba(106,27,154,0.08);color:#6A1B9A}
.p4{background:rgba(191,54,12,0.08);color:#BF360C}
.p5{background:rgba(1,87,155,0.08);color:#01579B}
.p6{background:rgba(245,166,35,0.1);color:#E65100}

.cc-exp{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1)}
.cc.open .cc-exp{max-height:600px}
.cc-body{padding:0 16px 16px}

/* Progress inside card */
.prg{margin-bottom:14px}
.prg-bar{display:flex;gap:3px;margin-bottom:6px}
.prg-s{flex:1;height:4px;border-radius:2px;background:var(--border-light)}
.prg-s.done{background:var(--green)}.prg-s.now{background:var(--gold);box-shadow:0 0 6px var(--gold-glow)}
.prg-txt{font-size:10px;color:var(--text-muted);font-weight:500}
.prg-eta{font-size:11px;color:var(--navy);font-weight:700;margin-top:5px}

/* Actions */
.acts{display:flex;gap:8px}
.act{
  flex:1;padding:12px 8px;border-radius:12px;border:none;font-family:inherit;
  font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:5px;transition:all .2s;letter-spacing:.2px;
}
.act:active{transform:scale(.95)}
.act-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff}
.act-tk{background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));color:#fff}
.act-cp{background:var(--surface-alt);color:var(--navy);border:1px solid var(--border)}
.act-lk{background:linear-gradient(135deg,var(--gold),#E8920D);color:#fff}
.act-ico{font-size:20px}

/* ── OVERLAY / SHEETS ── */
.overlay{position:fixed;inset:0;background:rgba(1,29,46,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;visibility:hidden;transition:all .3s}
.overlay.show{opacity:1;visibility:visible}
.sheet{
  position:fixed;left:0;right:0;bottom:0;background:var(--surface);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;z-index:101;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);
  max-height:85vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);
}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.sheet-h{padding:14px 20px;display:flex;align-items:center;border-bottom:1px solid var(--border-light);flex-shrink:0}
.sheet-h h3{flex:1;font-size:15px;font-weight:800;color:var(--navy)}
.sheet-close{
  width:32px;height:32px;border-radius:50%;background:var(--surface-alt);
  border:1px solid var(--border-light);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.sheet-close:active{transform:scale(.9)}
.sheet-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.sheet-acts{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border-light);flex-shrink:0}
.sheet-btn{
  flex:1;padding:14px;border-radius:14px;border:none;font-family:inherit;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
}
.sheet-btn:active{transform:scale(.97)}
.sheet-btn-p{background:linear-gradient(135deg,var(--green),#2E7D32);color:#fff;box-shadow:0 4px 16px var(--green-glow)}
.sheet-btn-s{background:var(--surface-alt);color:var(--navy);border:1px solid var(--border)}

/* ── WHATSAPP CARD PREVIEW (redesign) ── */
.wc{border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);background:var(--surface)}
.wc-t{padding:28px 24px 20px;background:linear-gradient(135deg,var(--navy-mid),var(--navy-light));position:relative}
.wc-t::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent)}
.wc-lg{height:28px;margin-bottom:16px}
.wc-st{font-size:10px;color:rgba(255,255,255,0.5);font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px}
.wc-ti{font-size:22px;font-weight:800;color:#fff;margin-bottom:16px;line-height:1.15}
.wc-ds{display:flex;gap:4px;margin-bottom:0}
.wd{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.12)}
.wd-on{background:var(--gold)}
.wd-nw{background:#fff;box-shadow:0 0 8px rgba(255,255,255,0.4)}
.wc-b{padding:24px}
.wc-m{font-size:14px;color:#2A2A2A;line-height:1.65;margin-bottom:16px}
.wc-m strong{color:var(--navy);font-weight:800}
.wc-eta{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.1);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;font-weight:700;color:#B8860B;margin-bottom:16px}
.wc-e{font-size:11px;color:var(--text-muted);font-weight:600}
.wc-f{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--surface-alt);font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;border-top:1px solid var(--border-light)}

/* ── TRACKER CARD (redesign) ── */
.tk{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden}
.tk-header{background:var(--navy);padding:28px 24px 24px;text-align:center;position:relative}
.tk-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent)}
.tk-header img{height:32px;margin-bottom:14px}
.tk-header h3{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.tk-header small{font-size:12px;color:rgba(255,255,255,0.45);font-weight:500}
.tk-info{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border-light)}
.tk-info-left h4{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:2px}
.tk-info-left p{font-size:12px;color:var(--text-muted)}
.tk-info-right{text-align:right}
.tk-info-right span{font-size:12px;color:var(--text-secondary);font-weight:500}
.tk-prog{padding:18px 24px}
.tk-prog-label{display:flex;justify-content:space-between;margin-bottom:10px}
.tk-prog-label span{font-size:12px;color:var(--text-secondary);font-weight:600}
.tk-prog-label strong{font-size:22px;font-weight:800;color:var(--green)}
.tk-br{width:100%;height:8px;background:var(--border-light);border-radius:4px;overflow:hidden;margin-bottom:12px}
.tk-fl{height:100%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:4px;transition:width .6s}
.tk-dots{display:flex;gap:6px;margin-bottom:0}
.tk-dot{flex:1;height:5px;border-radius:3px;background:var(--border-light)}
.tk-dot.done{background:var(--green)}
.tk-dot.now{background:#3A8FD6}
.tk-stages{padding:8px 24px 20px}
.tk-s{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-light)}
.tk-s:last-child{border-bottom:none}
.tk-ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.tk-ic.done{background:var(--green);color:#fff}
.tk-ic.now{background:var(--gold);color:#fff;box-shadow:0 2px 10px var(--gold-glow)}
.tk-ic.wait{background:var(--border-light);color:var(--text-muted)}
.tk-si{flex:1}
.tk-si strong{font-size:14px;display:block;color:var(--navy);font-weight:700;margin-bottom:2px}
.tk-si small{font-size:11px;color:var(--text-muted)}
.tk-badge{font-size:9px;font-weight:800;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.tk-badge.done{background:rgba(59,139,59,0.1);color:#2E7D32}
.tk-badge.now{background:rgba(245,166,35,0.12);color:#B8860B}
.tk-badge.wait{background:var(--border-light);color:var(--text-muted)}
.tk-footer{padding:16px 24px;text-align:center;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted);font-weight:500}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(20px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:#fff;padding:12px 24px;
  border-radius:50px;font-size:12px;font-weight:700;z-index:200;
  transition:all .35s cubic-bezier(.22,1,.36,1);opacity:0;
  white-space:nowrap;box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,0.08);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cc{animation:fadeUp .35s ease both}
</style>
</head>

function slugify(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function parseStage(s){
  s=(s||'').toString();
  if(s.indexOf('6')>-1||s.toLowerCase().indexOf('ativo')>-1) return 5;
  if(s.indexOf('5')>-1||s.toLowerCase().indexOf('vistor')>-1) return 4;
  if(s.indexOf('4')>-1||s.toLowerCase().indexOf('obra')>-1) return 3;
  if(s.indexOf('3')>-1||s.toLowerCase().indexOf('aprov')>-1) return 2;
  if(s.indexOf('2')>-1||s.toLowerCase().indexOf('doc')>-1) return 1;
  return 0;
}

function renderStats(clients){
  var counts=[0,0,0,0,0,0];
  clients.forEach(function(c){counts[c.si]++;});
  var icos=['🎉','📄','⚡','🔨','🔎','☀️'];
  var html='';
  html+='<div class="stat"><div class="stat-ico">📋</div><div><div class="stat-n">'+clients.length+'</div><div class="stat-l">Total</div></div></div>';
  for(var i=0;i<6;i++){
    if(counts[i]>0){
      html+='<div class="stat"><div class="stat-ico">'+icos[i]+'</div><div><div class="stat-n">'+counts[i]+'</div><div class="stat-l">'+ST[i].t.split(' ')[0]+'</div></div></div>';
    }
  }
  document.getElementById('statsBar').innerHTML=html;
  document.getElementById('countBadge').textContent=clients.length;
}

function renderCards(clients){
  if(!clients.length){
    document.getElementById('clientList').innerHTML='<div class="empty"><span class="empty-ico">🔍</span>Nenhum cliente encontrado</div>';
    return;
  }
  var html='';
  clients.forEach(function(c,idx){
    var si=c.si;
    var prgHtml='';
    for(var j=0;j<6;j++){
      var cls=j<si?'done':j===si?'now':'';
      prgHtml+='<div class="prg-s '+cls+'"></div>';
    }
    var link=window.location.origin+window.location.pathname.replace('index.html','')+'cliente.html?id='+slugify(c.name);

      +'<div class="cc-pill '+PC[si]+'">'+ST[si].t+'</div>'
      +'</div>'
      +'<div class="cc-exp"><div class="cc-body">'

  });

}

function toggleCard(idx){
  var el=document.getElementById('cc'+idx);
  if(el.classList.contains('open')){el.classList.remove('open');}
  else{
    document.querySelectorAll('.cc.open').forEach(function(c){c.classList.remove('open');});
    el.classList.add('open');
    setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
  }
}

function filterClients(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  var filtered=allClients.filter(function(c){
    return c.name.toLowerCase().indexOf(q)>-1||(c.contract||'').toLowerCase().indexOf(q)>-1;
  });
  renderCards(filtered);
}

function showSheet(id){

function closeSheet(){

function copyLink(idx){
  var c=allClients[idx];
  var link=window.location.origin+window.location.pathname.replace('index.html','')+'cliente.html?id='+slugify(c.name);

function fetchData(pi){
  var url=SHEET_URL;
  var fu=CORS_PROXIES[pi](url);
  var btn=document.querySelector('.sync-btn');
  if(btn)btn.classList.add('loading');

  fetch(fu,{redirect:'follow'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(csv){
    if(csv.indexOf('<!DOCTYPE')>-1||csv.indexOf('<html')>-1) throw new Error('HTML');
    var parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    if(!parsed.data||!parsed.data.length){
      document.getElementById('clientList').innerHTML='<div class="empty"><span class="empty-ico">📋</span>Planilha vazia</div>';
      return;
    }
    allClients=[];
    parsed.data.forEach(function(row){
      var name=row['Cliente']||row['cliente']||row['Nome']||row['nome']||'';
      if(!name.trim()) return;
      allClients.push({
        name:name.trim(),
        power:row['Potência (kWp)']||row['Potencia']||row['kWp']||'',
        contract:row['Contrato']||row['contrato']||'',
        date:row['Data Fechamento']||row['Data']||'',
        phone:row['Telefone']||row['telefone']||row['WhatsApp']||row['whatsapp']||'',
        si:parseStage(row['Etapa Atual']||row['Etapa']||'')
      });
    });
    renderStats(allClients);
    renderCards(allClients);
    if(btn)btn.classList.remove('loading');
    toast('Dados atualizados ✓');
  }).catch(function(e){
    if(btn)btn.classList.remove('loading');
    if(pi<CORS_PROXIES.length-1) fetchData(pi+1);
    else document.getElementById('clientList').innerHTML='<div class="empty"><span class="empty-ico">⚠️</span>Erro ao carregar. Tente sincronizar novamente.</div>';
  });
}

function syncData(){fetchData(0);}

// Init
fetchData(0);
