<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#011D2E">
<title>Polaris Solar – Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#011D2E;--navy-mid:#022C44;--navy-light:#0A3D5C;
  --green:#3B8B3B;--green-light:#58B868;--green-glow:rgba(59,139,59,0.25);
  --gold:#F5A623;--gold-light:#FFD580;--gold-glow:rgba(245,166,35,0.3);
  --bg:#F0F2ED;--surface:#FFFFFF;--surface-alt:#F7F8F6;
  --text:#022C44;--text-secondary:#6B7D8A;--text-muted:#9EABB5;
  --border:#E2E8EC;--border-light:#EEF1F4;
  --shadow-sm:0 1px 3px rgba(1,29,46,0.06);
  --shadow-md:0 4px 16px rgba(1,29,46,0.10);
  --shadow-lg:0 8px 32px rgba(1,29,46,0.14);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{min-height:100%;background:var(--bg);font-family:'Manrope',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:calc(32px + var(--safe-b))}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:calc(var(--safe-t)+20px) 20px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.hdr img{height:32px}
.hdr-right{display:flex;align-items:center;gap:10px}
.count-badge{background:var(--gold);color:var(--navy);font-size:11px;font-weight:800;padding:3px 9px;border-radius:50px}
.sync-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:50px;color:#fff;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px}
.sync-btn:active{transform:scale(.96)}
.sync-btn.loading{opacity:.5;pointer-events:none}

/* ── SEARCH ── */
.search-wrap{padding:16px 16px 0}
.search-box{background:var(--surface);border-radius:var(--radius);padding:0 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
.search-ico{font-size:16px;opacity:.4}
.search-box input{flex:1;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text);padding:14px 0;background:transparent}
.search-box input::placeholder{color:var(--text-muted)}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:10px;padding:14px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat{background:var(--surface);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
.stat-ico{font-size:18px}
.stat-n{font-size:15px;font-weight:800;color:var(--navy)}
.stat-l{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}

/* ── LIST ── */
.list-wrap{padding:14px 16px 0}
.empty{padding:48px 24px;text-align:center;color:var(--text-muted);font-size:14px;font-weight:600}
.empty-ico{display:block;font-size:40px;margin-bottom:12px}

/* ── CLIENT CARD ── */
.cc{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);border:1px solid var(--border-light);
  margin-bottom:10px;overflow:hidden;cursor:pointer;
  transition:box-shadow .2s,transform .15s;
  animation:slideIn .4s ease both;
}
.cc:active{transform:scale(.99)}
.cc.open{box-shadow:var(--shadow-md)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cc-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.cc-av{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:800;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-sub{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:2px}
.cc-pill{font-size:9px;font-weight:800;padding:4px 10px;border-radius:50px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;text-align:center;max-width:80px;line-height:1.3}
.p1{background:rgba(59,139,59,0.1);color:#2E7D32}
.p2{background:rgba(2,44,68,0.08);color:var(--navy-mid)}
.p3{background:rgba(74,20,140,0.08);color:#4A148C}
.p4{background:rgba(191,54,12,0.08);color:#BF360C}
.p5{background:rgba(1,87,155,0.08);color:#01579B}
.p6{background:rgba(232,146,13,0.12);color:#B8660B}

/* ── EXPANDIDO ── */
.cc-exp{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.22,1,.36,1)}
.cc.open .cc-exp{max-height:600px}
.cc-body{padding:0 16px 16px}
.cc-divider{height:1px;background:var(--border-light);margin-bottom:14px}

/* ── PROGRESS MINI ── */
.prg{background:var(--surface-alt);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;border:1px solid var(--border-light)}
.prg-bar{display:flex;gap:3px;margin-bottom:8px}
.prg-s{height:5px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.prg-s.done{background:var(--green)}
.prg-s.now{background:var(--gold)}
.prg-txt{font-size:11px;font-weight:700;color:var(--navy)}
.prg-eta{font-size:10px;color:var(--text-muted);font-weight:600;margin-top:3px}

/* ── ACTIONS ── */
.acts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.act{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:10px 8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s}
.act:active{transform:scale(.96)}
.act-ico{font-size:15px}
.act-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 2px 8px rgba(37,211,102,0.2)}
.act-tk{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff}
.act-cp{background:var(--surface-alt);color:var(--text);border:1px solid var(--border-light)}
.act-lk{background:var(--surface-alt);color:var(--text);border:1px solid var(--border-light)}

/* ── CELEBRAÇÃO MINI (card etapa 8 no painel) ── */
.cc-celebrate{
  background:linear-gradient(135deg,#012E1A,#014d29);
  border:1px solid rgba(59,139,59,0.4);
  border-radius:var(--radius-sm);
  padding:10px 12px;
  margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.cc-celebrate-ico{font-size:20px}
.cc-celebrate-info{}
.cc-celebrate-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.5px}
.cc-celebrate-sub{font-size:10px;color:rgba(255,255,255,0.6);font-weight:600;margin-top:2px}

/* ── OVERLAY / SHEETS ── */
.overlay{position:fixed;inset:0;background:rgba(1,29,46,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;padding:20px 0 calc(24px + var(--safe-b));z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-height:92vh;overflow-y:auto}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sheet-title{font-size:13px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:16px}
.sheet-actions{display:flex;gap:10px;padding:0 20px;margin-top:16px}
.sheet-btn{flex:1;padding:14px;border:none;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.sheet-btn:active{transform:scale(.97)}
.sheet-btn-save{background:var(--surface-alt);color:var(--text);border:1px solid var(--border-light)}
.sheet-btn-send{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff}
.sheet-btn-close{background:var(--surface-alt);color:var(--text);border:1px solid var(--border-light)}

/* ── WA CARD PREVIEW ── */
#waBody{padding:0 20px}
.wc{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg)}
.wc-t{background:var(--navy);padding:20px;text-align:center}
.wc-lg{height:28px;margin-bottom:12px}
.wc-st{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.wc-ti{font-size:16px;font-weight:800;color:#fff;margin-bottom:12px}
.wc-ds{display:flex;gap:4px;justify-content:center}
.wd{width:18px;height:5px;border-radius:2px;background:rgba(255,255,255,0.15)}
.wd.wd-on{background:var(--green)}
.wd.wd-nw{background:var(--gold)}
.wc-b{background:var(--surface);padding:18px}
.wc-m{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:12px}
.wc-eta{font-size:11px;color:var(--text-muted);font-weight:600;background:var(--surface-alt);padding:8px 12px;border-radius:8px;border:1px solid var(--border-light)}
/* Card celebração WA (etapa 8) */
.wc-celebrate{background:linear-gradient(135deg,#012E1A,#014d29);padding:14px 18px;border-top:1px solid rgba(59,139,59,0.3)}
.wc-celebrate-line{font-size:12px;color:rgba(255,255,255,0.8);font-weight:600;line-height:1.5}
.wc-celebrate-metrics{display:flex;gap:10px;margin-top:10px}
.wc-celebrate-m{flex:1;background:rgba(255,255,255,0.06);border-radius:8px;padding:8px;text-align:center}
.wc-celebrate-v{font-size:20px;font-weight:800;color:var(--gold);line-height:1}
.wc-celebrate-l{font-size:8px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px}
.wc-f{background:var(--surface-alt);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--text-muted);border-top:1px solid var(--border-light)}

/* ── TRACKER ── */
#tkBody{padding:0 20px}
.tk{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg)}
.tk-header{background:var(--navy);padding:20px;text-align:center}
.tk-header img{height:28px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.tk-header h3{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px}
.tk-header small{font-size:10px;color:rgba(255,255,255,0.4);font-weight:600}
.tk-info{background:var(--surface);padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border-light)}
.tk-info-left h4{font-size:15px;font-weight:800;color:var(--navy)}
.tk-info-left p{font-size:11px;color:var(--text-muted);font-weight:600;margin-top:2px}
.tk-info-right span{font-size:10px;color:var(--text-muted);font-weight:700}
.tk-prog{background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border-light)}
.tk-prog-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--text-secondary)}
.tk-br{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.tk-fl{height:100%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:3px}
.tk-dots{display:flex;gap:4px}
.tk-dot{height:5px;flex:1;border-radius:2px;background:var(--border)}
.tk-dot.done{background:var(--green)}
.tk-dot.now{background:var(--gold)}
.tk-stages{background:var(--surface)}
.tk-s{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-light)}
.tk-s:last-child{border-bottom:none}
.tk-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.tk-ic.done{background:rgba(59,139,59,0.1);color:var(--green)}
.tk-ic.now{background:var(--gold);color:var(--navy)}
.tk-ic.wait{background:var(--border-light);color:var(--text-muted)}
.tk-si{flex:1}
.tk-si strong{display:block;font-size:11px;font-weight:800;color:var(--navy)}
.tk-si small{font-size:9px;color:var(--text-muted);font-weight:600}
.tk-badge{font-size:8px;font-weight:800;padding:3px 8px;border-radius:50px;text-transform:uppercase;flex-shrink:0;align-self:center}
.tk-badge.done{background:rgba(59,139,59,0.1);color:#2E7D32}
.tk-badge.now{background:rgba(245,166,35,0.12);color:#B8660B}
.tk-badge.wait{background:var(--border-light);color:var(--text-muted)}
.tk-footer{background:var(--surface-alt);padding:12px 16px;text-align:center;font-size:10px;font-weight:700;color:var(--text-muted);border-top:1px solid var(--border-light)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(32px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:12px 20px;border-radius:50px;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <img id="hdrLogo" src="" alt="Polaris Solar">
  <div class="hdr-right">
    <span class="count-badge" id="countBadge">–</span>
    <button class="sync-btn" onclick="syncData()">↻ Sincronizar</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar cliente ou contrato..." oninput="filterClients()">
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="list-wrap" id="clientList"><div class="empty"><span class="empty-ico">⏳</span>Carregando obras...</div></div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Sheet WhatsApp -->
<div class="sheet" id="waSheet">
  <div style="padding:0 20px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📩 Prévia do WhatsApp</div>
  </div>
  <div id="waBody"></div>
  <div class="sheet-actions">
    <button class="sheet-btn sheet-btn-save" onclick="captureWA()">📸 Salvar Imagem</button>
    <button class="sheet-btn sheet-btn-send" id="waSend">Enviar WhatsApp</button>
  </div>
  <div style="padding:0 20px;margin-top:8px">
    <button class="sheet-btn sheet-btn-close" style="width:100%" onclick="closeSheet()">Fechar</button>
  </div>
</div>

<!-- Sheet Tracker -->
<div class="sheet" id="tkSheet">
  <div style="padding:0 20px">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📊 Tracker Visual</div>
  </div>
  <div id="tkBody"></div>
  <div class="sheet-actions">
    <button class="sheet-btn sheet-btn-save" onclick="captureTracker()">📸 Salvar Imagem</button>
    <button class="sheet-btn sheet-btn-close" onclick="closeSheet()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  var link=window.location.origin+window.location.pathname.replace('index.html','')+'cliente.html?id='+slugify(c.name);
  var msgFinal='';var dsHtml='';
  for(var j=0;j<8;j++){var dcls=j<si?'wd-on':j===si?'wd-nw':'';dsHtml+='<div class="wd '+dcls+'"></div>';}
  var waBodyHtml='';
  if(si===7){
    var ativoData=buildWAMsgAtivo(c);
    msgFinal=ativoData.msg+'\n\n🔗 Acompanhe: '+link;
    var celebSection='';
    if(ativoData.diasCorridos!==null){
      celebSection='<div class="wc-celebrate"><div class="wc-celebrate-line">🏆 Obra concluída!'+(ativoData.diasAntes>0?' <strong>'+ativoData.diasAntes+' dias antes</strong> do prazo!':'')+'</div>'
        +'<div class="wc-celebrate-metrics"><div class="wc-celebrate-m"><div class="wc-celebrate-v">'+ativoData.diasCorridos+'d</div><div class="wc-celebrate-l">Tempo de obra</div></div>'
        +'<div class="wc-celebrate-m"><div class="wc-celebrate-v">'+(ativoData.diasAntes>0?ativoData.diasAntes:0)+'d</div><div class="wc-celebrate-l">Antes do prazo</div></div></div></div>';
    }
    waBodyHtml='<div class="wc" id="waCapture"><div class="wc-t"><img src="'+LOGO+'" class="wc-lg"><div class="wc-st">Sistema Ativo!</div><div class="wc-ti">☀️ '+c.name+'</div><div class="wc-ds">'+dsHtml+'</div></div>'
      +'<div class="wc-b"><div class="wc-m">'+ativoData.msg.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>')+'</div><div class="wc-eta">🔗 Link de acompanhamento enviado</div></div>'
      +celebSection+'<div class="wc-f"><span>Polaris Energia Solar</span><span>☀️</span></div></div>';
  } else {
    var greet=si>=6?', quase lá!':(si>=3?', sua obra está avançando!':', bem-vindo(a)!');
    msgFinal='Olá, *'+c.name+'*'+greet+'\n\n'+ST[si].wa.replace(/\*/g,'')+'\n\nPrazo: '+ST[si].eta.replace(/.*: /,'')+'\n\nAcompanhe aqui: '+link;
    waBodyHtml='<div class="wc" id="waCapture"><div class="wc-t"><img src="'+LOGO+'" class="wc-lg"><div class="wc-st">Etapa '+(si+1)+' de 8</div><div class="wc-ti">'+ST[si].t+'</div><div class="wc-ds">'+dsHtml+'</div></div>'
      +'<div class="wc-b"><div class="wc-m">'+ST[si].ico+' <strong>'+c.name+'</strong>'+greet+'<br><br>'+ST[si].wa.replace(/\*(.*?)\*/g,'<strong>$1</strong>')+'</div><div class="wc-eta">⏱ '+ST[si].eta+'</div></div>'
      +'<div class="wc-f"><span>Polaris Energia Solar</span><span>'+ST[si].ico+'</span></div></div>';
  }
  document.getElementById('waBody').innerHTML=waBodyHtml;
  document.getElementById('waSend').onclick=function(){window.open('https://wa.me/'+phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msgFinal),'_blank');};
  showSheet('waSheet');
}

function openTK(idx){
  var c=allClients[idx];var si=c.si;var pct=Math.round(((si+1)/8)*100);
  var dotsHtml='';for(var j=0;j<8;j++){var dcls=j<si?'done':j===si?'now':'';dotsHtml+='<div class="tk-dot '+dcls+'"></div>';}
  var stHtml='';
  for(var j=0;j<8;j++){var tcls=j<si?'done':j===si?'now':'wait';stHtml+='<div class="tk-s"><div class="tk-ic '+tcls+'">'+(j<si?'✓':(j+1))+'</div><div class="tk-si"><strong>'+ST[j].t+'</strong><small>'+ST[j].d+'</small></div><div class="tk-badge '+tcls+'">'+(j<si?'Concluído':j===si?'Em andamento':'Pendente')+'</div></div>';}
  var html='<div class="tk" id="tkCapture"><div class="tk-header"><img src="'+LOGO+'"><h3>Acompanhe seu Projeto</h3><small>Energia solar</small></div>'
    +'<div class="tk-info"><div class="tk-info-left"><h4>'+c.name+'</h4><p>'+(c.power?c.power+' kWp':'')+(c.power&&c.contract?' | ':'')+(c.contract||'')+'</p></div><div class="tk-info-right"><span>Início: '+(c.dateStart||c.date||'A definir')+'</span></div></div>'
    +'<div class="tk-prog"><div class="tk-prog-label"><span>Progresso geral</span><strong>'+pct+'%</strong></div><div class="tk-br"><div class="tk-fl" style="width:'+pct+'%"></div></div><div class="tk-dots">'+dotsHtml+'</div></div>'
    +'<div class="tk-stages">'+stHtml+'</div><div class="tk-footer">© 2026 Polaris Energia Solar | Pós-venda</div></div>';
  document.getElementById('tkBody').innerHTML=html;showSheet('tkSheet');
}

function showSheet(id){document.getElementById('overlay').classList.add('show');document.getElementById(id).classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');document.querySelectorAll('.sheet').forEach(function(s){s.classList.remove('show');});}

function copyLink(idx){
  var c=allClients[idx];var link=window.location.origin+window.location.pathname.replace('index.html','')+'cliente.html?id='+slugify(c.name);
  if(navigator.clipboard){navigator.clipboard.writeText(link).then(function(){toast('Link copiado! 🔗');});}
  else{var ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Link copiado! 🔗');}
}

function captureTracker(){
  var el=document.getElementById('tkCapture');
  if(el&&window.html2canvas){html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(function(canvas){var a=document.createElement('a');a.download='tracker-polaris.png';a.href=canvas.toDataURL('image/png');a.click();toast('Imagem salva! 📸');});}
}
function captureWA(){
  var el=document.getElementById('waCapture');
  if(el&&window.html2canvas){html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(function(canvas){var a=document.createElement('a');a.download='whatsapp-polaris.png';a.href=canvas.toDataURL('image/png');a.click();toast('Imagem salva! 📸');});}
}

function fetchData(pi){
  var fu=CORS_PROXIES[pi](SHEET_URL);var btn=document.querySelector('.sync-btn');if(btn)btn.classList.add('loading');
  fetch(fu,{redirect:'follow'}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
  .then(function(csv){
    if(csv.indexOf('<!DOCTYPE')>-1||csv.indexOf('<html')>-1)throw new Error('HTML');
    var parsed=Papa.parse(csv,{header:true,skipEmptyLines:true});
    if(!parsed.data||!parsed.data.length){document.getElementById('clientList').innerHTML='<div class="empty"><span class="empty-ico">📋</span>Planilha vazia</div>';return;}
    allClients=[];
    parsed.data.forEach(function(row){
      var name=row['Cliente']||row['cliente']||row['Nome']||row['nome']||'';
      if(!name.trim())return;
      allClients.push({name:name.trim(),power:row['Potência (kWp)']||row['Potencia']||row['kWp']||'',contract:row['Contrato']||row['contrato']||'',date:row['Data Fechamento']||row['Data']||'',dateStart:row['Data Fechamento']||row['Data Inicio']||row['Data']||'',dateEnd:row['Data Conclusão']||row['Data Conclusao']||row['Data Ativacao']||row['Data Ativação']||'',phone:row['Telefone']||row['telefone']||row['WhatsApp']||row['whatsapp']||'',si:parseStage(row['Etapa Atual']||row['Etapa']||'')});
    });
    renderStats(allClients);renderCards(allClients);if(btn)btn.classList.remove('loading');toast('Dados atualizados ✓');
  }).catch(function(e){if(btn)btn.classList.remove('loading');if(pi<CORS_PROXIES.length-1)fetchData(pi+1);else document.getElementById('clientList').innerHTML='<div class="empty"><span class="empty-ico">⚠️</span>Erro ao carregar. Tente sincronizar.</div>';});
}

function syncData(){fetchData(0);}
fetchData(0);
</script>
