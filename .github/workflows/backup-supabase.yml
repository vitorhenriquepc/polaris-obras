name: Backup Supabase (semanal)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Exportar tabelas do Supabase para CSV
        env:
          SB_URL: https://dakubhcgohiwzyqiegqf.supabase.co
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p backups
          DATA=$(date +%Y-%m-%d)
          for t in obras equipe etapas etapas_historico fotos usuarios_autorizados; do
            echo "Exportando $t ..."
            curl -s "$SB_URL/rest/v1/$t?select=*" \
              -H "apikey: $SB_KEY" \
              -H "Authorization: Bearer $SB_KEY" \
              -H "Accept: text/csv" \
              -o "backups/${t}_${DATA}.csv"
          done
          ls -la backups/

      - name: Salvar backup como artefato (privado)
        uses: actions/upload-artifact@v4
        with:
          name: backup-polaris-obras
          path: backups/
          retention-days: 90
