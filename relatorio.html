<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#04141F">
<title>Relatório de Instalação — Polaris Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#04141F; --navy2:#0A2536; --ink:#0E2438;
  --gold:#D6A518; --gold-soft:rgba(214,165,24,.55);
  --green:#3B8B3B;
  --paper:#F4F4F1; --card:#FFFFFF; --line:#E4E4DE;
  --txt:#22323E; --mut:#7A8893;
}
html{scroll-behavior:smooth}
body{font-family:'Manrope',sans-serif;background:var(--paper);color:var(--txt);-webkit-font-smoothing:antialiased}
img{display:block}

/* ============ HERO ============ */
.hero{position:relative;min-height:92vh;background:var(--navy);color:#fff;
display:flex;flex-direction:column;overflow:hidden}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;
filter:saturate(1.05)}
.hero .veil{position:absolute;inset:0;background:
linear-gradient(180deg,rgba(4,20,31,.35) 0%,rgba(4,20,31,.55) 45%,rgba(4,20,31,.94) 100%)}
.hero .in{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
max-width:920px;width:100%;margin:0 auto;padding:34px 26px 46px}
.hero .top{display:flex;justify-content:center}
.hero .top img{height:44px;filter:drop-shadow(0 4px 18px rgba(0,0,0,.4))}
.hero .mid{margin:auto 0;text-align:center;padding:60px 0 30px}
.hero .kicker{font-size:11px;font-weight:700;letter-spacing:5px;color:var(--gold);text-transform:uppercase}
.hero h1{font-size:clamp(34px,7vw,58px);font-weight:800;line-height:1.06;margin:16px 0 0;letter-spacing:-.5px}
.hero .rule{width:64px;height:2px;background:var(--gold);margin:26px auto 0;opacity:.9}
.hero .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:2px;
margin-top:auto;border-top:1px solid rgba(255,255,255,.14);padding-top:22px}
.hero .meta .m{padding:6px 10px;text-align:center}
.hero .meta .k{font-size:9.5px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.55);text-transform:uppercase}
.hero .meta .v{font-size:15px;font-weight:700;margin-top:6px}
.hero .meta .v.gold{color:var(--gold)}
.scroll{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:2;
color:rgba(255,255,255,.5);font-size:18px;animation:fl 2s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}

/* ============ ESTRUTURA ============ */
.wrap{max-width:920px;margin:0 auto;padding:0 22px}
section{padding:64px 0}
.shead{margin-bottom:34px}
.shead .n{font-size:12px;font-weight:800;letter-spacing:4px;color:var(--gold);text-transform:uppercase}
.shead h2{font-size:clamp(22px,4vw,30px);font-weight:800;color:var(--ink);margin-top:8px;letter-spacing:-.3px}
.shead .hl{width:100%;height:1px;background:var(--line);margin-top:20px;position:relative}
.shead .hl::before{content:'';position:absolute;left:0;top:-1px;width:70px;height:3px;background:var(--gold);border-radius:2px}

/* stats */
.stats{background:var(--card);border:1px solid var(--line);border-radius:20px;
display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));overflow:hidden;
box-shadow:0 18px 50px rgba(14,36,56,.06)}
.stat{padding:26px 22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat .k{font-size:10px;font-weight:800;letter-spacing:2.5px;color:var(--mut);text-transform:uppercase}
.stat .v{font-size:24px;font-weight:800;color:var(--ink);margin-top:9px;letter-spacing:-.5px}
.stat .v small{font-size:13px;font-weight:700;color:var(--mut)}
.stat .s{font-size:12px;color:var(--mut);margin-top:4px;font-weight:600}

/* ============ FOTOS ============ */
.iSec{margin-bottom:52px}
.iHead{display:flex;align-items:baseline;gap:16px;margin-bottom:6px}
.iHead .ix{font-size:26px;font-weight:300;color:var(--gold);letter-spacing:1px;min-width:44px}
.iHead h3{font-size:18px;font-weight:800;color:var(--ink)}
.iDesc{font-size:13px;color:var(--mut);margin:2px 0 18px 60px;max-width:560px;line-height:1.55}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid .ph{position:relative;border-radius:16px;overflow:hidden;background:#dfe2dd;
aspect-ratio:4/3;cursor:zoom-in;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s}
.grid .ph:first-child{grid-column:span 2;grid-row:span 2;aspect-ratio:auto}
.grid .ph img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.grid .ph::after{content:'⤢';position:absolute;right:10px;bottom:8px;color:#fff;font-size:15px;
opacity:0;transition:.3s;text-shadow:0 1px 8px rgba(0,0,0,.7)}
.grid .ph:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(14,36,56,.18)}
.grid .ph:hover img{transform:scale(1.04)}
.grid .ph:hover::after{opacity:1}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .grid .ph{border-radius:12px}
  .iDesc{margin-left:0}
}
.pend{border:1px dashed var(--line);border-radius:16px;padding:34px;text-align:center;
color:var(--mut);font-size:13.5px;background:#fbfbf9}

/* ============ TERMO ============ */
.certWrap{background:linear-gradient(180deg,#fff 0%,#FBFAF6 100%);border:1px solid var(--line);
border-radius:24px;padding:52px 34px;text-align:center;position:relative;
box-shadow:0 24px 70px rgba(14,36,56,.08)}
.certWrap::before{content:'';position:absolute;inset:10px;border:1px solid rgba(214,165,24,.35);border-radius:16px;pointer-events:none}
.selo{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;
border-radius:40px;padding:9px 20px;font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase}
.selo .dot{color:var(--gold)}
.certWrap h3{font-size:21px;font-weight:800;color:var(--ink);margin:24px 0 6px}
.certWrap .tx{font-size:14px;line-height:1.9;color:#4c5c68;max-width:600px;margin:14px auto 0;font-weight:500}
.assin{margin-top:36px}
.assin img{max-height:96px;max-width:300px;margin:0 auto}
.assin .linha{width:280px;height:1px;background:var(--ink);margin:10px auto 14px;opacity:.5}
.assin .nm{font-size:15px;font-weight:800;color:var(--ink)}
.assin .dc{font-size:12.5px;color:var(--mut);font-weight:600;margin-top:4px}
.assin .dt{display:inline-block;margin-top:14px;font-size:11px;font-weight:700;letter-spacing:1.5px;
color:var(--gold);text-transform:uppercase;border-top:1px solid var(--line);padding-top:10px}
.certPend{color:var(--mut);font-size:13.5px;font-style:italic;margin-top:22px}

/* ============ FOOTER ============ */
footer{background:var(--navy);color:#fff;padding:64px 22px 40px;margin-top:30px}
footer .fin{max-width:920px;margin:0 auto;text-align:center}
footer img{height:42px;margin:0 auto 26px}
footer .c{font-size:14px;font-weight:600;color:rgba(255,255,255,.85);margin:5px 0}
footer .c b{color:var(--gold);font-weight:800}
footer .site{margin-top:22px;font-size:13px;letter-spacing:1.5px;color:rgba(255,255,255,.6)}
footer .site b{color:#fff}
footer .gen{margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);
font-size:10.5px;color:rgba(255,255,255,.35);letter-spacing:.5px}

/* ============ LIGHTBOX ============ */
.lb{position:fixed;inset:0;background:rgba(3,13,21,.96);z-index:100;display:none;
align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(6px)}
.lb.on{display:flex}
.lb img{max-width:94vw;max-height:80vh;object-fit:contain;border-radius:8px;
box-shadow:0 30px 90px rgba(0,0,0,.6);animation:zin .25s ease}
@keyframes zin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.lb .cap{color:rgba(255,255,255,.85);font-size:13.5px;font-weight:700;margin-top:16px;text-align:center;padding:0 20px}
.lb .cnt{color:rgba(255,255,255,.4);font-size:11px;font-weight:700;letter-spacing:2px;margin-top:6px}
.lb button{position:fixed;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
color:#fff;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center}
.lb button:hover{background:rgba(255,255,255,.18)}
.lb .x{top:18px;right:18px;width:44px;height:44px;border-radius:50%;font-size:17px}
.lb .nav{top:50%;transform:translateY(-50%);width:48px;height:64px;border-radius:14px;font-size:22px}
.lb .pv{left:12px}.lb .nx{right:12px}
.lb .orig{bottom:22px;right:18px;border-radius:30px;padding:10px 18px;font-size:12px;font-weight:800}
@media(max-width:640px){.lb .nav{width:40px;height:54px}.lb img{max-height:72vh}}

/* ============ AÇÕES ============ */
.acoes{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:9px;z-index:60}
.acoes button{border:none;border-radius:40px;padding:13px 20px;font-family:inherit;font-size:13px;
font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;
box-shadow:0 14px 36px rgba(4,20,31,.35);transition:transform .2s}
.acoes button:hover{transform:translateY(-2px)}
.bPdf{background:var(--navy);color:#fff}
.bZap{background:var(--green);color:#fff;display:none}

/* reveal */
.rv{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
.rv.on{opacity:1;transform:none}

.center{max-width:920px;margin:0 auto;text-align:center;padding:110px 30px;color:var(--mut)}

@media print{
  .acoes,.scroll,.lb{display:none!important}
  .hero{min-height:auto;padding-bottom:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hero .bg{display:none}
  .hero .veil{background:var(--navy)}
  section{padding:34px 0;page-break-inside:avoid}
  .grid .ph:hover{transform:none;box-shadow:none}
  body{background:#fff}
}
</style>
</head>
<body>
<div id="root"><div class="center">⏳ Preparando seu relatório...</div></div>

<script>
var SUPABASE_URL='https://dakubhcgohiwzyqiegqf.supabase.co';
var SUPABASE_KEY='sb_publishable_hue0wC6DINtAaxTPlSIOIg_X1Tr0vJx';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var SLUG=new URLSearchParams(location.search).get('id');
var LOGO_BRANCA='https://obras.polarisenergiasolar.com/logo.png';
var D=null, GAL=[], gi=0;

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dataBR(s){if(!s)return null;var d=new Date(s.length<=10?s+'T12:00:00':s);return isNaN(d)?null:d.toLocaleDateString('pt-BR');}

async function boot(){
  if(!SLUG){document.getElementById('root').innerHTML='<div class="center">🔗 Link incompleto.</div>';return;}
  var r=await sb.rpc('get_relatorio_publico',{p_slug:SLUG});
  if(r.error||!r.data){document.getElementById('root').innerHTML='<div class="center">🔒 Relatório não encontrado.</div>';return;}
  D=r.data; render();
  try{var s=await sb.auth.getSession();if(s.data.session){var b=document.getElementById('bZap');if(b)b.style.display='flex';}}catch(e){}
}

function render(){
  var o=D.obra, fotos=D.fotos||[], itens=D.itens||[];
  // capa: prioriza foto dos módulos instalados (3), depois geral (9), depois a primeira
  var capa=(fotos.find(function(f){return f.item_id===3})||fotos.find(function(f){return f.item_id===9})||fotos[0]||{}).url||'';
  var h='';

  /* HERO */
  h+='<div class="hero">'
    +(capa?'<div class="bg" style="background-image:url(\''+esc(capa)+'\')"></div>':'')
    +'<div class="veil"></div>'
    +'<div class="in">'
    +'<div class="top"><img src="'+LOGO_BRANCA+'" onerror="this.style.display=\'none\'"></div>'
    +'<div class="mid">'
    +'<div class="kicker">Relatório de Instalação</div>'
    +'<h1>'+esc(o.cliente)+'</h1>'
    +'<div class="rule"></div>'
    +'</div>'
    +'<div class="meta">'
    +'<div class="m"><div class="k">Potência</div><div class="v gold">'+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' kWp':'—')+'</div></div>'
    +'<div class="m"><div class="k">Contrato</div><div class="v">'+(o.contrato?'Nº '+esc(o.contrato):'—')+'</div></div>'
    +'<div class="m"><div class="k">Instalação</div><div class="v">'+(dataBR(o.data_instalacao)||dataBR(o.data_conclusao)||'—')+'</div></div>'
    +'<div class="m"><div class="k">Consultor</div><div class="v">'+esc(o.vendedor||'Polaris')+'</div></div>'
    +'</div>'
    +'</div><div class="scroll">▾</div></div>';

  /* USINA */
  h+='<div class="wrap"><section class="rv"><div class="shead"><div class="n">01 — Ficha Técnica</div><h2>A sua usina</h2><div class="hl"></div></div>'
    +'<div class="stats">'
    +'<div class="stat"><div class="k">Potência do sistema</div><div class="v">'+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' <small>kWp</small>':'—')+'</div></div>'
    +'<div class="stat"><div class="k">Módulos fotovoltaicos</div><div class="v">'+(o.qtd_modulos?o.qtd_modulos+' <small>unidades</small>':'—')+'</div>'+(o.modelo_modulo?'<div class="s">'+esc(o.modelo_modulo)+'</div>':'')+'</div>'
    +'<div class="stat"><div class="k">Inversor</div><div class="v" style="font-size:18px">'+esc(o.inversor_descricao||'—')+'</div></div>'
    +'<div class="stat"><div class="k">Equipe de campo</div><div class="v" style="font-size:18px">'+esc(o.instalador||'Polaris')+'</div>'+(dataBR(o.data_conclusao)?'<div class="s">Ativação em '+dataBR(o.data_conclusao)+'</div>':'')+'</div>'
    +'</div></section>';

  /* FOTOS */
  h+='<section class="rv"><div class="shead"><div class="n">02 — Registro fotográfico</div><h2>Cada etapa, documentada</h2><div class="hl"></div></div>';
  GAL=[]; var teve=false, sec=0;
  itens.forEach(function(it){
    var fts=fotos.filter(function(f){return f.item_id===it.id});
    if(!fts.length) return;
    teve=true; sec++;
    h+='<div class="iSec rv"><div class="iHead"><div class="ix">'+String(sec).padStart(2,'0')+'</div><h3>'+esc(it.titulo)+'</h3></div>'
      +(it.descricao?'<div class="iDesc">'+esc(it.descricao)+'</div>':'')
      +'<div class="grid">';
    fts.forEach(function(f){
      var idx=GAL.length;
      GAL.push({url:f.url,cap:it.titulo});
      h+='<div class="ph" onclick="abrirLb('+idx+')"><img src="'+esc(f.url)+'" loading="lazy" alt="'+esc(it.titulo)+'"></div>';
    });
    h+='</div></div>';
  });
  if(!teve) h+='<div class="pend">📷 As fotos da instalação serão anexadas pela nossa equipe de campo.</div>';
  h+='</section>';

  /* TERMO */
  h+='<section class="rv"><div class="shead"><div class="n">03 — Formalização</div><h2>Termo de conclusão</h2><div class="hl"></div></div>'
    +'<div class="certWrap">';
  if(o.aceite_em){
    h+='<div class="selo"><span class="dot">●</span> Obra concluída e aceita</div>'
      +'<div class="tx">"Declaro que recebi e aceitei o projeto de energia fotovoltaica concluído, conforme os termos do contrato firmado com a Polaris Energia Solar, em conformidade com os requisitos técnicos e normativos aplicáveis. Estou satisfeito com o trabalho realizado."</div>'
      +'<div class="assin">'
      +(o.aceite_assinatura?'<img src="'+esc(o.aceite_assinatura)+'" alt="Assinatura">':'')
      +'<div class="linha"></div>'
      +'<div class="nm">'+esc(o.aceite_nome)+'</div>'
      +(o.aceite_documento?'<div class="dc">Documento: '+esc(o.aceite_documento)+'</div>':'')
      +'<div class="dt">'+new Date(o.aceite_em).toLocaleDateString('pt-BR')+' · '+new Date(o.aceite_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>'
      +'</div>';
  }else{
    h+='<div class="selo" style="background:#8b8f93"><span class="dot" style="color:#fff">●</span> Aguardando assinatura</div>'
      +'<div class="certPend">O termo de conclusão será assinado pelo cliente ao final da instalação e passará a constar neste relatório.</div>';
  }
  h+='</div></section></div>';

  /* FOOTER */
  h+='<footer><div class="fin">'
    +'<img src="'+LOGO_BRANCA+'" onerror="this.style.display=\'none\'">'
    +'<div class="c">📱 <b>(18) 93085-2573</b></div>'
    +'<div class="c">contato@polarisenergiasolar.com</div>'
    +'<div class="site">www.<b>polarisenergiasolar</b>.com</div>'
    +'<div class="gen">Relatório digital gerado pelo sistema Polaris Obras · '+new Date().getFullYear()+'</div>'
    +'</div></footer>';

  /* LIGHTBOX */
  h+='<div class="lb" id="lb" onclick="if(event.target===this)fecharLb()">'
    +'<button class="x" onclick="fecharLb()">✕</button>'
    +'<button class="nav pv" onclick="navLb(-1)">‹</button>'
    +'<img id="lbImg" src="">'
    +'<div class="cap" id="lbCap"></div><div class="cnt" id="lbCnt"></div>'
    +'<button class="nav nx" onclick="navLb(1)">›</button>'
    +'<button class="orig" onclick="window.open(GAL[gi].url,\'_blank\')">⤓ Abrir original</button>'
    +'</div>';

  /* AÇÕES */
  h+='<div class="acoes">'
    +'<button class="bZap" id="bZap" onclick="enviarNoGrupo()">📣 Enviar no grupo</button>'
    +'<button class="bPdf" onclick="window.print()">📄 Baixar PDF</button>'
    +'</div>';

  document.getElementById('root').innerHTML=h;
  document.title='Relatório — '+o.cliente+' — Polaris Energia Solar';

  // reveal on scroll
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('on');io.unobserve(e.target);}})},{threshold:.08});
  document.querySelectorAll('.rv').forEach(function(el){io.observe(el)});
}

/* Lightbox */
function abrirLb(i){gi=i;updLb();document.getElementById('lb').classList.add('on');document.body.style.overflow='hidden';}
function fecharLb(){document.getElementById('lb').classList.remove('on');document.body.style.overflow='';}
function navLb(d){gi=(gi+d+GAL.length)%GAL.length;updLb();}
function updLb(){var g=GAL[gi];document.getElementById('lbImg').src=g.url;
document.getElementById('lbCap').textContent=g.cap;
document.getElementById('lbCnt').textContent=(gi+1)+' / '+GAL.length;}
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lb')||!document.getElementById('lb').classList.contains('on'))return;
  if(e.key==='Escape')fecharLb();
  if(e.key==='ArrowLeft')navLb(-1);
  if(e.key==='ArrowRight')navLb(1);
});
// swipe no lightbox
var tx=null;
document.addEventListener('touchstart',function(e){var lb=document.getElementById('lb');if(lb&&lb.classList.contains('on'))tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',function(e){if(tx===null)return;var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)navLb(dx>0?-1:1);tx=null;},{passive:true});

async function enviarNoGrupo(){
  if(!confirm('Enviar o link deste relatório no grupo do cliente?'))return;
  var s=await sb.auth.getSession();
  if(!s.data.session){alert('Faça login no painel primeiro.');return;}
  var q=await sb.from('obras').select('whatsapp_grupo_id').eq('slug',SLUG).single();
  if(q.error||!q.data||!q.data.whatsapp_grupo_id){alert('Esta obra não tem grupo de WhatsApp.');return;}
  var link=location.origin+'/relatorio.html?id='+encodeURIComponent(SLUG);
  var msg='📄 *Relatório oficial da instalação — Polaris Energia Solar*\n\nSeu relatório completo está disponível, com todas as fotos em alta qualidade, os dados técnicos da usina e o termo de conclusão:\n\n🔗 '+link+'\n\nToque nas fotos para vê-las em tela cheia. 📱\n\n*Equipe Polaris Energia Solar* ☀️';
  var r=await sb.functions.invoke('notificar-grupo',{body:{grupo_id:q.data.whatsapp_grupo_id,message:msg}});
  if(r.error||(r.data&&r.data.error)){alert('Erro: '+((r.data&&r.data.error)||r.error.message));return;}
  alert('✅ Relatório enviado no grupo!');
}
boot();
</script>
</body>
</html>
