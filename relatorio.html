<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#011D2E">
<title>Relatório de Instalação — Polaris Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D2A40;--navy2:#011D2E;--green:#589646;--green2:#3B8B3B;--gold:#E8B00A;--cinza:#F2F3F1;--txt:#12314A}
body{font-family:'Manrope',sans-serif;background:#E8EAE6;color:var(--txt)}
.pg{max-width:820px;margin:0 auto;background:#fff}
/* ===== CAPA ===== */
.capa{background:linear-gradient(160deg,#fff 0%,#F2F3F1 100%);position:relative;overflow:hidden;padding:56px 40px 0;min-height:96vh;display:flex;flex-direction:column}
.capa::before{content:'';position:absolute;top:0;left:0;right:0;height:16px;background:linear-gradient(90deg,var(--navy2) 55%,var(--green) 55%)}
.capa .logo{display:flex;justify-content:center;margin:34px 0 40px}
.capa .logo img{height:74px}
.capa .tit{text-align:center}
.capa .tit .l1{font-size:26px;font-weight:400;color:#7d8a94;letter-spacing:1px}
.capa .tit .l2{font-size:44px;font-weight:800;color:#1a1a1a;letter-spacing:.5px;line-height:1.1}
.capa .tit .sub{width:220px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0}
.pills{margin:42px auto 0;max-width:620px;width:100%}
.pill{display:flex;margin-bottom:12px;border-radius:40px;overflow:hidden;font-size:14px}
.pill .k{background:var(--gold);color:var(--navy2);font-weight:800;padding:11px 20px;white-space:nowrap;border-radius:40px 0 0 40px}
.pill .v{background:var(--navy);color:#fff;font-weight:700;padding:11px 20px;flex:1;border-radius:0 40px 40px 0}
.pill2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.capaimg{margin:auto 0 0;border:3px solid var(--gold);border-radius:22px;overflow:hidden;height:210px;background:var(--navy)}
.capaimg img{width:100%;height:100%;object-fit:cover;display:block}
.rodape{display:flex;justify-content:center;padding:22px 0 30px}
.rodape .r{display:flex;border-radius:30px;overflow:hidden;font-size:11px;font-weight:800;letter-spacing:1.5px}
.rodape .r .a{background:var(--navy2);color:#fff;padding:9px 22px}
.rodape .r .b{background:var(--green);color:#fff;padding:9px 22px}
/* ===== SEÇÕES ===== */
.sec{padding:46px 40px}
.sec.alt{background:var(--cinza)}
.sh{text-align:center;margin-bottom:30px}
.sh h2{font-size:24px;font-weight:800;color:var(--navy2);letter-spacing:.5px}
.sh .u{width:90px;height:4px;background:var(--green);margin:10px auto 0;border-radius:3px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.cardG,.cardN{border-radius:16px;padding:20px 18px;color:#fff;text-align:center}
.cardG{background:linear-gradient(145deg,var(--green),#3f7a35)}
.cardN{background:linear-gradient(145deg,var(--navy),#08334e)}
.cardG .l,.cardN .l{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;opacity:.9}
.cardG .v,.cardN .v{font-size:19px;font-weight:800;margin-top:8px;font-style:italic}
/* fotos */
.iSec{margin-bottom:34px}
.iSec h3{font-size:16px;font-weight:800;color:var(--navy2);border-left:5px solid var(--green);padding-left:12px;margin-bottom:4px}
.iSec .d{font-size:12px;color:#6b7a86;padding-left:17px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ph{border:3px solid var(--gold);border-radius:16px;overflow:hidden;background:#fff;aspect-ratio:4/3}
.ph img{width:100%;height:100%;object-fit:cover;display:block}
.semfoto{font-size:12.5px;color:#9aa7b1;font-style:italic;padding-left:17px}
/* termo */
.termoBox{background:#fff;border:1px solid #dfe5e2;border-radius:18px;padding:34px;box-shadow:0 10px 40px rgba(1,29,46,.06)}
.termoBox p{font-size:13.5px;line-height:1.8;color:#3d4f5c;text-align:justify}
.assin{margin-top:34px;text-align:center}
.assin img{max-height:110px;max-width:320px}
.assin .linha{border-top:2px solid var(--navy);width:340px;margin:8px auto 10px}
.assin b{font-size:14px;color:var(--navy2)}
.assin span{display:block;font-size:12px;color:#6b7a86;margin-top:3px}
.pend{text-align:center;color:#9aa7b1;font-style:italic;padding:20px}
/* contracapa */
.fim{background:linear-gradient(150deg,var(--navy2),#0a3450);color:#fff;padding:70px 40px;text-align:center}
.fim img{height:60px;margin-bottom:26px}
.fim .c{font-size:15px;font-weight:700;margin:6px 0}
.fim .c span{color:var(--gold)}
.fim .site{margin-top:28px;font-size:14px;letter-spacing:1px}
.fim .site b{color:#fff}
/* barra ações (não imprime) */
.acoes{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:50}
.acoes button{border:none;border-radius:40px;padding:13px 22px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(1,29,46,.35)}
.bPdf{background:var(--navy2);color:#fff}
.bZap{background:var(--green2);color:#fff;display:none}
.center{max-width:820px;margin:0 auto;background:#fff;text-align:center;padding:90px 30px;color:#6b7a86}
@media print{
  body{background:#fff}
  .acoes{display:none!important}
  .capa{min-height:auto;page-break-after:always}
  .sec{page-break-inside:avoid}
  .pg{max-width:none}
}
@media(max-width:640px){
  .capa{padding:40px 20px 0}
  .sec{padding:34px 20px}
  .capa .tit .l2{font-size:32px}
  .pill2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"><div class="center">⏳ Carregando relatório...</div></div>

<script>
var SUPABASE_URL='https://dakubhcgohiwzyqiegqf.supabase.co';
var SUPABASE_KEY='sb_publishable_hue0wC6DINtAaxTPlSIOIg_X1Tr0vJx';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var SLUG=new URLSearchParams(location.search).get('id');
var LOGO_ESCURA='https://obras.polarisenergiasolar.com/logo-claro.png'; // texto escuro p/ fundo claro
var LOGO_BRANCA='https://obras.polarisenergiasolar.com/logo.png';
var D=null;

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dataBR(s){if(!s)return null;var d=new Date(s.length<=10?s+'T12:00:00':s);return isNaN(d)?null:d.toLocaleDateString('pt-BR');}

async function boot(){
  if(!SLUG){document.getElementById('root').innerHTML='<div class="center">🔗 Link incompleto.</div>';return;}
  var r=await sb.rpc('get_relatorio_publico',{p_slug:SLUG});
  if(r.error||!r.data){document.getElementById('root').innerHTML='<div class="center">🔒 Relatório não encontrado.</div>';return;}
  D=r.data; render();
  // Se alguém da equipe estiver logado, mostra o botão de enviar no grupo
  try{var s=await sb.auth.getSession();if(s.data.session)document.getElementById('bZap').style.display='block';}catch(e){}
}

function render(){
  var o=D.obra, fotos=D.fotos||[], itens=D.itens||[];
  var capaFoto=(fotos[0]&&fotos[0].url)||'';
  var h='<div class="pg">';

  /* CAPA */
  h+='<div class="capa">'
    +'<div class="logo"><img src="'+LOGO_ESCURA+'" onerror="this.style.display=\'none\'"></div>'
    +'<div class="tit"><div class="l1">RELATÓRIO DE</div><div class="l2">INSTALAÇÃO FOTOVOLTAICA</div><div class="sub"></div></div>'
    +'<div class="pills">'
    +'<div class="pill"><div class="k">Cliente:</div><div class="v">'+esc(o.cliente)+'</div></div>'
    +'<div class="pill"><div class="k">Potência do Sistema:</div><div class="v">'+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' kWp':'—')+'</div></div>'
    +'<div class="pill2">'
    +'<div class="pill"><div class="k">Contrato:</div><div class="v">'+(o.contrato?'#'+esc(o.contrato):'—')+'</div></div>'
    +'<div class="pill"><div class="k">Instalação:</div><div class="v">'+(dataBR(o.data_instalacao)||dataBR(o.data_conclusao)||'—')+'</div></div>'
    +'</div>'
    +'<div class="pill2">'
    +'<div class="pill"><div class="k">Instalador:</div><div class="v">'+esc(o.instalador||'Equipe Polaris')+'</div></div>'
    +'<div class="pill"><div class="k">Consultor:</div><div class="v">'+esc(o.vendedor||'Polaris')+'</div></div>'
    +'</div>'
    +'</div>'
    +(capaFoto?'<div class="capaimg"><img src="'+esc(capaFoto)+'"></div>':'')
    +'<div class="rodape"><div class="r"><div class="a">RELATÓRIO DE INSTALAÇÃO</div><div class="b">POLARISENERGIASOLAR.COM</div></div></div>'
    +'</div>';

  /* DADOS DA USINA */
  h+='<div class="sec alt"><div class="sh"><h2>DADOS DA USINA</h2><div class="u"></div></div><div class="cards">'
    +'<div class="cardG"><div class="l">☀️ Potência total</div><div class="v">'+(o.potencia_kwp?String(o.potencia_kwp).replace('.',',')+' kWp':'—')+'</div></div>'
    +'<div class="cardG"><div class="l">🔋 Módulos</div><div class="v">'+(o.qtd_modulos?o.qtd_modulos+' unid.'+(o.modelo_modulo?'<br><small style="font-size:12px;font-weight:600">'+esc(o.modelo_modulo)+'</small>':''):'—')+'</div></div>'
    +'<div class="cardN"><div class="l">⚡ Inversor</div><div class="v" style="font-size:15px">'+esc(o.inversor_descricao||'—')+'</div></div>'
    +'<div class="cardN"><div class="l">📅 Ativação</div><div class="v">'+(dataBR(o.data_conclusao)||'Em andamento')+'</div></div>'
    +'</div></div>';

  /* REGISTRO FOTOGRÁFICO */
  h+='<div class="sec"><div class="sh"><h2>REGISTRO FOTOGRÁFICO DA INSTALAÇÃO</h2><div class="u"></div></div>';
  var teveFoto=false;
  itens.forEach(function(it,ix){
    var fts=fotos.filter(function(f){return f.item_id===it.id});
    if(!fts.length) return;
    teveFoto=true;
    h+='<div class="iSec"><h3>'+(ix+1)+') '+esc(it.titulo)+'</h3>'
      +(it.descricao?'<div class="d">'+esc(it.descricao)+'</div>':'')
      +'<div class="grid">'+fts.map(function(f){return '<div class="ph"><img src="'+esc(f.url)+'" loading="lazy"></div>'}).join('')+'</div></div>';
  });
  if(!teveFoto) h+='<div class="pend">As fotos da instalação serão anexadas pela equipe de campo.</div>';
  h+='</div>';

  /* TERMO */
  h+='<div class="sec alt"><div class="sh"><h2>TERMO DE CONCLUSÃO DE OBRA</h2><div class="u"></div></div><div class="termoBox">';
  if(o.aceite_em){
    h+='<p>Eu, contratante, declaro formalmente que recebi e aceitei o projeto de energia fotovoltaica concluído conforme os termos estabelecidos no contrato firmado entre mim e a Polaris Energia Solar, responsável pelo projeto contratado. O projeto foi entregue conforme acordado, em conformidade com os requisitos técnicos e normativos aplicáveis. Estou satisfeito com o trabalho realizado pelo contratado.</p>'
      +'<div class="assin">'
      +(o.aceite_assinatura?'<img src="'+esc(o.aceite_assinatura)+'">':'')
      +'<div class="linha"></div>'
      +'<b>Assinado por: '+esc(o.aceite_nome)+(o.aceite_documento?', Documento: '+esc(o.aceite_documento):'')+'</b>'
      +'<span>'+new Date(o.aceite_em).toLocaleDateString('pt-BR')+' às '+new Date(o.aceite_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</span>'
      +'</div>';
  } else {
    h+='<div class="pend">✍️ Termo de conclusão pendente de assinatura do cliente.</div>';
  }
  h+='</div></div>';

  /* CONTRACAPA */
  h+='<div class="fim"><img src="'+LOGO_BRANCA+'" onerror="this.style.display=\'none\'">'
    +'<div class="c">📱 <span>(18) 93085-2573</span></div>'
    +'<div class="c">✉️ contato@polarisenergiasolar.com</div>'
    +'<div class="site">www.<b>polarisenergiasolar</b>.com</div>'
    +'</div>';

  h+='</div>'
    +'<div class="acoes">'
    +'<button class="bPdf" onclick="window.print()">📄 Baixar PDF</button>'
    +'<button class="bZap" id="bZap" onclick="enviarNoGrupo()">📣 Enviar no grupo</button>'
    +'</div>';
  document.getElementById('root').innerHTML=h;
  document.title='Relatório — '+o.cliente+' — Polaris Energia Solar';
}

async function enviarNoGrupo(){
  if(!confirm('Enviar o link deste relatório no grupo do cliente?'))return;
  var s=await sb.auth.getSession();
  if(!s.data.session){alert('Faça login no painel primeiro.');return;}
  // Busca o grupo da obra via consulta autenticada
  var q=await sb.from('obras').select('whatsapp_grupo_id,cliente').eq('slug',SLUG).single();
  if(q.error||!q.data||!q.data.whatsapp_grupo_id){alert('Esta obra não tem grupo de WhatsApp.');return;}
  var link=location.origin+'/relatorio.html?id='+encodeURIComponent(SLUG);
  var msg='📄 *Relatório de Instalação — Polaris Energia Solar*\n\nOlá! O relatório completo da sua instalação já está disponível, com todas as fotos e o termo de conclusão:\n\n🔗 '+link+'\n\n*Equipe Polaris Energia Solar* ☀️';
  var r=await sb.functions.invoke('notificar-grupo',{body:{grupo_id:q.data.whatsapp_grupo_id,message:msg}});
  if(r.error||(r.data&&r.data.error)){alert('Erro: '+((r.data&&r.data.error)||r.error.message));return;}
  alert('✅ Relatório enviado no grupo!');
}
boot();
</script>
</body>
</html>
